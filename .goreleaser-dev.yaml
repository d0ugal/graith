version: 2

before:
  hooks:
    # Build the same universal, signed native notifier shipped by production.
    # macos/notifier/build.sh produces the shared macOS release bundle.
    - sh -c 'make notifier'
    # GoReleaser accepts an empty archive glob. Fail closed on the real macOS
    # dev-release runner if the bundle build did not produce its executable.
    - sh -c 'test "$(uname -s)" != Darwin || test -x macos/build/GraithNotifier.app/Contents/MacOS/graith-notifier'
    # The native canary is intentionally restricted to the Apple Silicon dev
    # artifact. Its static archive and pkg-config file must have been prepared
    # by scripts/libghostty-native.sh, which owns the exact pin and checksum.
    - sh -c 'test "$(uname -s)-$(uname -m)" != Darwin-arm64 || { test -n "${GRAITH_LIBGHOSTTY_WORK:-}" && test -f "$GRAITH_LIBGHOSTTY_WORK/pkgconfig/libghostty-vt-static.pc"; }'

# This config is deliberately Darwin-only. Linux native archives are built from
# the exact pinned source unit on Linux and joined by the dev-release publisher.
# Every build retains the gr-dev binary name used by the dev formula.
builds:
  - id: gr-dev-darwin-arm64
    main: ./cmd/graith
    binary: gr-dev
    env:
      - CGO_ENABLED=1
    flags:
      - -trimpath
    tags:
      - libghostty
    ldflags:
      - -s -w
      - -X github.com/d0ugal/graith/internal/version.Version={{.Version}}
      - -X github.com/d0ugal/graith/internal/version.CommitSHA={{.Commit}}
      - -X github.com/d0ugal/graith/internal/daemonservice.ManagedBuild={{ if eq (index .Env "GRAITH_MANAGED_DEV_RELEASE") "true" }}true{{ else }}false{{ end }}
      - -X github.com/d0ugal/graith/internal/daemonservice.DevelopmentBuild=false
      - -X github.com/d0ugal/graith/internal/daemonservice.ExpectedTeamID={{ if eq (index .Env "GRAITH_MANAGED_DEV_RELEASE") "true" }}{{ index .Env "GRAITH_SIGNING_TEAM_ID" }}{{ end }}
      - -X github.com/d0ugal/graith/internal/daemonservice.ExpectedRequirementBase64={{ if eq (index .Env "GRAITH_MANAGED_DEV_RELEASE") "true" }}{{ index .Env "GRAITH_SIGNING_REQUIREMENT_B64" }}{{ end }}
    hooks:
      post:
        # Sign first so the packaged SPDX checksum binds the final standalone
        # and service-app payload bytes, not the unsigned GoReleaser output.
        - cmd: macos/service/release-hook.sh "{{ .Path }}" "{{ .Target }}" "{{ .Version }}" "{{ .Commit }}" "{{ .IsSnapshot }}" "{{ if eq (index .Env "GRAITH_MANAGED_DEV_RELEASE") "true" }}true{{ else }}false{{ end }}"
          output: true
        - cmd: scripts/libghostty-native.sh package-darwin-arm64 "{{ .Path }}" "macos/build/libghostty-native-arm64" "{{ index .Env "GRAITH_SPDX_VALIDATOR_JAR" }}" gr-dev
          output: true
    goos:
      - darwin
    goarch:
      - arm64
archives:
  - id: darwin-arm64
    ids:
      - gr-dev-darwin-arm64
    formats:
      - tar.gz
    name_template: "graith-dev_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - src: macos/build/GraithNotifier.app/**/*
        dst: GraithNotifier.app/Contents
      - src: macos/build/service-release-{{ .Arch }}/Graith.app/**/*
        dst: Graith.app/Contents
      # These are materialized and verified by the canonical native packaging
      # script after any signing has changed the final executable bytes.
      - src: macos/build/libghostty-native-arm64/libghostty-native.spdx.json
        dst: libghostty-native.spdx.json
      - src: macos/build/libghostty-native-arm64/THIRD_PARTY_NOTICES.libghostty.md
        dst: THIRD_PARTY_NOTICES.libghostty.md
checksum:
  name_template: checksums.txt

changelog:
  disable: true

# The version must be monotonically increasing so `brew upgrade` recognises each
# main push as newer than the last. The context job computes one timestamp-based
# version for every platform job; requiring it here prevents independent runner
# clocks from creating mixed-version archives.
snapshot:
  version_template: '{{ index .Env "GRAITH_DEV_VERSION" }}'
