version: 2

builds:
  - main: ./cmd/graith
    binary: gr-dev
    ldflags:
      - -s -w
      - -X github.com/d0ugal/graith/internal/version.Version={{.Version}}
      - -X github.com/d0ugal/graith/internal/version.CommitSHA={{.Commit}}
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "graith-dev_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  disable: true

# The version must be monotonically increasing so `brew upgrade` recognises each
# main push as newer than the last. A git short-SHA suffix sorts arbitrarily
# (Homebrew tokenises and compares versions), so we use `.Timestamp` — the Unix
# time of the build itself. Unlike `.CommitTimestamp` (a caller-controlled commit
# date that can repeat or move backwards), the build time always advances between
# runs, and the workflow's concurrency group serialises them so no two dev builds
# share a timestamp. The commit SHA is still embedded in the binary via ldflags
# and printed in the GitHub release notes.
snapshot:
  version_template: "{{ incpatch .Version }}-dev.{{ .Timestamp }}"
