name: Sandbox

# Sandbox backend CI. This installs the per-OS sandbox backends
# (nono on Linux via Landlock+seccomp, safehouse on macOS via Seatbelt),
# probes and reports the enforcement level available on the GitHub-hosted
# runners, and runs a standalone enforcement smoke test to prove the runner
# can actually enforce a deny-by-default policy.
#
# The smoke test is a hard gate: `ubuntu-latest` is confirmed Landlock
# FullyEnforced, so a broken deny/allow boundary fails the build red. The
# enforcement-probe step below still records, visible directly in the PR
# checks, the answer to the key question:
#
#   Does GitHub's `ubuntu-latest` runner have Landlock available and
#   FullyEnforced?
#
# FALLBACK OPTIONS if `ubuntu-latest` ever regresses and is NOT Landlock
# FullyEnforced (documented here so the answer + remedy live together):
#   1. Larger GitHub-hosted runner (e.g. `ubuntu-latest-4-cores`) — a newer
#      kernel image may expose a higher Landlock ABI.
#      https://docs.github.com/actions/using-github-hosted-runners/about-larger-runners
#   2. Self-hosted runner on a known-good kernel (>= 5.14, ideally 6.7+ for
#      Landlock ABI v4 network filtering) — this is what the local harness
#      (kernel 6.12) already provides.
#   3. Accept `PartiallyEnforced` as the CI gate: assert FS confinement holds
#      (reads/writes are denied) even if network-layer filtering is absent.
#      graith v1 emits no network policy, so FS-only enforcement is sufficient
#      for the current backend and the enforcement smoke test.
#
# nono enforcement classes (from nono's Landlock internals docs):
#   FullyEnforced      — Landlock FS control active (kernel >= 5.14 in practice).
#   PartiallyEnforced  — FS enforced but ABI < v4, no TCP/network filtering.
#   NotEnforced        — kernel < 5.13/5.14 or Landlock disabled. For graith
#                        this is a fail-closed condition once the backend ships.

on:
  # No path filter: both enforcement jobs are REQUIRED status checks in branch
  # protection, so they must run and report on every PR. A required check that
  # is skipped on some PRs (via path filtering) leaves those PRs "waiting" for a
  # status that never arrives, which — with enforce_admins — blocks all merges.
  # The jobs are fast and self-contained (they don't depend on the PR's diff),
  # so running them everywhere is cheap and keeps auto-merge honest.
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---------------------------------------------------------------------------
  # Linux / nono — the important one. Answers the Landlock-on-GH-runner
  # question and proves the runner can enforce a deny-by-default policy.
  # ---------------------------------------------------------------------------
  linux-nono:
    name: Linux (nono / Landlock)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: read # verify nono's build provenance (gh attestation verify)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Install nono
        # Pinned, provenance-verified install (no `curl | sudo sh`, no root).
        # The tarball is verified by nono's GitHub build-provenance attestation
        # (`gh attestation verify`), which binds it via Sigstore to the
        # nolabs-ai/nono release workflow. This is version-independent, so
        # Renovate can bump NONO_VERSION with no per-version checksum to update
        # (see the nono customManager in renovate.json5) and a tampered or
        # unattested artifact fails closed.
        #
        # NONO_VERSION is the version CI *tests against* (Renovate keeps it on
        # the latest release); it is decoupled from MinNonoVersion in
        # internal/sandbox/nono.go, which is the support floor bumped by hand.
        env:
          GH_TOKEN: ${{ github.token }}
          NONO_VERSION: "0.67.1"
        run: |
          set -euo pipefail
          tarball="nono-v${NONO_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          url="https://github.com/nolabs-ai/nono/releases/download/v${NONO_VERSION}/${tarball}"
          tmp="$(mktemp -d)"
          curl -fsSL --proto '=https' --tlsv1.2 "$url" -o "$tmp/$tarball"
          # Fail closed: only proceed if the artifact's build provenance verifies
          # against nolabs-ai/nono (proves nono's own CI produced it).
          gh attestation verify "$tmp/$tarball" --repo nolabs-ai/nono
          dest="$HOME/.local/bin"
          mkdir -p "$dest"
          tar -xzf "$tmp/$tarball" -C "$dest" nono
          chmod +x "$dest/nono"
          echo "$dest" >> "$GITHUB_PATH"
          rm -rf "$tmp"
          echo "nono ${NONO_VERSION} installed at: $dest/nono (provenance-verified)"

      - name: Report Landlock enforcement level on this runner
        run: |
          set -uo pipefail
          {
            echo "## Landlock enforcement probe (\`ubuntu-latest\`)"
            echo
            echo "This step answers: does GitHub's \`ubuntu-latest\` runner"
            echo "actually have Landlock available / FullyEnforced?"
            echo
            echo '```'
            echo "kernel:        $(uname -r)"
            echo -n "LSMs enabled:  "
            if [ -r /sys/kernel/security/lsm ]; then
              cat /sys/kernel/security/lsm
            else
              echo "<'/sys/kernel/security/lsm' not readable>"
            fi
            echo -n "landlock in lsm list: "
            if [ -r /sys/kernel/security/lsm ] && grep -q landlock /sys/kernel/security/lsm; then
              echo "YES"
            else
              echo "NO"
            fi
            echo
            echo "--- nono --version ---"
            nono --version 2>&1 || echo "<nono --version failed>"
            echo
            echo "--- nono setup (enforcement report) ---"
            # nono exposes its enforcement classification via `setup`/`why`.
            # Neither is guaranteed to exist in every nono release, so probe
            # both and never let a missing subcommand fail the report step.
            nono setup 2>&1 || echo "<nono setup unavailable in this version>"
            echo
            echo "--- nono why (per-op explanation, best-effort) ---"
            nono why 2>&1 | head -40 || echo "<nono why unavailable in this version>"
            echo '```'
            echo
            echo "**Interpretation:** if the LSM list contains \`landlock\` and"
            echo "nono reports \`FullyEnforced\`, the runner can enforce graith's"
            echo "filesystem policy. \`PartiallyEnforced\` = FS-only (fine for v1)."
            echo "\`NotEnforced\` = fail-closed once the backend ships (see the"
            echo "fallback options in the workflow header)."
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: nono standalone enforcement smoke test
        # Hard gate. Bring-up is over: `ubuntu-latest` is confirmed Landlock
        # FullyEnforced (see the enforcement-probe step above), so a deny/allow
        # boundary that no longer holds is a real regression and must fail red.
        # The final `[ "$fail" -eq 0 ]` is now the step's honest exit status.
        run: |
          set -uo pipefail

          # Fixture layout mirrors the local harness spec
          # (/tmp/sandbox-harness-spec.md): three distinct dirs, outside each
          # other — a read-only secret dir and a no-access secret dir.
          scratch="$(mktemp -d)"
          trap 'rm -rf "$scratch"' EXIT

          mkdir -p "$scratch/READONLY" "$scratch/NOACCESS" "$scratch/WRITABLE"
          echo "readonly-secret"  > "$scratch/READONLY/secret-readonly.txt"
          echo "noaccess-secret"  > "$scratch/NOACCESS/secret-noaccess.txt"

          # Hand-authored nono profile in nono v0.66.0's schema (mirrors the
          # profile graith's nono backend generates):
          #   filesystem.allow -> read+write recursive (WRITABLE goes here)
          #   filesystem.read  -> read-only recursive   (READONLY goes here)
          # NOACCESS is deliberately in neither list, so it must be denied.
          # "extends: default" pulls in nono's audited deny groups.
          profile="$scratch/profile.json"
          cat > "$profile" <<EOF
          {
            "extends": "default",
            "meta": { "name": "graith-ci-smoke" },
            "workdir": { "access": "readwrite" },
            "filesystem": {
              "allow": ["$scratch/WRITABLE"],
              "read": ["$scratch/READONLY"]
            }
          }
          EOF
          echo "profile:"; cat "$profile"; echo

          # Helper: run a command under nono, capturing nono's own stderr so a
          # denial (or a profile-parse failure) is diagnosable in the log rather
          # than swallowed. Reports DENIED vs ALLOWED on the real exit status.
          run_sandboxed() {
            nono run --profile "$profile" -- "$@"
          }

          pass=0
          fail=0
          note() { printf '%-8s %-9s %s\n' "$1" "$2" "$3"; }

          echo "=== enforcement assertions ==="

          # 1. Read the no-access secret -> EXPECT DENIED.
          if out="$(run_sandboxed cat "$scratch/NOACCESS/secret-noaccess.txt" 2>&1)"; then
            note "FAIL" "ALLOWED" "read NOACCESS secret (expected DENIED)"; fail=$((fail+1))
          else
            note "ok" "DENIED" "read NOACCESS secret"; pass=$((pass+1))
          fi
          [ -n "${out:-}" ] && echo "    nono: $out"

          # 2. Read the read-only secret -> EXPECT ALLOWED.
          if out="$(run_sandboxed cat "$scratch/READONLY/secret-readonly.txt" 2>&1)"; then
            note "ok" "ALLOWED" "read READONLY secret"; pass=$((pass+1))
          else
            note "FAIL" "DENIED" "read READONLY secret (expected ALLOWED)"; fail=$((fail+1))
            echo "    nono: $out"
          fi

          # 3. Write into the writable dir -> EXPECT ALLOWED.
          if out="$(run_sandboxed sh -c "echo out > '$scratch/WRITABLE/out.txt'" 2>&1)"; then
            note "ok" "ALLOWED" "write WRITABLE/out.txt"; pass=$((pass+1))
          else
            note "FAIL" "DENIED" "write WRITABLE/out.txt (expected ALLOWED)"; fail=$((fail+1))
            echo "    nono: $out"
          fi

          echo
          echo "smoke test: $pass allowed-as-expected, $fail unexpected"
          {
            echo "### nono enforcement smoke test"
            echo
            echo "- passed (behaved as expected): **$pass**"
            echo "- failed (unexpected outcome):  **$fail**"
            if [ "$fail" -ne 0 ]; then
              echo
              echo "> One or more assertions did not hold. This is a hard failure:"
              echo "> the deny/allow boundary this runner is expected to enforce"
              echo "> broke. See the fallback options in the workflow header."
            fi
          } >> "$GITHUB_STEP_SUMMARY"

          # Hard gate: any unexpected outcome fails the step red.
          [ "$fail" -eq 0 ]

      - name: graith tagged enforcement tests (nono)
        # graith's nono enforcement tests live in
        # internal/sandbox/nono_enforce_test.go behind the build tag
        # `nono_enforce` (Linux-only) and are invoked as:
        #     go test -tags nono_enforce ./internal/sandbox/...
        # No -run filter: the build tag alone selects the suite, so every tagged
        # test runs (an over-narrow -run silently skipped most of them — #792).
        # The tests skip cleanly if nono cannot enforce on the host, so they need
        # no continue-on-error. The grep guard fails the step red if the tagged
        # tests go missing rather than silently passing on a no-op.
        run: |
          set -uo pipefail
          tag="nono_enforce"
          if grep -rqs -- "//go:build ${tag}" internal/sandbox/ 2>/dev/null; then
            echo "Found ${tag} build-tagged tests — running enforcement suite."
            # No -run filter: run the whole sandbox package under the ${tag} tag,
            # so every ${tag}-tagged test is included. An over-narrow -run
            # (e.g. TestNonoEnforces) silently skips the profile-validation and
            # `nono why` policy tests, defeating the point of the suite (#792).
            go test -tags "${tag}" ./internal/sandbox/... -v
          else
            echo "::error title=Missing enforcement tests::No '${tag}' build-tagged tests found in internal/sandbox/."
            echo "FAILED: graith '${tag}' enforcement tests missing." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # macOS / safehouse — Seatbelt is always present; check the binary installs
  # and run the same hard-gated tagged enforcement-test step.
  # ---------------------------------------------------------------------------
  macos-safehouse:
    name: macOS (safehouse / Seatbelt)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Install safehouse (Homebrew)
        # Tap eugene1g/safehouse (repo eugene1g/homebrew-safehouse), formula
        # agent-safehouse, which installs the `safehouse` binary.
        # Upstream: https://github.com/eugene1g/agent-safehouse
        run: |
          set -euo pipefail
          brew install eugene1g/safehouse/agent-safehouse
          {
            echo "## safehouse install (macOS)"
            echo
            if command -v safehouse >/dev/null 2>&1; then
              echo "Installed \`safehouse\` from tap \`eugene1g/safehouse\` (formula \`agent-safehouse\`)."
            else
              echo "brew install succeeded but no \`safehouse\` on PATH."
            fi
          } | tee -a "$GITHUB_STEP_SUMMARY"
          # Fail closed: the enforcement suite is the whole point of this job.
          # If safehouse isn't actually on PATH, the tagged tests would t.Skip()
          # and the job would go green enforcing nothing — the exact false-green
          # this suite exists to prevent.
          command -v safehouse >/dev/null 2>&1 || {
            echo "::error title=safehouse missing::brew install did not put 'safehouse' on PATH"
            exit 1
          }

      - name: Check safehouse availability
        run: |
          set -uo pipefail
          echo -n "sw_vers: "; sw_vers 2>/dev/null || true
          if command -v safehouse >/dev/null 2>&1; then
            echo "safehouse found at: $(command -v safehouse)"
            safehouse --version 2>&1 || echo "<safehouse --version failed>"
            echo "Seatbelt (macOS sandbox-exec) is always present on macOS runners."
          else
            # Fatal, not a warning: skipping the enforcement suite is a false green.
            echo "::error title=safehouse unavailable::No 'safehouse' binary on PATH; enforcement tests would silently skip."
            exit 1
          fi

      - name: graith tagged enforcement tests (safehouse)
        # graith's safehouse enforcement test lives in
        # internal/sandbox/safehouse_enforce_test.go behind the build tag
        # `safehouse_enforce`. Gated identically to the Linux step: the grep
        # guard fails the step red if the tagged tests go missing rather than
        # silently passing on a no-op.
        run: |
          set -uo pipefail
          tag="safehouse_enforce"
          if ! grep -rqs -- "//go:build ${tag}" internal/sandbox/ 2>/dev/null; then
            echo "::error title=Missing enforcement tests::No '${tag}' build-tagged tests found in internal/sandbox/."
            echo "FAILED: graith '${tag}' enforcement tests missing." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

          echo "Found ${tag} build-tagged tests — running enforcement suite."
          # Capture output so we can fail the step if any enforcement test SKIPs.
          # A t.Skip() (missing safehouse/python3, or a non-enforcing host) would
          # otherwise exit 0 and go green while proving nothing at the kernel
          # level — the precise false-green this suite guards against.
          set +e
          go test -tags "${tag}" ./internal/sandbox/... -v 2>&1 | tee /tmp/enforce.out
          status=${PIPESTATUS[0]}
          set -e
          if [ "$status" -ne 0 ]; then
            echo "::error title=Enforcement tests failed::safehouse enforcement suite failed."
            exit "$status"
          fi
          if grep -q -- "--- SKIP" /tmp/enforce.out; then
            echo "::error title=Enforcement tests skipped::A safehouse enforcement test was SKIPPED; it must run on macOS CI (green-while-skipped is a false pass)."
            grep -- "--- SKIP" /tmp/enforce.out || true
            exit 1
          fi
