name: libghostty-vt native backend

on:
  workflow_dispatch:
  pull_request:
    paths:
      - .github/workflows/libghostty-native.yml
      - docs/design/2026-07-18-libghostty-daemon-backend*.md
      - gui/shared/Package.swift
      - gui/shared/Sources/CGhosttyVT/include/**
      - go.mod
      - go.sum
      - internal/cli/**
      - internal/daemon/**
      - internal/pty/**
      - libghostty-native.spdx.json
      - scripts/libghostty-native.sh
      - THIRD_PARTY_NOTICES.libghostty.md

permissions:
  contents: read

jobs:
  metadata-and-selectors:
    name: Native metadata, SPDX, and fail-closed selectors
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Check the native script and dependency unit
        run: |
          bash -n scripts/libghostty-native.sh
          shellcheck scripts/libghostty-native.sh
          scripts/libghostty-native.sh verify-provenance
          scripts/libghostty-native.sh verify-selectors
          git diff --check
      - name: Install the checksum-pinned SPDX validator
        id: spdx
        env:
          GRAITH_LIBGHOSTTY_KEEP_WORK: "1"
          GRAITH_LIBGHOSTTY_WORK: ${{ runner.temp }}/spdx-download
        run: |
          jar="$(scripts/libghostty-native.sh install-spdx-validator "${RUNNER_TEMP}/spdx-validator")"
          echo "jar=$jar" >> "$GITHUB_OUTPUT"
      - name: Validate SPDX 2.3 structure and relationships
        env:
          SPDX_JAR: ${{ steps.spdx.outputs.jar }}
        run: scripts/libghostty-native.sh validate-spdx "$SPDX_JAR"

  default-builds:
    name: Default rollback (${{ matrix.goos }}/${{ matrix.goarch }}, no cgo)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Build and inspect the pure-Go rollback binary
        env:
          CGO_ENABLED: "0"
          GOARCH: ${{ matrix.goarch }}
          GOOS: ${{ matrix.goos }}
        run: |
          binary="${RUNNER_TEMP}/gr-${GOOS}-${GOARCH}"
          go build -trimpath -ldflags='-s -w' -o "$binary" ./cmd/graith
          scripts/libghostty-native.sh verify-default-binary "$binary"
          scripts/libghostty-native.sh verify-binary-privacy "$binary"

  darwin-candidates:
    name: Darwin candidate (${{ matrix.goarch }})
    runs-on: macos-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            clang_arch: x86_64
          - goarch: arm64
            clang_arch: arm64
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Verify exact source, headers, and Apple static archive
        env:
          GRAITH_LIBGHOSTTY_KEEP_WORK: "1"
          GRAITH_LIBGHOSTTY_WORK: ${{ runner.temp }}/libghostty-native
        run: scripts/libghostty-native.sh prepare-apple
      - name: Run upstream and Graith tests on the runner architecture
        env:
          GRAITH_LIBGHOSTTY_KEEP_WORK: "1"
          GRAITH_LIBGHOSTTY_WORK: ${{ runner.temp }}/libghostty-native
          PKG_CONFIG_PATH: ${{ runner.temp }}/libghostty-native/pkgconfig
          TARGET_ARCH: ${{ matrix.clang_arch }}
        run: |
          if [[ "$(uname -m)" != "$TARGET_ARCH" ]]; then
            echo "Cross-link only: runner architecture is $(uname -m)."
            exit 0
          fi
          scripts/libghostty-native.sh upstream-test
          go test -count=1 -tags=libghostty ./internal/pty
          go test -race -count=1 -tags=libghostty ./internal/pty \
            -run 'TestTerminalBackendCompatibilityCorpus|TestGhostty'
      - name: Link, inspect, strip, and package the testing candidate
        env:
          CC: clang -arch ${{ matrix.clang_arch }}
          CGO_ENABLED: "1"
          GOARCH: ${{ matrix.goarch }}
          GOOS: darwin
          GRAITH_LIBGHOSTTY_KEEP_WORK: "1"
          GRAITH_LIBGHOSTTY_WORK: ${{ runner.temp }}/libghostty-native
          PKG_CONFIG_PATH: ${{ runner.temp }}/libghostty-native/pkgconfig
        run: |
          go test -c -tags=libghostty -o "${RUNNER_TEMP}/pty-${GOARCH}.test" ./internal/pty

          inspection_binary="${RUNNER_TEMP}/gr-darwin-${GOARCH}-inspection"
          go build -trimpath -tags=libghostty -o "$inspection_binary" ./cmd/graith
          scripts/libghostty-native.sh inspect-linkage "$inspection_binary" true

          packaged_binary="${RUNNER_TEMP}/gr-darwin-${GOARCH}"
          go build -trimpath -ldflags='-s -w' -tags=libghostty \
            -o "$packaged_binary" ./cmd/graith
          scripts/libghostty-native.sh inspect-linkage "$packaged_binary" false
          scripts/libghostty-native.sh verify-binary-privacy "$packaged_binary"
          scripts/libghostty-native.sh package-candidate \
            "$packaged_binary" "${RUNNER_TEMP}/candidate-darwin-${GOARCH}"
      - name: Upload the exact Darwin testing candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gr-libghostty-darwin-${{ matrix.goarch }}
          path: ${{ runner.temp }}/candidate-darwin-${{ matrix.goarch }}/
          if-no-files-found: error

  linux-candidates:
    name: Linux candidate (${{ matrix.goarch }})
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux-gnu
            goarch: amd64
            run_tests: true
          - target: aarch64-linux-gnu
            goarch: arm64
            run_tests: false
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Install checksum-pinned Zig 0.15.2
        env:
          GRAITH_LIBGHOSTTY_KEEP_WORK: "1"
          GRAITH_LIBGHOSTTY_WORK: ${{ runner.temp }}/zig-download
        run: |
          scripts/libghostty-native.sh install-zig "${RUNNER_TEMP}/zig"
          echo "${RUNNER_TEMP}/zig" >> "$GITHUB_PATH"
      - name: Build and inspect the exact Ghostty source pin
        env:
          GRAITH_LIBGHOSTTY_KEEP_WORK: "1"
          GRAITH_LIBGHOSTTY_WORK: ${{ runner.temp }}/ghostty-${{ matrix.goarch }}
          LIBRARY: ${{ runner.temp }}/libghostty-${{ matrix.goarch }}.a
          TARGET: ${{ matrix.target }}
        run: scripts/libghostty-native.sh source-build "$TARGET" "$LIBRARY"
      - name: Compile and optionally run the isolated backend
        env:
          GOARCH: ${{ matrix.goarch }}
          GRAITH_LIBGHOSTTY_KEEP_WORK: "1"
          GRAITH_LIBGHOSTTY_WORK: ${{ runner.temp }}/ghostty-${{ matrix.goarch }}
          PKG_CONFIG_PATH: ${{ runner.temp }}/ghostty-${{ matrix.goarch }}/pkgconfig
          RUN_TESTS: ${{ matrix.run_tests }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          if [ "$RUN_TESTS" = "true" ]; then
            scripts/libghostty-native.sh source-test "$TARGET"
            go test -count=1 go.mitchellh.com/libghostty
            go test -count=1 -tags=libghostty ./internal/pty
            go test -count=1 -tags=libghostty ./internal/daemon \
              -run 'TestLibghostty|TestProbeUpgrade|TestUpgradeHelperHandoff'
            go test -race -count=1 -tags=libghostty ./internal/pty \
              -run 'TestGhostty'
            go test -race -count=1 -tags=libghostty,libghostty_compare ./internal/pty \
              -run '^TestTerminalBackendCompatibilityCorpus$'
            go test -race -count=1 -tags=libghostty ./internal/daemon \
              -run 'TestLibghostty|TestProbeUpgrade|TestUpgradeHelperHandoff'
            # Fixed budgets avoid the wall-clock deadline path affected by
            # golang/go#75804. Snapshot CI reached 494,054 executions; local
            # request/helper calibration reached 789,507-829,186 and 341-747.
            go test -tags=libghostty ./internal/pty -run '^$' -parallel=4 \
              -fuzz '^FuzzGhosttySnapshotDecoder$' -fuzztime=500000x
            go test -tags=libghostty ./internal/pty -run '^$' -parallel=4 \
              -fuzz '^FuzzGhosttyRequestDecoder$' -fuzztime=830000x
            go test -tags=libghostty ./internal/pty -run '^$' -parallel=4 \
              -fuzz '^FuzzGhosttyHelperWrite$' -fuzztime=750x
          else
            CGO_ENABLED=1 GOOS=linux CC="zig cc -target $TARGET" \
              go test -c -tags=libghostty -o "${RUNNER_TEMP}/pty-${GOARCH}.test" \
              ./internal/pty
            CGO_ENABLED=1 GOOS=linux CC="zig cc -target $TARGET" \
              go test -c -tags=libghostty -o "${RUNNER_TEMP}/daemon-${GOARCH}.test" \
              ./internal/daemon
          fi
      - name: Link, inspect, strip, and package the testing candidate
        env:
          CC: zig cc -target ${{ matrix.target }}
          CGO_ENABLED: "1"
          GOARCH: ${{ matrix.goarch }}
          GOOS: linux
          GRAITH_LIBGHOSTTY_KEEP_WORK: "1"
          GRAITH_LIBGHOSTTY_WORK: ${{ runner.temp }}/ghostty-${{ matrix.goarch }}
          PKG_CONFIG_PATH: ${{ runner.temp }}/ghostty-${{ matrix.goarch }}/pkgconfig
        run: |
          go test -c -tags=libghostty -o "${RUNNER_TEMP}/pty-${GOARCH}.test" ./internal/pty

          inspection_binary="${RUNNER_TEMP}/gr-linux-${GOARCH}-inspection"
          go build -trimpath -tags=libghostty -o "$inspection_binary" ./cmd/graith
          scripts/libghostty-native.sh inspect-linkage "$inspection_binary" true

          packaged_binary="${RUNNER_TEMP}/gr-linux-${GOARCH}"
          go build -trimpath -ldflags='-s -w' -tags=libghostty \
            -o "$packaged_binary" ./cmd/graith
          scripts/libghostty-native.sh inspect-linkage "$packaged_binary" false
          scripts/libghostty-native.sh verify-binary-privacy "$packaged_binary"
          scripts/libghostty-native.sh package-candidate \
            "$packaged_binary" "${RUNNER_TEMP}/candidate-linux-${GOARCH}"
      - name: Upload the exact Linux testing candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gr-libghostty-linux-${{ matrix.goarch }}
          path: ${{ runner.temp }}/candidate-linux-${{ matrix.goarch }}/
          if-no-files-found: error
