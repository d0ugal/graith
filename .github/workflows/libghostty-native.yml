name: libghostty-vt native backend

on:
  workflow_dispatch:
    inputs:
      run_native:
        description: Run the required supported-platform native jobs
        required: false
        default: true
        type: boolean
      dependency_unit:
        description: Include update-only race and fuzz gates
        required: false
        default: true
        type: boolean
      include_linux:
        description: Run the source-build Linux validation matrix
        required: false
        default: true
        type: boolean
  # This workflow deliberately has no workflow-level path filter. The final
  # `Native backend gate` job is intended to be required in branch protection,
  # so it must report on every pull request. The `changes` job keeps the costly
  # native matrix off unrelated changes by skipping it at job level instead.
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    name: Detect libghostty-relevant changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      native: ${{ steps.filter.outputs.native }}
      dependency-unit: ${{ steps.filter.outputs.dependency-unit }}
    steps:
      - id: filter
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          PR: ${{ github.event.pull_request.number }}
          DISPATCH_NATIVE: ${{ inputs.run_native }}
          DISPATCH_DEPENDENCY_UNIT: ${{ inputs.dependency_unit }}
        run: |
          set -euo pipefail
          # Manual dispatch exists to exercise the complete native matrix.
          if [ "$EVENT" != "pull_request" ]; then
            echo "native=$DISPATCH_NATIVE" >> "$GITHUB_OUTPUT"
            echo "dependency-unit=$DISPATCH_DEPENDENCY_UNIT" >> "$GITHUB_OUTPUT"
            echo "Non-PR event ($EVENT): native=$DISPATCH_NATIVE dependency-unit=$DISPATCH_DEPENDENCY_UNIT."
            exit 0
          fi
          # Fail safe toward running the native jobs if GitHub cannot provide
          # the authoritative PR file list.
          if ! files="$(gh api "repos/$REPO/pulls/$PR/files" --paginate --jq '.[].filename')"; then
            echo "native=true" >> "$GITHUB_OUTPUT"
            echo "dependency-unit=true" >> "$GITHUB_OUTPUT"
            echo "Could not list PR files; running native jobs to be safe."
            exit 0
          fi
          if grep -Fxq 'libghostty-native.lock.json' <<<"$files"; then
            echo "dependency-unit=true" >> "$GITHUB_OUTPUT"
            echo "Native dependency lock changed: running update-only race/fuzz gates."
          else
            echo "dependency-unit=false" >> "$GITHUB_OUTPUT"
          fi
          if grep -Eq '^\.goreleaser-dev\.yaml$|^\.github/workflows/(dev-release|libghostty-native)\.yml$|^docs/design/2026-07-18-libghostty-daemon-backend.*\.md$|^gui/shared/Package\.swift$|^gui/shared/Sources/CGhosttyVT/include/|^go\.(mod|sum)$|^internal/(cli|daemon|integration|libghosttydeps|pty|release)/|^libghostty-native\.(lock|spdx)\.json$|^scripts/(dev-release-version|libghostty-native)\.sh$|^THIRD_PARTY_NOTICES\.libghostty\.md$|^website/content/docs/(commands/daemon|contributing/_index|installation|troubleshooting)\.md$' <<<"$files"; then
            echo "native=true" >> "$GITHUB_OUTPUT"
            echo "libghostty-relevant files changed: running native jobs."
          else
            echo "native=false" >> "$GITHUB_OUTPUT"
            echo "No libghostty-relevant files changed: skipping native jobs."
          fi

  default-builds:
    name: Default build (${{ matrix.goos }}/${{ matrix.goarch }}, no cgo)
    needs: changes
    if: >-
      !cancelled() &&
      (needs.changes.result != 'success' || needs.changes.outputs.native == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Build the pure-Go compatibility binary without native code or cgo
        env:
          CGO_ENABLED: "0"
          GOARCH: ${{ matrix.goarch }}
          GOOS: ${{ matrix.goos }}
        run: |
          go build -trimpath -o "${RUNNER_TEMP}/gr" ./cmd/graith
          scripts/libghostty-native.sh verify-default-binary "${RUNNER_TEMP}/gr"

  apple-adapter:
    name: Adapter and pinned artifact (macOS arm64)
    needs: changes
    if: >-
      !cancelled() &&
      (needs.changes.result != 'success' || needs.changes.outputs.native == 'true')
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Verify the native runner architecture
        run: test "$(uname -m)" = arm64
      - name: Run the shared corpus with the pinned GUI artifact
        env:
          GRAITH_LIBGHOSTTY_KEEP_WORK: "1"
          GRAITH_LIBGHOSTTY_WORK: ${{ runner.temp }}/libghostty-native
        run: scripts/libghostty-native.sh test
      - name: Run native race and fixed-budget fuzz suites for dependency updates
        if: needs.changes.outputs.dependency-unit == 'true'
        env:
          GRAITH_LIBGHOSTTY_KEEP_WORK: "1"
          GRAITH_LIBGHOSTTY_WORK: ${{ runner.temp }}/libghostty-native
        run: |
          scripts/libghostty-native.sh race
          scripts/libghostty-native.sh fuzz
      - name: Run the external daemon lifecycle and bounded soak
        env:
          GRAITH_LIBGHOSTTY_KEEP_WORK: "1"
          GRAITH_LIBGHOSTTY_WORK: ${{ runner.temp }}/libghostty-native
        run: scripts/libghostty-native.sh daemon-test
      - name: Verify and link the supported native architecture
        env:
          LIBRARY: ${{ runner.temp }}/libghostty-native/libghostty-vt.xcframework/macos-arm64_x86_64/libghostty-vt.a
          PKG_CONFIG_PATH: ${{ runner.temp }}/libghostty-native/pkgconfig
        run: |
          set -euo pipefail
          lipo "$LIBRARY" -verify_arch arm64
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=1 CC="clang -arch arm64" \
            go test -c -tags=libghostty -o "${RUNNER_TEMP}/pty-arm64.test" \
            ./internal/pty
          revision="$(git rev-parse HEAD)"
          test -z "$(git status --porcelain --untracked-files=normal)"
          GOOS=darwin GOARCH=arm64 CGO_ENABLED=1 CC="clang -arch arm64" \
            go build -buildvcs=false -trimpath -tags=libghostty \
            -ldflags="-X github.com/d0ugal/graith/internal/version.CommitSHA=$revision" \
            -o "${RUNNER_TEMP}/gr-darwin-arm64" ./cmd/graith
      - name: Prove tagged Darwin amd64 fails closed without native linkage
        run: |
          set -euo pipefail
          GOOS=darwin GOARCH=amd64 CGO_ENABLED=1 CC="clang -arch x86_64" \
            go test -c -tags=libghostty \
            -o "${RUNNER_TEMP}/pty-darwin-amd64-unsupported.test" ./internal/pty
          go tool nm "${RUNNER_TEMP}/pty-darwin-amd64-unsupported.test" | \
            awk '$NF ~ /TestLibghosttyBackendRejectsUnsupportedPlatform$/ { found = 1 } END { exit !found }'
          if GOOS=darwin GOARCH=amd64 CGO_ENABLED=1 CC="clang -arch x86_64" \
            go list -tags=libghostty -deps ./cmd/graith | \
            awk '$0 == "go.mitchellh.com/libghostty" { found = 1 } END { exit !found }'; then
            echo "error: tagged Darwin amd64 unexpectedly selected go-libghostty" >&2
            exit 1
          fi
      - name: Bind provenance and package the native candidate
        run: |
          set -euo pipefail
          scripts/libghostty-native.sh test-metadata-policy
          scripts/libghostty-native.sh test-darwin-linkage-policy
          scripts/libghostty-native.sh test-exclusive-publish
          java -version
          spdx_jar="$(scripts/libghostty-native.sh install-spdx-validator \
            "${RUNNER_TEMP}/spdx-validator")"
          scripts/libghostty-native.sh validate-spdx "$spdx_jar"
          scripts/libghostty-native.sh package-darwin-arm64 \
            "${RUNNER_TEMP}/gr-darwin-arm64" \
            "${RUNNER_TEMP}/native-candidate" "$spdx_jar"
      - name: Upload the Darwin arm64 testing candidate
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gr-libghostty-darwin-arm64
          path: ${{ runner.temp }}/native-candidate/
          if-no-files-found: error

  linux-adapter:
    name: Adapter source build (${{ matrix.target }})
    needs: changes
    if: >-
      !cancelled() &&
      (needs.changes.result != 'success' || needs.changes.outputs.native == 'true') &&
      (github.event_name != 'workflow_dispatch' || inputs.include_linux)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux-gnu
            goarch: amd64
            run_tests: true
          - target: aarch64-linux-gnu
            goarch: arm64
            run_tests: false
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
      - name: Install checksum-verified Zig from the native dependency lock
        run: |
          set -euo pipefail
          zig_version="$(jq -er '.zig.version' libghostty-native.lock.json)"
          zig_url="$(jq -er '.zig.linuxX8664URL' libghostty-native.lock.json)"
          zig_sha256="$(jq -er '.zig.linuxX8664SHA256' libghostty-native.lock.json)"
          mkdir -p "${RUNNER_TEMP}/zig"
          curl --proto '=https' --tlsv1.2 --fail --location --silent --show-error \
            "$zig_url" --output "${RUNNER_TEMP}/zig.tar.xz"
          printf '%s  %s\n' "$zig_sha256" "${RUNNER_TEMP}/zig.tar.xz" | sha256sum --check --status
          tar -xf "${RUNNER_TEMP}/zig.tar.xz" -C "${RUNNER_TEMP}/zig" --strip-components=1
          echo "${RUNNER_TEMP}/zig" >> "$GITHUB_PATH"
          test "$("${RUNNER_TEMP}/zig/zig" version)" = "$zig_version"
      - name: Build the exact Ghostty source pin
        env:
          EVIDENCE_ARCH: ${{ matrix.goarch }}
          GRAITH_LIBGHOSTTY_KEEP_WORK: "1"
          GRAITH_LIBGHOSTTY_WORK: ${{ runner.temp }}/ghostty-${{ matrix.goarch }}
          LIBRARY: ${{ runner.temp }}/libghostty-${{ matrix.goarch }}.a
          PKG_CONFIG_PATH: ${{ runner.temp }}/ghostty-${{ matrix.goarch }}/pkgconfig
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          evidence="${RUNNER_TEMP}/source-build-${EVIDENCE_ARCH}.time"
          uname -a
          cat /etc/os-release
          lscpu
          free -b
          go version
          zig version
          zig cc --version
          zig ld.lld --version
          cc --version
          ld --version
          ldd --version
          if ! /usr/bin/time -v -o "$evidence" \
            scripts/libghostty-native.sh source-build "$TARGET" "$LIBRARY"; then
            cat "$evidence"
            exit 1
          fi
          cat "$evidence"
          source_revision=""
          expected_revision=""
          if ! source_revision="$(git -C "$GRAITH_LIBGHOSTTY_WORK/ghostty" rev-parse HEAD)" ||
            [[ -z "$source_revision" ]] ||
            ! expected_revision="$(jq -er '.ghostty.commit' libghostty-native.lock.json)" ||
            [[ -z "$expected_revision" || "$source_revision" != "$expected_revision" ]]; then
            echo "Ghostty source revision evidence does not match the lock" >&2
            exit 1
          fi
          echo "ghostty_revision=$source_revision"
          sha256sum "$LIBRARY" libghostty-native.lock.json "${RUNNER_TEMP}/zig.tar.xz"
          stat --printf='archive_size=%s archive_mode=%a archive_uid=%u\n' "$LIBRARY"
          file "$LIBRARY"
          zig ar t "$LIBRARY"
      - name: Prove fail-closed archive snapshot and publication
        env:
          EVIDENCE_ARCH: ${{ matrix.goarch }}
          GRAITH_LIBGHOSTTY_KEEP_WORK: "1"
          GRAITH_LIBGHOSTTY_WORK: ${{ runner.temp }}/archive-policy-${{ matrix.goarch }}
        run: |
          set -euo pipefail
          evidence="${RUNNER_TEMP}/archive-policy-${EVIDENCE_ARCH}.time"
          if ! /usr/bin/time -v -o "$evidence" \
            scripts/libghostty-native.sh test-source-archive-policy; then
            cat "$evidence"
            exit 1
          fi
          cat "$evidence"
          output="$GRAITH_LIBGHOSTTY_WORK/source-archive-policy-test/output"
          sha256sum \
            "$output/regular-from-thin.a" \
            "$output/regular-from-thin-second.a" \
            "$output/regular-from-regular.a" \
            "$output/regular-from-regular-second.a"
          residue=""
          if ! residue="$(find "$GRAITH_LIBGHOSTTY_WORK" \
            \( -name 'regular-archive.*' -o -name 'source-archive.*' -o \
            -name '.zig-archive-snapshot.*' -o -name '.libghostty-pkgconfig.*' -o \
            -name '.libghostty-archive.*' \) -print -quit)"; then
            echo "could not inspect archive-policy residue" >&2
            exit 1
          fi
          if [ -n "$residue" ]; then
            echo "archive-policy residue survived: $residue" >&2
            exit 1
          fi
          echo "archive_policy_residue=none"
      - name: Verify committed headers match the source pin
        env:
          SOURCE: ${{ runner.temp }}/ghostty-${{ matrix.goarch }}/ghostty/include/ghostty
        run: diff -ru "$SOURCE" gui/shared/Sources/CGhosttyVT/include/ghostty
      - name: Compile and optionally run the isolated backend
        env:
          GOARCH: ${{ matrix.goarch }}
          GRAITH_LIBGHOSTTY_KEEP_WORK: "1"
          GRAITH_LIBGHOSTTY_WORK: ${{ runner.temp }}/ghostty-${{ matrix.goarch }}
          LIBRARY: ${{ runner.temp }}/libghostty-${{ matrix.goarch }}.a
          PKG_CONFIG_PATH: ${{ runner.temp }}/ghostty-${{ matrix.goarch }}/pkgconfig
          RUN_TESTS: ${{ matrix.run_tests }}
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          run_timed() {
            if [[ "$#" -lt 2 || ! "$1" =~ ^[a-z0-9-]+$ ]]; then
              echo "run_timed requires a safe label and command" >&2
              return 2
            fi
            local label="$1"
            shift
            local evidence="${RUNNER_TEMP}/${label}-${GOARCH}.time"
            if ! /usr/bin/time -v -o "$evidence" "$@"; then
              cat "$evidence" || true
              return 1
            fi
            cat "$evidence"
          }
          if [ "$RUN_TESTS" = "true" ]; then
            run_timed source-test scripts/libghostty-native.sh source-test "$TARGET"
            run_timed wrapper go test -count=1 go.mitchellh.com/libghostty
            run_timed pty go test -count=1 -tags=libghostty ./internal/pty
            run_timed daemon go test -count=1 -tags=libghostty ./internal/daemon \
              -run 'TestLibghostty|TestProbeUpgrade|TestUpgradeHelperHandoff'
            run_timed pty-race go test -race -count=1 -tags=libghostty ./internal/pty \
              -run 'TestGhostty'
            run_timed compatibility-race go test -race -count=1 \
              -tags=libghostty ./internal/pty \
              -run '^TestTerminalBackendCompatibilityCorpus$'
            run_timed daemon-race go test -race -count=1 -tags=libghostty ./internal/daemon \
              -run 'TestLibghostty|TestProbeUpgrade|TestUpgradeHelperHandoff'
            run_timed daemon-lifecycle scripts/libghostty-native.sh daemon-test
            # Fixed budgets avoid the wall-clock deadline path affected by
            # golang/go#75804. Snapshot CI reached 494,054 executions; local
            # request/helper calibration reached 789,507-829,186 and 341-747.
            run_timed fuzz-snapshot go test -tags=libghostty ./internal/pty \
              -run '^$' -parallel=4 \
              -fuzz '^FuzzGhosttySnapshotDecoder$' -fuzztime=500000x
            run_timed fuzz-request go test -tags=libghostty ./internal/pty \
              -run '^$' -parallel=4 \
              -fuzz '^FuzzGhosttyRequestDecoder$' -fuzztime=830000x
            run_timed fuzz-helper go test -tags=libghostty ./internal/pty \
              -run '^$' -parallel=4 \
              -fuzz '^FuzzGhosttyHelperWrite$' -fuzztime=750x
          else
            run_timed pty-cross env CGO_ENABLED=1 GOOS=linux \
              CC="zig cc -target $TARGET" \
              go test -c -tags=libghostty -o "${RUNNER_TEMP}/pty-${GOARCH}.test" \
              ./internal/pty
            run_timed daemon-cross env CGO_ENABLED=1 GOOS=linux \
              CC="zig cc -target $TARGET" \
              go test -c -tags=libghostty -o "${RUNNER_TEMP}/daemon-${GOARCH}.test" \
              ./internal/daemon
          fi
          package_dir="${RUNNER_TEMP}/native-binaries"
          binary="$package_dir/gr-linux-${GOARCH}"
          mkdir -p "$package_dir"
          run_timed binary-build env CGO_ENABLED=1 GOOS=linux \
            CC="zig cc -target $TARGET" \
            go build -trimpath -tags=libghostty \
              -ldflags="-extldflags=-Wl,--strip-debug" \
              -o "$binary" ./cmd/graith
          cp THIRD_PARTY_NOTICES.libghostty.md libghostty-native.spdx.json \
            "$package_dir/"

          build_info=""
          if ! build_info="$(go version -m "$binary")" || [[ -z "$build_info" ]]; then
            echo "could not read the tagged binary build metadata" >&2
            exit 1
          fi
          printf '%s\n' "$build_info"
          if [[ "$build_info" == *$'\tdep\tgithub.com/charmbracelet/x/vt\t'* ]]; then
            echo "tagged Linux binary contains the pure-Go terminal dependency" >&2
            exit 1
          fi
          sha256sum "$binary" "$LIBRARY" \
            "$package_dir/THIRD_PARTY_NOTICES.libghostty.md" \
            "$package_dir/libghostty-native.spdx.json"
          stat --printf='binary_size=%s binary_mode=%a binary_uid=%u\n' "$binary"
          file "$binary"
          section_info=""
          if ! section_info="$(readelf --sections --wide "$binary")" ||
            [[ -z "$section_info" ]]; then
            echo "could not read the tagged Linux binary section table" >&2
            exit 1
          fi
          section_grep_status=0
          if grep -E '[[:space:]]\.debug_' <<<"$section_info" >/dev/null; then
            echo "tagged Linux binary retained a debug section after stripping" >&2
            exit 1
          else
            section_grep_status=$?
          fi
          if [ "$section_grep_status" -ne 1 ]; then
            echo "could not verify the tagged Linux binary debug sections" >&2
            exit 1
          fi
          readelf -h "$binary"
          dynamic_info=""
          if ! dynamic_info="$(readelf -d "$binary")" || [[ -z "$dynamic_info" ]]; then
            echo "could not read the tagged Linux binary dynamic dependencies" >&2
            exit 1
          fi
          printf '%s\n' "$dynamic_info"
          dependency_grep_status=0
          if grep -Ei 'NEEDED.*(ghostty|simdutf|highway)' \
            <<<"$dynamic_info" >/dev/null; then
            echo "tagged Linux binary has an unexpected native shared dependency" >&2
            exit 1
          else
            dependency_grep_status=$?
          fi
          if [ "$dependency_grep_status" -ne 1 ]; then
            echo "could not verify the tagged Linux binary shared dependencies" >&2
            exit 1
          fi
          dynamic_symbols=""
          if ! dynamic_symbols="$(readelf --dyn-syms --wide "$binary")" ||
            [[ -z "$dynamic_symbols" ]]; then
            echo "could not read the tagged Linux binary dynamic symbols" >&2
            exit 1
          fi
          symbol_pattern='^[[:space:]]*[[:digit:]]+:[[:space:]]+[[:xdigit:]]+[[:space:]]+[[:digit:]]+[[:space:]]+FUNC[[:space:]]+GLOBAL[[:space:]]+[^[:space:]]+[[:space:]]+[[:digit:]]+[[:space:]]+ghostty_terminal_new$'
          if ! grep -E "$symbol_pattern" <<<"$dynamic_symbols" >/dev/null; then
            echo "tagged Linux binary does not define global ghostty_terminal_new" >&2
            exit 1
          fi

          package_files=""
          expected_package_files=""
          if ! package_files="$(find "$package_dir" -mindepth 1 -maxdepth 1 \
            -type f -exec basename {} \; | LC_ALL=C sort)" ||
            [[ -z "$package_files" ]] ||
            ! expected_package_files="$(printf '%s\n' \
              "gr-linux-${GOARCH}" THIRD_PARTY_NOTICES.libghostty.md \
              libghostty-native.spdx.json | LC_ALL=C sort)" ||
            [[ -z "$expected_package_files" || \
              "$package_files" != "$expected_package_files" ]]; then
            echo "Linux testing artifact contents are incomplete or unexpected" >&2
            exit 1
          fi
          printf 'package_files=%s\n' "$package_files"
          for artifact in \
            "$binary" \
            "$package_dir/THIRD_PARTY_NOTICES.libghostty.md" \
            "$package_dir/libghostty-native.spdx.json"; do
            privacy_status=0
            if grep -aEq '/home/runner|/Users/|/private/var/folders/|/runner/work/' \
              "$artifact"; then
              echo "Linux testing artifact ${artifact##*/} contains a local or CI path" >&2
              exit 1
            else
              privacy_status=$?
            fi
            if [ "$privacy_status" -ne 1 ]; then
              echo "could not privacy-scan Linux testing artifact ${artifact##*/}" >&2
              exit 1
            fi
          done
          echo "package_privacy_scan=pass"

          if [ "$RUN_TESTS" = "true" ]; then
            link_source="${RUNNER_TEMP}/libghostty-link.c"
            link_binary="${RUNNER_TEMP}/libghostty-link"
            if ! printf '%s\n' \
              'extern void ghostty_terminal_new(void);' \
              'int main(void) {' \
              '    void (*volatile terminal_new)(void) = ghostty_terminal_new;' \
              '    return terminal_new == 0;' \
              '}' >"$link_source"; then
              exit 1
            fi
            run_timed archive-link cc -o "$link_binary" "$link_source" \
              "$LIBRARY"
            run_timed archive-link-run "$link_binary"
            run_timed binary-version "$binary" --json version
            ldd "$binary"
            scripts/libghostty-native.sh verify-dependency-unit
            scripts/libghostty-native.sh verify-generated-dependency-unit
            scripts/libghostty-native.sh verify-metadata \
              "$GRAITH_LIBGHOSTTY_WORK/ghostty"
            validator_dir="${RUNNER_TEMP}/spdx-validator"
            spdx_jar=""
            if ! spdx_jar="$(scripts/libghostty-native.sh \
              install-spdx-validator "$validator_dir")" || [[ -z "$spdx_jar" ]]; then
              echo "could not install the checksum-verified SPDX validator" >&2
              exit 1
            fi
            scripts/libghostty-native.sh validate-spdx "$spdx_jar" \
              "$package_dir/libghostty-native.spdx.json"
          fi
      - name: Upload Linux testing binary
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gr-libghostty-linux-${{ matrix.goarch }}
          path: ${{ runner.temp }}/native-binaries/
          if-no-files-found: error

  native-gate:
    name: Native backend gate
    if: always()
    needs:
      - changes
      - default-builds
      - apple-adapter
      - linux-adapter
    runs-on: ubuntu-latest
    steps:
      - name: Require relevant native jobs to pass
        env:
          CHANGES_RESULT: ${{ needs.changes.result }}
          NATIVE_RELEVANT: ${{ needs.changes.outputs.native }}
          DEFAULT_BUILDS_RESULT: ${{ needs.default-builds.result }}
          APPLE_ADAPTER_RESULT: ${{ needs.apple-adapter.result }}
          LINUX_ADAPTER_RESULT: ${{ needs.linux-adapter.result }}
          EVENT_NAME: ${{ github.event_name }}
          INCLUDE_LINUX: ${{ inputs.include_linux }}
        run: |
          set -euo pipefail
          if [ "$CHANGES_RESULT" != "success" ]; then
            echo "Change detection did not succeed: $CHANGES_RESULT" >&2
            exit 1
          fi
          if [ "$NATIVE_RELEVANT" != "true" ]; then
            echo "No libghostty-relevant files changed; native gate passes."
            exit 0
          fi
          linux_required=true
          if [ "$EVENT_NAME" = "workflow_dispatch" ] && [ "$INCLUDE_LINUX" != "true" ]; then
            linux_required=false
          fi
          if [ "$DEFAULT_BUILDS_RESULT" != "success" ] || \
            [ "$APPLE_ADAPTER_RESULT" != "success" ] || \
            { [ "$linux_required" = "true" ] && [ "$LINUX_ADAPTER_RESULT" != "success" ]; }; then
            echo "Required native jobs did not pass:" >&2
            echo "  default builds: $DEFAULT_BUILDS_RESULT" >&2
            echo "  macOS arm64 adapter: $APPLE_ADAPTER_RESULT" >&2
            echo "  Linux adapter matrix: $LINUX_ADAPTER_RESULT" >&2
            exit 1
          fi
          echo "Required native jobs passed."
