name: Dependency Review

# Blocks PRs that introduce dependencies with known vulnerabilities (part of
# the supply-chain hardening in #697). Reviews the go.mod/go.sum delta against
# GitHub's advisory database.

on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # Fail the PR on newly introduced high-severity (or worse) vulns.
          fail-on-severity: high
