name: Secret Scan

# Secret scanning for the supply-chain hardening in #697. Two complementary
# detectors run as a fast PR/push gate, plus a scheduled full-history sweep:
#   - TruffleHog with --only-verified (live-credential verification, low noise)
#   - Gitleaks (regex/entropy detectors — catches things TruffleHog doesn't)

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Daily full-history sweep to catch anything a diff-scoped PR/push scan
    # missed (e.g. a secret introduced then reverted within a branch).
    - cron: '23 5 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  trufflehog:
    name: TruffleHog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # Full history so the scheduled/push scan can walk the commit range;
          # the action diffs base..head on PRs.
          fetch-depth: 0
          persist-credentials: false
      - name: TruffleHog (verified secrets only)
        uses: trufflesecurity/trufflehog@00155c9dc586f34d189adc83d3ac2698c2ec551f # v3.95.8
        with:
          # On a PR the action scans base..head; on push/schedule/dispatch it
          # scans the whole checked-out history (a full-history sweep).
          extra_args: --only-verified

  gitleaks:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e # v3.0.0
        env:
          # Required by the action; used to post PR annotations. graith is a
          # public repo, so no GITLEAKS_LICENSE is needed.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
