name: Stable Release

on:
  push:
    tags:
      - "v*"
  pull_request:

permissions:
  contents: read

concurrency:
  group: stable-release-${{ github.event_name == 'push' && github.ref || github.event.pull_request.number }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  RETAIN_RELEASES: "5"

jobs:
  release-context:
    name: Bind stable release context
    runs-on: ubuntu-24.04
    outputs:
      revision: ${{ steps.release.outputs.revision }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - id: release
        name: Select one immutable revision and version
        env:
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          revision="$(git rev-parse HEAD)"
          test "$revision" = "$GITHUB_SHA"
          if [ "$EVENT_NAME" = push ]; then
            tag="$GITHUB_REF_NAME"
            version="${tag#v}"
            [[ "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]
            test "$(git rev-list -n 1 "$tag")" = "$revision"
          else
            version="0.0.0-pr.${GITHUB_RUN_ID}.${GITHUB_RUN_ATTEMPT}"
            tag="v${version}"
          fi
          {
            echo "revision=$revision"
            echo "version=$version"
            echo "tag=$tag"
          } >>"$GITHUB_OUTPUT"

  build-darwin:
    name: Build and verify stable Darwin archives
    needs: release-context
    runs-on: macos-26
    timeout-minutes: 60
    env:
      GORELEASER_CURRENT_TAG: ${{ needs.release-context.outputs.tag }}
      GRAITH_RELEASE_VERSION: ${{ needs.release-context.outputs.version }}
      RELEASE_REVISION: ${{ needs.release-context.outputs.revision }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Prepare the exact pinned Apple Silicon backend
        env:
          GRAITH_LIBGHOSTTY_KEEP_WORK: "1"
          GRAITH_LIBGHOSTTY_WORK: ${{ runner.temp }}/libghostty-native
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$RELEASE_REVISION"
          test "$(uname -s)-$(uname -m)" = Darwin-arm64
          scripts/libghostty-native.sh test
          scripts/libghostty-native.sh test-metadata-policy
          scripts/libghostty-native.sh test-darwin-linkage-policy
          scripts/libghostty-native.sh test-exclusive-publish
          spdx_jar="$(scripts/libghostty-native.sh install-spdx-validator \
            "${RUNNER_TEMP}/spdx-validator")"
          scripts/libghostty-native.sh validate-spdx "$spdx_jar"
          {
            echo "GRAITH_LIBGHOSTTY_WORK=$GRAITH_LIBGHOSTTY_WORK"
            echo "PKG_CONFIG_PATH=$GRAITH_LIBGHOSTTY_WORK/pkgconfig"
            echo "GRAITH_SPDX_VALIDATOR_JAR=$spdx_jar"
          } >>"$GITHUB_ENV"

      - name: Configure fail-closed stable signing and notarization
        if: github.event_name == 'push'
        env:
          MACOS_SIGNING_CERTIFICATE: ${{ secrets.MACOS_SIGNING_CERTIFICATE }}
          MACOS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_SIGNING_CERTIFICATE_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_SIGNING_TEAM_ID: ${{ secrets.MACOS_SIGNING_TEAM_ID }}
          MACOS_SIGNING_REQUIREMENT: ${{ secrets.MACOS_SIGNING_REQUIREMENT }}
          APPLE_NOTARY_PRIVATE_KEY: ${{ secrets.APPLE_NOTARY_PRIVATE_KEY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          missing=""
          for name in MACOS_SIGNING_CERTIFICATE MACOS_SIGNING_CERTIFICATE_PASSWORD \
            MACOS_SIGNING_IDENTITY MACOS_SIGNING_TEAM_ID MACOS_SIGNING_REQUIREMENT \
            APPLE_NOTARY_PRIVATE_KEY APPLE_NOTARY_KEY_ID APPLE_NOTARY_ISSUER_ID; do
            [ -n "${!name}" ] || missing="${missing:+${missing} }${name}"
          done
          if [ -n "$missing" ]; then
            echo "::error::Stable Darwin artifacts require signing and notarization; missing: $missing"
            exit 1
          fi

          keychain="$RUNNER_TEMP/graith-release.keychain-db"
          certificate="$RUNNER_TEMP/graith-release.p12"
          notary_key="$RUNNER_TEMP/AuthKey.p8"
          keychain_password="$(openssl rand -hex 24)"
          printf '%s' "$MACOS_SIGNING_CERTIFICATE" | base64 --decode >"$certificate"
          printf '%s' "$APPLE_NOTARY_PRIVATE_KEY" >"$notary_key"
          chmod 600 "$certificate" "$notary_key"
          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$certificate" -k "$keychain" \
            -P "$MACOS_SIGNING_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$keychain_password" "$keychain"
          security list-keychains -d user -s "$keychain"
          security default-keychain -d user -s "$keychain"
          xcrun notarytool store-credentials graith-release \
            --key "$notary_key" --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID"
          requirement_b64="$(printf '%s' "$MACOS_SIGNING_REQUIREMENT" | base64 | tr -d '\n')"
          {
            echo "GRAITH_RELEASE_KEYCHAIN=$keychain"
            echo "GRAITH_MACOS_SIGNING_IDENTITY=$MACOS_SIGNING_IDENTITY"
            echo "GRAITH_SIGNING_TEAM_ID=$MACOS_SIGNING_TEAM_ID"
            echo "GRAITH_SIGNING_REQUIREMENT=$MACOS_SIGNING_REQUIREMENT"
            echo "GRAITH_SIGNING_REQUIREMENT_B64=$requirement_b64"
            echo "GRAITH_NOTARY_PROFILE=graith-release"
            echo "GRAITH_SIGNED_SNAPSHOT=false"
          } >>"$GITHUB_ENV"

      - name: Configure deterministic unsigned PR service bundles
        if: github.event_name == 'pull_request'
        run: echo "GRAITH_SIGNED_SNAPSHOT=false" >>"$GITHUB_ENV"

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          version: "~> v2"
          args: ${{ github.event_name == 'pull_request' && 'release --snapshot --skip=publish --clean -f .goreleaser.yaml' || 'release --skip=publish --clean -f .goreleaser.yaml' }}

      - name: Verify final Darwin archive bytes and lifecycle
        shell: bash
        run: |
          set -euo pipefail
          version="$GRAITH_RELEASE_VERSION"
          arm64="dist/graith_${version}_darwin_arm64.tar.gz"
          shopt -s nullglob
          archives=(dist/graith_*_darwin_*.tar.gz)
          test "${#archives[@]}" -eq 1
          test -f "$arm64"
          if find dist -maxdepth 1 -name '*_charm*' -print -quit | grep -q .; then
            echo "::error::Stable release produced a separately named rollback archive"
            exit 1
          fi

          snapshot=false
          [ "$GITHUB_EVENT_NAME" = pull_request ] && snapshot=true
          macos/service/verify-release-archive.sh \
            "$arm64" "$arm64.service-verified.txt" "$snapshot"

          arm64_root="$(mktemp -d)"
          tar -xzf "$arm64" -C "$arm64_root"
          lipo "$arm64_root/gr" -verify_arch arm64
          scripts/libghostty-native.sh verify-darwin-arm64-candidate \
            "$arm64_root/gr" "$RELEASE_REVISION"
          scripts/libghostty-native.sh verify-candidate-spdx \
            "$arm64_root/gr" "$RELEASE_REVISION" \
            "$arm64_root/libghostty-native.spdx.json" gr
          scripts/libghostty-native.sh validate-spdx "$GRAITH_SPDX_VALIDATOR_JAR" \
            "$arm64_root/libghostty-native.spdx.json"
          cmp "$arm64_root/gr" "$arm64_root/Graith.app/Contents/MacOS/gr"
          "$arm64_root/gr" --graith-internal-libghostty-self-test

          charm="${RUNNER_TEMP}/gr-charm"
          CGO_ENABLED=0 go build -trimpath \
            -ldflags="-s -w -X github.com/d0ugal/graith/internal/version.Version=$version -X github.com/d0ugal/graith/internal/version.CommitSHA=$RELEASE_REVISION" \
            -o "$charm" ./cmd/graith
          GRAITH_LIBGHOSTTY_DAEMON_BINARY="$arm64_root/gr" \
            GRAITH_LIBGHOSTTY_UPGRADE_FROM_BINARY="$charm" \
            go test -v -race -count=1 -tags='integration releaseartifact' -timeout=15m \
              -run '^(TestLibghosttyDaemonLifecycle|TestLibghosttyCharmToNativeUpgrade)$' \
              ./internal/integration

          jq -n --arg revision "$RELEASE_REVISION" --arg version "$version" \
            --arg arm64 "$(shasum -a 256 "$arm64" | awk '{print $1}')" \
            '{revision:$revision,version:$version,artifacts:{
              ("graith_"+$version+"_darwin_arm64.tar.gz"):$arm64}}' \
            >dist/stable-darwin-manifest.json

      - name: Upload verified Darwin artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: stable-darwin-${{ needs.release-context.outputs.revision }}-${{ github.run_id }}
          path: |
            dist/graith_${{ needs.release-context.outputs.version }}_darwin_arm64.tar.gz
            dist/stable-darwin-manifest.json
          if-no-files-found: error
          overwrite: true
          retention-days: 2

      - name: Remove temporary macOS signing keychain
        if: always()
        run: |
          if [ -n "${GRAITH_RELEASE_KEYCHAIN:-}" ]; then
            security delete-keychain "$GRAITH_RELEASE_KEYCHAIN" || true
          fi

  build-linux:
    name: Build and verify stable Linux artifacts (${{ matrix.goarch }})
    needs: release-context
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            target: x86_64-linux-gnu
          - goarch: arm64
            target: aarch64-linux-gnu
    env:
      GORELEASER_CURRENT_TAG: ${{ needs.release-context.outputs.tag }}
      GRAITH_RELEASE_GOARCH: ${{ matrix.goarch }}
      GRAITH_RELEASE_VERSION: ${{ needs.release-context.outputs.version }}
      RELEASE_REVISION: ${{ needs.release-context.outputs.revision }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Install package inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cpio rpm2cpio

      - name: Install checksum-verified Zig
        run: |
          set -euo pipefail
          zig_version="$(jq -er '.zig.version' libghostty-native.lock.json)"
          zig_url="$(jq -er '.zig.linuxX8664URL' libghostty-native.lock.json)"
          zig_sha256="$(jq -er '.zig.linuxX8664SHA256' libghostty-native.lock.json)"
          mkdir -p "${RUNNER_TEMP}/zig"
          curl --proto '=https' --tlsv1.2 --fail --location --silent --show-error \
            "$zig_url" --output "${RUNNER_TEMP}/zig.tar.xz"
          printf '%s  %s\n' "$zig_sha256" "${RUNNER_TEMP}/zig.tar.xz" | \
            sha256sum --check --status
          tar -xf "${RUNNER_TEMP}/zig.tar.xz" -C "${RUNNER_TEMP}/zig" \
            --strip-components=1
          echo "${RUNNER_TEMP}/zig" >>"$GITHUB_PATH"
          test "$("${RUNNER_TEMP}/zig/zig" version)" = "$zig_version"

      - name: Build the exact pinned native dependency unit
        env:
          GRAITH_LIBGHOSTTY_KEEP_WORK: "1"
          GRAITH_LIBGHOSTTY_WORK: ${{ runner.temp }}/libghostty-${{ matrix.goarch }}
          LIBRARY: ${{ runner.temp }}/libghostty-${{ matrix.goarch }}.a
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$RELEASE_REVISION"
          scripts/libghostty-native.sh source-build "$TARGET" "$LIBRARY"
          scripts/libghostty-native.sh verify-static-archive "$LIBRARY"
          GRAITH_LIBGHOSTTY_WORK="${RUNNER_TEMP}/archive-policy-${GRAITH_RELEASE_GOARCH}" \
            scripts/libghostty-native.sh test-source-archive-policy
          scripts/libghostty-native.sh verify-dependency-unit
          scripts/libghostty-native.sh verify-generated-dependency-unit
          spdx_jar="$(scripts/libghostty-native.sh install-spdx-validator \
            "${RUNNER_TEMP}/spdx-validator-${GRAITH_RELEASE_GOARCH}")"
          {
            echo "GRAITH_LIBGHOSTTY_WORK=$GRAITH_LIBGHOSTTY_WORK"
            echo "PKG_CONFIG_PATH=$GRAITH_LIBGHOSTTY_WORK/pkgconfig"
            echo "GRAITH_SPDX_VALIDATOR_JAR=$spdx_jar"
            echo "CC=zig cc -target $TARGET"
          } >>"$GITHUB_ENV"

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          version: "~> v2"
          args: ${{ github.event_name == 'pull_request' && 'release --snapshot --skip=publish --clean -f .goreleaser-linux.yaml' || 'release --skip=publish --clean -f .goreleaser-linux.yaml' }}

      - name: Verify archive and every package final byte
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          version="$GRAITH_RELEASE_VERSION"
          arch="$GRAITH_RELEASE_GOARCH"
          archive="dist/graith_${version}_linux_${arch}.tar.gz"
          debs=(dist/graith_*_linux_"${arch}".deb)
          rpms=(dist/graith_*_linux_"${arch}".rpm)
          apks=(dist/graith_*_linux_"${arch}".apk)
          test -f "$archive"
          test "${#debs[@]}" -eq 1 && test "${#rpms[@]}" -eq 1 && test "${#apks[@]}" -eq 1
          if find dist -maxdepth 1 -name '*_charm*' -print -quit | grep -q .; then
            echo "::error::Stable Linux build produced a rollback artifact"
            exit 1
          fi
          scripts/libghostty-native.sh verify-linux-release-bundle \
            "$archive" "${debs[0]}" "${rpms[0]}" "${apks[0]}" \
            "$RELEASE_REVISION" "$arch" "$version" \
            "$GRAITH_SPDX_VALIDATOR_JAR" false

          jq -n --arg revision "$RELEASE_REVISION" --arg version "$version" \
            --arg goarch "$arch" \
            --arg archive_name "$(basename "$archive")" \
            --arg archive_sha "$(sha256sum "$archive" | awk '{print $1}')" \
            --arg deb_name "$(basename "${debs[0]}")" \
            --arg deb_sha "$(sha256sum "${debs[0]}" | awk '{print $1}')" \
            --arg rpm_name "$(basename "${rpms[0]}")" \
            --arg rpm_sha "$(sha256sum "${rpms[0]}" | awk '{print $1}')" \
            --arg apk_name "$(basename "${apks[0]}")" \
            --arg apk_sha "$(sha256sum "${apks[0]}" | awk '{print $1}')" \
            '{revision:$revision,version:$version,goarch:$goarch,artifacts:{
              ($archive_name):$archive_sha,($deb_name):$deb_sha,
              ($rpm_name):$rpm_sha,($apk_name):$apk_sha}}' \
            >"dist/stable-linux-${arch}-manifest.json"

      - name: Upload verified Linux artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: stable-linux-${{ matrix.goarch }}-${{ needs.release-context.outputs.revision }}-${{ github.run_id }}
          path: |
            dist/graith_${{ needs.release-context.outputs.version }}_linux_${{ matrix.goarch }}.tar.gz
            dist/graith_*_linux_${{ matrix.goarch }}.deb
            dist/graith_*_linux_${{ matrix.goarch }}.rpm
            dist/graith_*_linux_${{ matrix.goarch }}.apk
            dist/stable-linux-${{ matrix.goarch }}-manifest.json
          if-no-files-found: error
          overwrite: true
          retention-days: 2

  execute-linux:
    name: Execute stable Linux artifacts (${{ matrix.goarch }})
    needs:
      - release-context
      - build-linux
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            runner: ubuntu-24.04
          - goarch: arm64
            runner: ubuntu-24.04-arm
    env:
      GRAITH_RELEASE_VERSION: ${{ needs.release-context.outputs.version }}
      RELEASE_REVISION: ${{ needs.release-context.outputs.revision }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Install package inspection tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cpio rpm2cpio

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: stable-linux-${{ matrix.goarch }}-${{ needs.release-context.outputs.revision }}-${{ github.run_id }}
          path: dist

      - name: Reverify and exercise release-shaped bytes
        shell: bash
        env:
          GOARCH: ${{ matrix.goarch }}
          GRAITH_LIBGHOSTTY_WORK: ${{ runner.temp }}/linux-execution-${{ matrix.goarch }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          version="$GRAITH_RELEASE_VERSION"
          archive="dist/graith_${version}_linux_${GOARCH}.tar.gz"
          debs=(dist/graith_*_linux_"${GOARCH}".deb)
          rpms=(dist/graith_*_linux_"${GOARCH}".rpm)
          apks=(dist/graith_*_linux_"${GOARCH}".apk)
          spdx_jar="$(scripts/libghostty-native.sh install-spdx-validator \
            "${RUNNER_TEMP}/spdx-validator-${GOARCH}")"
          scripts/libghostty-native.sh verify-linux-release-bundle \
            "$archive" "${debs[0]}" "${rpms[0]}" "${apks[0]}" \
            "$RELEASE_REVISION" "$GOARCH" "$version" "$spdx_jar" true

          release_root="$(mktemp -d)"
          tar -xzf "$archive" -C "$release_root"
          charm="${RUNNER_TEMP}/gr-charm"
          CGO_ENABLED=0 go build -trimpath \
            -ldflags="-s -w -X github.com/d0ugal/graith/internal/version.Version=$version -X github.com/d0ugal/graith/internal/version.CommitSHA=$RELEASE_REVISION" \
            -o "$charm" ./cmd/graith
          GRAITH_LIBGHOSTTY_DAEMON_BINARY="$release_root/gr" \
            GRAITH_LIBGHOSTTY_UPGRADE_FROM_BINARY="$charm" \
            go test -v -race -count=1 -tags='integration releaseartifact' -timeout=15m \
              -run '^(TestLibghosttyDaemonLifecycle|TestLibghosttyCharmToNativeUpgrade)$' \
              ./internal/integration

  assemble-stable:
    name: Aggregate complete stable release
    needs:
      - release-context
      - build-darwin
      - build-linux
      - execute-linux
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      GRAITH_RELEASE_VERSION: ${{ needs.release-context.outputs.version }}
      RELEASE_REVISION: ${{ needs.release-context.outputs.revision }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: stable-*-${{ needs.release-context.outputs.revision }}-${{ github.run_id }}
          path: dist
          merge-multiple: true

      - name: Verify same-revision manifests and exact output set
        run: |
          set -euo pipefail
          version="$GRAITH_RELEASE_VERSION"
          expected="$(printf '%s\n' \
            "graith_${version}_darwin_arm64.tar.gz" \
            "graith_${version}_linux_amd64.apk" \
            "graith_${version}_linux_amd64.deb" \
            "graith_${version}_linux_amd64.rpm" \
            "graith_${version}_linux_amd64.tar.gz" \
            "graith_${version}_linux_arm64.apk" \
            "graith_${version}_linux_arm64.deb" \
            "graith_${version}_linux_arm64.rpm" \
            "graith_${version}_linux_arm64.tar.gz" | sort)"
          actual="$(find dist -maxdepth 1 -type f -name 'graith_*' \
            -exec basename {} \; | sort)"
          if [ "$actual" != "$expected" ]; then
            echo "::error::Stable artifact set is incomplete or unexpected"
            diff -u <(printf '%s\n' "$expected") <(printf '%s\n' "$actual") || true
            exit 1
          fi
          if find dist -maxdepth 1 -name '*_charm*' -print -quit | grep -q .; then
            echo "::error::Assembled stable release contains a rollback artifact"
            exit 1
          fi

          for manifest in dist/stable-*-manifest.json; do
            jq -e --arg revision "$RELEASE_REVISION" --arg version "$version" \
              '.revision == $revision and .version == $version' "$manifest" >/dev/null
          done
          while IFS= read -r name; do
            sha="$(sha256sum "dist/$name" | awk '{print $1}')"
            matches="$(jq -r --arg name "$name" --arg sha "$sha" \
              'select(.artifacts[$name] == $sha) | .revision' \
              dist/stable-*-manifest.json | wc -l)"
            test "$matches" -eq 1
          done <<<"$expected"
          (
            cd dist
            mapfile -t artifacts <<<"$expected"
            sha256sum "${artifacts[@]}" >checksums.txt
            test "$(wc -l <checksums.txt)" -eq 9
            sha256sum --check checksums.txt
          )

      - name: Validate downstream metadata without publishing
        run: |
          set -euo pipefail
          metadata="$(mktemp -d)"
          mkdir -p "$metadata/aur"
          scripts/render-stable-homebrew.sh "$GRAITH_RELEASE_VERSION" \
            dist/checksums.txt "$metadata/graith.rb"
          scripts/render-stable-aur.sh "$GRAITH_RELEASE_VERSION" \
            dist/checksums.txt "$metadata/aur"
          ruby -c "$metadata/graith.rb"
          bash -n "$metadata/aur/PKGBUILD"
          test -s "$metadata/aur/.SRCINFO"

      - name: Upload assembled stable release
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: stable-release-${{ needs.release-context.outputs.revision }}-${{ github.run_id }}
          path: |
            dist/graith_*
            dist/checksums.txt
          if-no-files-found: error
          overwrite: true
          retention-days: 2

  attest-stable:
    name: Finalize and attest stable release
    if: github.event_name == 'push'
    needs:
      - release-context
      - assemble-stable
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      attestations: write
      id-token: write
    env:
      GRAITH_RELEASE_VERSION: ${{ needs.release-context.outputs.version }}
      RELEASE_REVISION: ${{ needs.release-context.outputs.revision }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ needs.release-context.outputs.revision }}
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: stable-release-${{ needs.release-context.outputs.revision }}-${{ github.run_id }}
          path: dist

      - name: Install release signing tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends cpio gnupg rpm rpm2cpio

      - name: Apply configured RPM signatures before checksums and provenance
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          if [ -z "$GPG_PRIVATE_KEY" ]; then
            echo "::notice::apt/yum signing is not configured; retaining unsigned GitHub RPMs"
          else
            if [ -z "$GPG_PASSPHRASE" ]; then
              echo "::error::GPG_PRIVATE_KEY is set but GPG_PASSPHRASE is missing"
              exit 1
            fi
            GNUPGHOME="$(mktemp -d)"
            chmod 700 "$GNUPGHOME"
            export GNUPGHOME
            {
              echo allow-loopback-pinentry
              echo allow-preset-passphrase
              echo "max-cache-ttl 3600"
            } >"$GNUPGHOME/gpg-agent.conf"
            printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
            key_id="$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/ {print $5; exit}')"
            test -n "$key_id"
            signing_epoch="$(git show -s --format=%ct "$RELEASE_REVISION")"
            [[ "$signing_epoch" =~ ^[1-9][0-9]*$ ]]
            preset=/usr/lib/gnupg/gpg-preset-passphrase
            [ -x "$preset" ] || preset=/usr/libexec/gpg-preset-passphrase
            gpg --with-keygrip --list-secret-keys --with-colons "$key_id" | \
              GPG_PASSPHRASE="$GPG_PASSPHRASE" \
                scripts/rpm-preset-keygrips.sh "$preset"
            {
              echo '%_signature gpg'
              printf '%%_gpg_name %s\n' "$key_id"
              echo '%__gpg /usr/bin/gpg'
              printf '%%_gpg_sign_cmd %%{__gpg} gpg --no-verbose --no-armor --batch --pinentry-mode loopback --no-secmem-warning --faked-system-time %s! -u "%%{_gpg_name}" -sbo %%{__signature_filename} --digest-algo sha256 %%{__plaintext_filename}\n' "$signing_epoch"
            } >"$HOME/.rpmmacros"
            gpg --armor --export "$key_id" >"${RUNNER_TEMP}/graith.asc"
            sudo rpm --import "${RUNNER_TEMP}/graith.asc"
            for package in dist/*.rpm; do
              rpm --addsign "$package"
              signature="$(rpm --checksig "$package")"
              [[ "$signature" == *"signatures OK"* ]]
            done
          fi
          mapfile -t artifacts < <(find dist -maxdepth 1 -type f -name 'graith_*' \
            -printf '%f\n' | sort)
          test "${#artifacts[@]}" -eq 9
          (cd dist && sha256sum "${artifacts[@]}" >checksums.txt && \
            sha256sum --check checksums.txt)

      - name: Reverify finalized Linux package contents
        shell: bash
        env:
          GRAITH_LIBGHOSTTY_WORK: ${{ runner.temp }}/final-package-verification
        run: |
          set -euo pipefail
          shopt -s nullglob
          spdx_jar="$(scripts/libghostty-native.sh install-spdx-validator \
            "${RUNNER_TEMP}/spdx-validator-final")"
          for arch in amd64 arm64; do
            archive="dist/graith_${GRAITH_RELEASE_VERSION}_linux_${arch}.tar.gz"
            debs=(dist/graith_*_linux_"${arch}".deb)
            rpms=(dist/graith_*_linux_"${arch}".rpm)
            apks=(dist/graith_*_linux_"${arch}".apk)
            test "${#debs[@]}" -eq 1 && test "${#rpms[@]}" -eq 1 && test "${#apks[@]}" -eq 1
            scripts/libghostty-native.sh verify-linux-release-bundle \
              "$archive" "${debs[0]}" "${rpms[0]}" "${apks[0]}" \
              "$RELEASE_REVISION" "$arch" "$GRAITH_RELEASE_VERSION" \
              "$spdx_jar" false
          done

      - uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: dist/*

      - name: Upload final signed/checksummed stable release
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: stable-final-${{ needs.release-context.outputs.revision }}-${{ github.run_id }}
          path: dist/*
          if-no-files-found: error
          overwrite: true
          retention-days: 2

  publish-stable:
    name: Publish verified stable release
    if: github.event_name == 'push'
    needs:
      - release-context
      - assemble-stable
      - attest-stable
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    concurrency:
      group: stable-publisher
      cancel-in-progress: false
      queue: max
    permissions:
      contents: write
      attestations: read
    env:
      RELEASE_REVISION: ${{ needs.release-context.outputs.revision }}
      RELEASE_TAG: ${{ needs.release-context.outputs.tag }}
      RELEASE_VERSION: ${{ needs.release-context.outputs.version }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          ref: ${{ needs.release-context.outputs.revision }}
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: stable-final-${{ needs.release-context.outputs.revision }}-${{ github.run_id }}
          path: dist

      - id: publishing_secrets
        name: Validate publishing credentials before mutation
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
          AUR_KEY: ${{ secrets.AUR_KEY }}
        run: |
          set -euo pipefail
          if [ -z "$RELEASE_TOKEN" ]; then
            echo "::error::Stable publication requires RELEASE_TOKEN for Homebrew"
            exit 1
          fi
          if [ -n "$GPG_PRIVATE_KEY" ]; then
            missing=""
            [ -n "$GPG_PASSPHRASE" ] || missing=GPG_PASSPHRASE
            [ -n "$RELEASE_TOKEN" ] || missing="${missing:+$missing }RELEASE_TOKEN"
            if [ -n "$missing" ]; then
              echo "::error::Release repository signing is half-configured; missing: $missing"
              exit 1
            fi
            echo "has_gpg=true" >>"$GITHUB_OUTPUT"
          else
            echo "has_gpg=false" >>"$GITHUB_OUTPUT"
          fi
          if [ -n "$AUR_KEY" ]; then
            echo "has_aur=true" >>"$GITHUB_OUTPUT"
          else
            echo "has_aur=false" >>"$GITHUB_OUTPUT"
          fi

      - name: Verify release, tag, checksums, and provenance
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$RELEASE_REVISION"
          test "$(wc -l <dist/checksums.txt)" -eq 9
          (cd dist && sha256sum --check checksums.txt)

          tag_object="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$RELEASE_TAG")"
          tag_sha="$(jq -er '.object.sha' <<<"$tag_object")"
          tag_type="$(jq -er '.object.type' <<<"$tag_object")"
          if [ "$tag_type" = tag ]; then
            tag_sha="$(gh api "repos/$GITHUB_REPOSITORY/git/tags/$tag_sha" --jq '.object.sha')"
          fi
          test "$tag_sha" = "$RELEASE_REVISION"

          release="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG")"
          draft="$(jq -er '.draft' <<<"$release")"
          case "$draft" in true|false) ;; *) exit 1 ;; esac
          expected_assets="$(find dist -maxdepth 1 -type f -exec basename {} \; | sort)"
          existing_assets="$(jq -r '.assets[].name' <<<"$release" | sort)"
          unexpected="$(comm -23 \
            <(printf '%s\n' "$existing_assets") \
            <(printf '%s\n' "$expected_assets"))"
          test -z "$unexpected"
          if [ -n "$existing_assets" ]; then
            existing="$(mktemp -d)"
            gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --dir "$existing"
            while IFS= read -r name; do
              test -n "$name"
              cmp "$existing/$name" "dist/$name"
            done <<<"$existing_assets"
          fi
          for artifact in dist/*; do
            gh attestation verify "$artifact" --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/goreleaser.yml" \
              --source-digest "$RELEASE_REVISION" --source-ref "refs/tags/$RELEASE_TAG"
          done

      - name: Stage or confirm the exact verified assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          expected="$(find dist -maxdepth 1 -type f -exec basename {} \; | sort)"
          actual="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" \
            --jq '.assets[].name' | sort)"
          draft="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" \
            --jq '.draft')"
          if [ "$draft" = false ]; then
            test "$actual" = "$expected"
            exit 0
          fi
          test "$draft" = true
          while IFS= read -r name; do
            if ! grep -Fxq "$name" <<<"$actual"; then
              gh release upload "$RELEASE_TAG" "dist/$name" --repo "$GITHUB_REPOSITORY"
            fi
          done <<<"$expected"
          actual="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" \
            --jq '.assets[].name' | sort)"
          test "$actual" = "$expected"

      - name: Check out Homebrew tap
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: d0ugal/homebrew-tap
          token: ${{ secrets.RELEASE_TOKEN }}
          ref: main
          path: homebrew-tap
          fetch-depth: 0

      - name: Prepare Homebrew formula from assembled checksums
        run: |
          set -euo pipefail
          scripts/render-stable-homebrew.sh "$RELEASE_VERSION" dist/checksums.txt \
            homebrew-tap/Formula/graith.rb
          ruby -c homebrew-tap/Formula/graith.rb

      - name: Check out apt/yum repository
        if: steps.publishing_secrets.outputs.has_gpg == 'true'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          repository: d0ugal/graith-repo
          token: ${{ secrets.RELEASE_TOKEN }}
          ref: main
          path: graith-repo
          fetch-depth: 0

      - name: Install apt/yum repository tooling
        if: steps.publishing_secrets.outputs.has_gpg == 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends aptly createrepo-c gnupg rpm

      - name: Prepare signed apt/yum repository inputs
        if: steps.publishing_secrets.outputs.has_gpg == 'true'
        env:
          GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
          GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
        run: |
          set -euo pipefail
          GNUPGHOME="$(mktemp -d)"
          chmod 700 "$GNUPGHOME"
          export GNUPGHOME GPG_PASSPHRASE
          {
            echo allow-loopback-pinentry
            echo allow-preset-passphrase
            echo "max-cache-ttl 3600"
          } >"$GNUPGHOME/gpg-agent.conf"
          printf '%s' "$GPG_PRIVATE_KEY" | gpg --batch --import
          GPG_KEY_ID="$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/ {print $5; exit}')"
          test -n "$GPG_KEY_ID"
          export GPG_KEY_ID
          scripts/publish-linux-repositories.sh dist graith-repo "$RETAIN_RELEASES"

      - name: Prepare optional AUR package
        if: steps.publishing_secrets.outputs.has_aur == 'true'
        env:
          AUR_KEY: ${{ secrets.AUR_KEY }}
        run: |
          set -euo pipefail
          key="$(mktemp)"
          known_hosts="$(mktemp)"
          printf '%s' "$AUR_KEY" >"$key"
          chmod 600 "$key"
          printf '%s\n' \
            'aur.archlinux.org ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAIEuBKrPzbawxA/k2g6NcyV5jmqwJ2s+zpgZGZ7tpLIcN' \
            >"$known_hosts"
          export GIT_SSH_COMMAND="ssh -i $key -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes -o UserKnownHostsFile=$known_hosts"
          echo "GIT_SSH_COMMAND=$GIT_SSH_COMMAND" >>"$GITHUB_ENV"
          git clone ssh://aur@aur.archlinux.org/graith-bin.git aur-package
          scripts/render-stable-aur.sh "$RELEASE_VERSION" dist/checksums.txt aur-package
          bash -n aur-package/PKGBUILD
          (
            cd aur-package
            git config user.name graith-bot
            git config user.email graith-bot@users.noreply.github.com
            git add PKGBUILD .SRCINFO
            if ! git diff --cached --quiet; then
              git commit -m "Update to ${RELEASE_VERSION}"
            fi
          )

      - name: Reverify and expose the complete release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          remote="$(mktemp -d)"
          gh release download "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --dir "$remote"
          test "$(find "$remote" -maxdepth 1 -type f | wc -l)" -eq 10
          cmp "$remote/checksums.txt" dist/checksums.txt
          (cd "$remote" && sha256sum --check checksums.txt)
          draft="$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/$RELEASE_TAG" \
            --jq '.draft')"
          if [ "$draft" = true ]; then
            gh release edit "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" --draft=false
          else
            test "$draft" = false
          fi

      # Public URLs become available before any downstream repository points at
      # them. A retry accepts the already-public exact asset set and converges
      # any channel push that was interrupted after exposure.
      - name: Publish prepared Homebrew formula
        run: |
          scripts/publish-push.sh homebrew-tap \
            "chore: update graith to ${RELEASE_VERSION}"

      - name: Publish prepared apt/yum repositories
        if: steps.publishing_secrets.outputs.has_gpg == 'true'
        run: |
          scripts/publish-push.sh graith-repo \
            "chore: publish graith ${RELEASE_TAG} apt/yum packages"

      - name: Publish prepared optional AUR package
        if: steps.publishing_secrets.outputs.has_aur == 'true'
        run: git -C aur-package push origin HEAD:master
