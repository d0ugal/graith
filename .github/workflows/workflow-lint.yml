name: Workflow Lint

# Static analysis of the GitHub Actions workflows themselves: actionlint
# (YAML + shellcheck of `run:` blocks) and zizmor (Actions SAST — template
# injection, over-broad permissions, unpinned actions, dangerous triggers).
# This is the regression gate for the supply-chain hardening in #697.

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - '.github/zizmor.yml'
  pull_request:
    paths:
      - '.github/workflows/**'
      - '.github/zizmor.yml'

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: read # verify actionlint's build provenance (gh attestation verify)
    env:
      ACTIONLINT_VERSION: 1.7.12
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install actionlint
        # Pinned, provenance-verified install. The release tarball is verified
        # against actionlint's GitHub build-provenance attestation
        # (`gh attestation verify`), which binds it via Sigstore to the
        # rhysd/actionlint release workflow. This is version-independent — the
        # ACTIONLINT_VERSION customManager in renovate.json5 can bump the version
        # with no per-version checksum to update — and a tampered or MITM'd
        # download fails closed. Mirrors the nono install in sandbox.yml.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tarball="actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          url="https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/${tarball}"
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          curl -fsSL --proto '=https' --tlsv1.2 "$url" -o "$tmp/$tarball"
          # Fail closed: only install if build provenance verifies against
          # rhysd/actionlint's release workflow (proves actionlint's own CI
          # produced the artifact). --signer-workflow pins the exact workflow,
          # not just the repo, so a compromised non-release workflow in the same
          # repo cannot mint a passing attestation.
          gh attestation verify "$tmp/$tarball" --repo rhysd/actionlint \
            --signer-workflow rhysd/actionlint/.github/workflows/release.yaml
          tar -xzf "$tmp/$tarball" -C "$tmp" actionlint
          sudo install -m 0755 "$tmp/actionlint" /usr/local/bin/actionlint
          actionlint --version
      - name: Run actionlint
        # shellcheck is preinstalled on ubuntu runners; actionlint shells out
        # to it to lint the scripts inside `run:` blocks.
        run: actionlint -color

  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: read # verify zizmor's build provenance (gh attestation verify)
    env:
      ZIZMOR_VERSION: 1.26.1
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Install zizmor
        # Pinned, provenance-verified install (replaces the unpinned `uv`-based
        # download, which was version-pinned but not hash-locked). The release
        # tarball is verified against zizmor's GitHub build-provenance
        # attestation (`gh attestation verify`), binding it via Sigstore to the
        # zizmorcore/zizmor release workflow. Version-independent (bumped by the
        # ZIZMOR_VERSION customManager in renovate.json5) and fails closed on a
        # tampered artifact — consistent with actionlint above and nono in
        # sandbox.yml.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          tarball="zizmor-x86_64-unknown-linux-gnu.tar.gz"
          url="https://github.com/zizmorcore/zizmor/releases/download/v${ZIZMOR_VERSION}/${tarball}"
          tmp="$(mktemp -d)"
          trap 'rm -rf "$tmp"' EXIT
          curl -fsSL --proto '=https' --tlsv1.2 "$url" -o "$tmp/$tarball"
          # Fail closed: only install if build provenance verifies against
          # zizmorcore/zizmor's release workflow (proves zizmor's own CI produced
          # the artifact). --signer-workflow pins the exact workflow, not just the
          # repo, so a compromised non-release workflow in the same repo cannot
          # mint a passing attestation.
          gh attestation verify "$tmp/$tarball" --repo zizmorcore/zizmor \
            --signer-workflow zizmorcore/zizmor/.github/workflows/release-binaries.yml
          dest="$HOME/.local/bin"
          mkdir -p "$dest"
          tar -xzf "$tmp/$tarball" -C "$dest" zizmor
          chmod +x "$dest/zizmor"
          echo "$dest" >> "$GITHUB_PATH"
          "$dest/zizmor" --version
      - name: Run zizmor
        # --min-confidence=medium keeps the gate honest without blocking on
        # zizmor's low-confidence heuristics (e.g. artipacked on checkouts
        # that must persist credentials to push, cache-poisoning on
        # release-triggered setup-go). Real issues (template injection,
        # dangerous triggers, over-broad permissions) surface at medium+.
        run: zizmor --min-confidence=medium .github/workflows/

  scripts:
    name: workflow scripts
    # Unit tests for the JS helpers used by github-script steps (e.g.
    # docs-preview cleanup/prune). Uses the Node built-in test runner — no
    # package.json or dependencies. Guards the #763 truncation-safety fix.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Run workflow script tests
        # Let bash expand the glob so Node receives explicit file paths — this
        # works on every Node ≥ 18, whereas Node's own `--test` glob support
        # only landed in v21 and the runner's system Node isn't pinned here.
        run: node --test .github/workflows/scripts/*.test.js
