name: Docs Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]
    paths:
      - 'website/**'
      - '.github/workflows/docs-preview.yml'
  # Safety-net prune of stale screenshot dirs (in case an on-close cleanup
  # was ever missed — dropped event, deleted PR, etc.).
  schedule:
    - cron: '17 4 * * *'

# Screenshots are published to an orphan `screenshots` branch and linked
# from a sticky PR comment. Same-repo PRs only (fork PRs get a read-only
# token and cannot push the branch or comment).
permissions:
  contents: read

concurrency:
  group: docs-preview-${{ github.event.pull_request.number || github.event_name }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  preview:
    name: Screenshot changed pages
    if: github.event_name == 'pull_request' && github.event.action != 'closed'
    runs-on: ubuntu-latest
    # Pushes screenshots to the orphan branch and upserts the sticky PR comment.
    permissions:
      contents: write
      pull-requests: write
    env:
      HUGO_VERSION: 0.154.5
      K6_IMAGE: grafana/k6:1.8.0-with-browser
      BASE_URL: http://localhost:8080
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          # Screenshots are pushed via github-script (its own GITHUB_TOKEN),
          # not the checkout's persisted credentials.
          persist-credentials: false

      - name: Install Hugo (extended) + Dart Sass
        run: |
          wget -O /tmp/hugo.deb \
            "https://github.com/gohugoio/hugo/releases/download/v${HUGO_VERSION}/hugo_extended_${HUGO_VERSION}_linux-amd64.deb"
          sudo dpkg -i /tmp/hugo.deb
          sudo snap install dart-sass

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: website/go.mod

      - name: Determine changed pages
        id: changed
        # Pass the PR/context values via env rather than interpolating
        # `${{ ... }}` straight into the shell body — they never touch the
        # script as code, only as data (defends against template injection if
        # a future field here is attacker-influenced).
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          BASE="$BASE_SHA"
          HEAD="$HEAD_SHA"
          changed="$(git diff --name-only "$BASE" "$HEAD" -- website/ || true)"
          echo "Changed under website/:"; echo "$changed"

          # A change to theme/config/layout/assets affects every page.
          global=0
          if echo "$changed" | grep -qE '^website/(hugo\.toml|go\.(mod|sum)|layouts/|assets/|\.ci/)'; then
            global=1
          fi

          emit() { # path, deleted -> {"url","name","hasBase","deleted"}
            local f="$1" deleted="$2" rel url name hasBase
            rel="${f#website/content/docs/}"; rel="${rel%.md}"
            if [ "$rel" = "_index" ]; then
              url="/docs/"; name="docs-home"
            else
              # Flatten any nested path so the screenshot/diff filenames stay in
              # a single flat dir (screenshot.js writes /out/<name>-<vp>.png and
              # a `/` would need a subdir that isn't created).
              url="/docs/${rel}/"; name="${rel//\//-}"
            fi
            # Does this page exist at the base commit? If not it's new in this
            # PR — there's no baseline to diff against, so it renders in full.
            if git cat-file -e "$BASE_SHA:$f" 2>/dev/null; then hasBase=true; else hasBase=false; fi
            # jq -n --arg keeps the JSON well-formed even if a filename contains
            # characters that would break a hand-built string.
            jq -nc --arg url "$url" --arg name "$name" \
              --argjson hasBase "$hasBase" --argjson deleted "$deleted" \
              '{url:$url,name:$name,hasBase:$hasBase,deleted:$deleted}'
          }

          {
            if [ "$global" = 1 ]; then
              for f in website/content/docs/*.md; do emit "$f" false; done
            else
              # `|| true` so a no-match grep doesn't abort the step under
              # `set -o pipefail` (e.g. a website/** change that touches no
              # doc page — the job should no-op, not fail).
              { echo "$changed" | grep -E '^website/content/docs/.*\.md$' || true; } | while read -r f; do
                [ -n "$f" ] || continue
                if [ -f "$f" ]; then
                  emit "$f" false
                elif git cat-file -e "$BASE_SHA:$f" 2>/dev/null; then
                  # Gone from head but present at base — deleted in this PR.
                  emit "$f" true
                fi
              done
            fi
          } | jq -s '.' > pages.json

          count="$(jq 'length' pages.json)"
          basecount="$(jq '[.[] | select(.hasBase)] | length' pages.json)"
          echo "global=$global"       >> "$GITHUB_OUTPUT"
          echo "count=$count"         >> "$GITHUB_OUTPUT"
          echo "basecount=$basecount" >> "$GITHUB_OUTPUT"
          echo "Pages to screenshot ($count, $basecount with a baseline):"; cat pages.json

      # Build the site twice — once at the PR's base commit, once at its head —
      # with the same pinned Hugo, so unchanged content renders identically and
      # the row diff aligns. The base build is skipped when every changed page
      # is new (no baseline to diff against).
      - name: Build head + base sites
        if: steps.changed.outputs.count != '0'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BASECOUNT: ${{ steps.changed.outputs.basecount }}
        run: |
          hugo --gc --minify --baseURL "${BASE_URL}/" \
            --source website --destination "$PWD/site-head"
          if [ "$BASECOUNT" != "0" ]; then
            git worktree add --detach /tmp/base-tree "$BASE_SHA"
            hugo --gc --minify --baseURL "${BASE_URL}/" \
              --source /tmp/base-tree/website --destination "$PWD/site-base"
          fi

      - name: Screenshot head + base with k6 (Chromium)
        if: steps.changed.outputs.count != '0'
        env:
          BASECOUNT: ${{ steps.changed.outputs.basecount }}
        run: |
          # Serve a built site and screenshot the given page set into $out.
          # Always uses the head checkout's screenshot.js so both renders are
          # captured identically regardless of what the base commit shipped.
          shoot() { # $1=site dir  $2=out dir  $3=pages json
            python3 -m http.server 8080 --directory "$1" &
            local pid=$!
            for _ in $(seq 1 40); do
              curl -sf "$BASE_URL/docs/" >/dev/null && break
              sleep 0.5
            done
            mkdir -p "$2" && chmod 777 "$2"
            docker run --rm --network host \
              -e K6_BROWSER_HEADLESS=true \
              -e K6_BROWSER_ARGS=no-sandbox \
              -e BASE_URL="$BASE_URL" \
              -e PAGES="$(cat "$3")" \
              -v "$PWD/website/.ci/screenshot.js:/screenshot.js:ro" \
              -v "$2:/out" \
              "$K6_IMAGE" run /screenshot.js
            kill "$pid" 2>/dev/null || true
            wait "$pid" 2>/dev/null || true
          }
          # Head render skips deleted pages (they 404 at head); base render
          # covers everything with a baseline, including the deleted ones.
          jq '[.[] | select(.deleted | not)]' pages.json > head-pages.json
          shoot "$PWD/site-head" "$PWD/shots/head" head-pages.json
          if [ "$BASECOUNT" != "0" ]; then
            jq '[.[] | select(.hasBase)]' pages.json > base-pages.json
            shoot "$PWD/site-base" "$PWD/shots/base" base-pages.json
          fi
          sudo chown -R "$(id -u):$(id -g)" shots
          ls -R shots

      - name: Build diffs
        if: steps.changed.outputs.count != '0'
        run: |
          # Integrity-locked, script-free install of the pinned pngjs (see
          # .github/workflows/scripts/package-lock.json) — this job holds a
          # write-scoped token, so it must not run whatever the registry serves
          # at run time. --ignore-scripts blocks dependency lifecycle hooks.
          npm ci --prefix .github/workflows/scripts --ignore-scripts
          node .github/workflows/scripts/docs-diff-run.js \
            pages.json "$PWD/shots/base" "$PWD/shots/head" "$PWD/shots/out"
          echo "Published diff assets:"; ls -la shots/out

      - name: Publish screenshots and comment
        if: steps.changed.outputs.count != '0'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            // Shared compare-and-retry loop for the single `screenshots` branch
            // every docs-preview writer contends over (issue #765). Resolved
            // relative to the workspace, per the github-script require docs.
            // Fork PRs get a read-only GITHUB_TOKEN regardless of the job's
            // requested permissions, so pushing the screenshots branch and
            // upserting the comment would 403 and fail the job (#783). Publish
            // only for same-repo PRs; forks still ran build/screenshot above,
            // so their docs render is validated — just not previewed.
            //
            // Decide this INLINE, before requiring the workspace helper: for a
            // `pull_request` event the workflow YAML is taken from the trusted
            // base, but the checked-out workspace (including docs-preview.js)
            // is the fork's PR merge ref. Reading the guard from that module
            // would let a fork PR that also edits docs-preview.js bypass it and
            // re-trigger the 403. The mirror of this check lives in the helper's
            // `isSameRepoPR` (used by the base-pinned cleanup job) and is unit
            // tested. Fail closed: a missing/deleted head repo skips publish.
            const headRepo = context.payload.pull_request.head.repo;
            const sameRepo =
              !!headRepo && headRepo.full_name === `${context.repo.owner}/${context.repo.repo}`;
            if (!sameRepo) {
              core.info('Fork PR — screenshots are published only for same-repo PRs (fork PRs get a read-only token). Skipping publish.');
              return;
            }
            // Same-repo PR: its head branch lives in the base repo, so the
            // checked-out helper is trusted. Safe to require and run its writes.
            const { commitToBranch } = require('./.github/workflows/scripts/docs-preview.js');
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request.number;
            const shortSha = context.sha.substring(0, 7);
            const branch = 'screenshots';
            // Include run id + attempt so re-runs on the same commit get a
            // fresh storage path — otherwise GitHub's image CDN (camo) can
            // serve a stale, cached screenshot from the previous run.
            const runId = context.runId;
            const runAttempt = process.env.GITHUB_RUN_ATTEMPT || '1';
            // Leading YYYYMMDD (UTC) makes the run-dir's age cheap to read
            // back for the scheduled stale-prune job.
            const ymd = new Date().toISOString().slice(0, 10).replace(/-/g, '');
            const dir = `pr-${pr}/${ymd}-${shortSha}-${runId}.${runAttempt}`;

            // The diff step (docs-diff-run.js) wrote the images to publish plus
            // a manifest describing each page × viewport: kind `diff` (a
            // base-|-head crop of the changed bands), `new` (full render of a
            // page with no baseline), or `same` (renders identically — no image,
            // just a note).
            const outDir = path.join('shots', 'out');
            let manifest = {};
            try {
              manifest = JSON.parse(fs.readFileSync(path.join(outDir, 'manifest.json'), 'utf8'));
            } catch (e) {
              core.info(`No diff manifest (${e.message}) — nothing to publish.`);
              return;
            }
            const files = [
              ...new Set(
                Object.values(manifest)
                  .flatMap(vps => Object.values(vps))
                  .filter(v => v.file)
                  .map(v => v.file),
              ),
            ].sort();
            if (Object.keys(manifest).length === 0) { core.info('No changed pages.'); return; }

            // Build the blobs for the screenshots. Blobs are content-addressed,
            // so this is independent of the branch tip — done once, outside the
            // retry loop.
            const tree = [];
            for (const f of files) {
              const content = fs.readFileSync(path.join(outDir, f)).toString('base64');
              const blob = await github.rest.git.createBlob({ owner, repo, content, encoding: 'base64' });
              tree.push({ path: `${dir}/${f}`, mode: '100644', type: 'blob', sha: blob.data.sha });
            }

            // Append onto the current tip (chaining via base_tree so existing
            // screenshots are preserved), creating an orphan root commit if the
            // branch doesn't exist yet. commitToBranch re-invokes buildCommit on
            // a lost race so the commit always chains onto the re-read tip, and
            // only falls back to createRef on a genuine branch-absent case —
            // never by swallowing an unrelated updateRef failure.
            // Only commit when there are actually images to push — a PR whose
            // markdown edits produce no visual change (every page `same`) still
            // gets a comment below, but nothing goes on the branch.
            if (files.length > 0) {
              await commitToBranch({
                github, core, owner, repo,
                createIfAbsent: true,
                buildCommit: async (tip) => {
                  const treeObj = await github.rest.git.createTree({
                    owner, repo, tree, base_tree: tip ? tip.treeSha : undefined,
                  });
                  const commit = await github.rest.git.createCommit({
                    owner, repo,
                    message: `docs preview: PR #${pr} @ ${shortSha}`,
                    tree: treeObj.data.sha,
                    parents: tip ? [tip.commitSha] : [],
                  });
                  return commit.data.sha;
                },
              });
            }

            // Render the comment from the manifest. `diff`/`new`/`deleted`
            // entries show an image; `same` shows a note. A diff crop is
            // base-|-head so it's ~twice as wide as a single render — size the
            // columns to fit.
            const raw = f => `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${dir}/${f}`;
            const cell = (v, width) => {
              if (!v) return '—';
              if (v.kind === 'same') return '_no visual change_';
              return `<img src="${raw(v.file)}" width="${width}">`;
            };
            const kinds = names => names.flatMap(n => Object.values(manifest[n]).map(v => v.kind));
            const names = Object.keys(manifest).sort();
            const allKinds = new Set(kinds(names));
            let body = `<!-- docs-preview -->\n### 📸 Docs preview\n\n`;
            body += `Diffed ${names.length} changed page(s) against \`${context.payload.pull_request.base.ref}\` at commit \`${shortSha}\`. `;
            body += `Each image shows only the changed regions — **base │ head**, cropped with context.\n\n`;
            if (allKinds.has('new')) body += `_Pages new in this PR (no baseline) are shown in full._\n\n`;
            if (allKinds.has('deleted')) body += `_Pages removed in this PR are shown as their last render on \`${context.payload.pull_request.base.ref}\`._\n\n`;
            for (const name of names) {
              const p = manifest[name];
              const removed = p.desktop?.kind === 'deleted' || p.mobile?.kind === 'deleted';
              body += `<details><summary><b>${name}</b>${removed ? ' — removed' : ''}</summary>\n\n`;
              body += `| Desktop | Mobile |\n|---|---|\n`;
              body += `| ${cell(p.desktop, 620)} | ${cell(p.mobile, 300)} |\n\n</details>\n\n`;
            }
            // Only link the branch storage when we actually committed images —
            // an all-`same` PR skips the commit, so <dir> never exists.
            if (files.length > 0) {
              body += `_Screenshots stored on the [\`${branch}\`](https://github.com/${owner}/${repo}/tree/${branch}/${dir}) branch._`;
            } else {
              body += `_No visual changes to preview._`;
            }

            // Upsert a single sticky comment.
            const marker = '<!-- docs-preview -->';
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number: pr });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number: pr, body });
            }

  cleanup:
    name: Clean up screenshots
    if: github.event.action == 'closed'
    runs-on: ubuntu-latest
    # Rewrites the screenshots branch and updates the sticky PR comment.
    permissions:
      contents: write
      pull-requests: write
    steps:
      # Only the helper script is needed — check it out sparsely (screenshots
      # are read/written via the API, never the working tree) and don't
      # persist git credentials (the branch is rewritten via github-script's
      # token, not `git push`). Pin to the PR *base* SHA: this job runs with a
      # write-scoped token and then executes the checked-out script, so it must
      # run the trusted base version, never PR-controlled code from the default
      # merge ref (the workflow YAML itself is already taken from the base).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event.pull_request.base.sha }}
          persist-credentials: false
          sparse-checkout: .github/workflows/scripts
      - name: Remove PR screenshots from the screenshots branch
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { cleanup } = require('./.github/workflows/scripts/docs-preview.js');
            await cleanup({ github, context, core });

  prune:
    name: Prune stale screenshots
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    # Rewrites the screenshots branch only (no PR comment on the schedule run).
    permissions:
      contents: write
    steps:
      # Only the helper script is needed — see the cleanup job's checkout note.
      # No `ref` pin needed here: the schedule trigger checks out the default
      # branch (trusted), never PR-controlled content.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          sparse-checkout: .github/workflows/scripts
      - name: Remove screenshot dirs older than 30 days
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { prune } = require('./.github/workflows/scripts/docs-preview.js');
            await prune({ github, context, core });
