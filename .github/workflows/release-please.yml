name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}
      - uses: googleapis/release-please-action@v5
        with:
          # Manifest mode: read release-please-config.json + the manifest so
          # settings like `bump-minor-pre-major` actually apply. Passing
          # `release-type`/`path` inputs instead puts the action in
          # input-driven mode, where the config file is IGNORED and a pre-1.0
          # breaking change graduates straight to 1.0.0. release-type is set
          # per-package inside the config file.
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.RELEASE_TOKEN }}
          target-branch: main
