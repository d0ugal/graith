name: Publish pinned Linux libghostty artifacts

on:
  push:
    branches: [main]
    paths: [libghostty-native.lock.json, scripts/libghostty-native.sh, .github/workflows/libghostty-native-publish.yml]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    # This workflow never runs in the context of a pull request.  The source
    # checkout and lock are therefore reviewed main-branch content.
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main'
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            target: x86_64-linux-gnu
          - goarch: arm64
            target: aarch64-linux-gnu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with: {persist-credentials: false}
      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7
        with: {go-version-file: go.mod}
      - name: Build from the pinned source revision
        env:
          TARGET: ${{ matrix.target }}
          GOARCH: ${{ matrix.goarch }}
          GH_TOKEN: ${{ github.token }}
          GRAITH_LIBGHOSTTY_WORK: ${{ runner.temp }}/ghostty
          GRAITH_LIBGHOSTTY_SOURCE_BUILD: '1'
        run: |
          set -euo pipefail
          tag="$(jq -er ".ghostty.linuxArtifacts.amd64.url | capture(\"/download/(?<tag>[^/]+)/\").tag" libghostty-native.lock.json)"
          asset="libghostty-vt-linux-$GOARCH.tar.gz"
          expected_asset_sha="$(jq -er ".ghostty.linuxArtifacts.${GOARCH}.sha256" libghostty-native.lock.json)"
          if remote_asset_sha="$(gh release view "$tag" --json assets --jq ".assets[] | select(.name == \"$asset\") | .digest" 2>/dev/null)" &&
            [[ -n "$remote_asset_sha" ]]; then
            test "$remote_asset_sha" = "sha256:$expected_asset_sha"
            echo "verified immutable asset already published: $asset"
            exit 0
          fi
          curl --proto '=https' --tlsv1.2 --fail --location --silent --show-error \
            "$(jq -er '.zig.linuxX8664URL' libghostty-native.lock.json)" -o "$RUNNER_TEMP/zig.tar.xz"
          printf '%s  %s\n' "$(jq -er '.zig.linuxX8664SHA256' libghostty-native.lock.json)" "$RUNNER_TEMP/zig.tar.xz" | sha256sum -c -
          mkdir -p "$RUNNER_TEMP/zig"; tar -xf "$RUNNER_TEMP/zig.tar.xz" -C "$RUNNER_TEMP/zig" --strip-components=1
          # GITHUB_PATH is applied only to later workflow steps. Export the
          # path here as well because the build runs in this step.
          export PATH="$RUNNER_TEMP/zig:$PATH"
          echo "$RUNNER_TEMP/zig" >> "$GITHUB_PATH"
          test "$(zig version)" = "$(jq -er '.zig.version' libghostty-native.lock.json)"
          # The script runs host Go helpers while cross-building the library;
          # do not let the target artifact GOARCH select an unexecutable
          # helper binary on the amd64 runner.
          env GOARCH=amd64 scripts/libghostty-native.sh source-build "$TARGET" "$RUNNER_TEMP/libghostty-vt.a"
          mkdir -p "$RUNNER_TEMP/bundle/pkgconfig"
          cp "$RUNNER_TEMP/libghostty-vt.a" "$RUNNER_TEMP/bundle/"
          # The source-build helper writes paths for the runner workspace.
          # Release bundles must be relocatable for consumers.
          sed -e "s#^Cflags:.*#Cflags: -DGHOSTTY_STATIC#" \
            -e "s#^Libs:.*#prefix=\${pcfiledir}/..#" \
            "$GRAITH_LIBGHOSTTY_WORK/pkgconfig/libghostty-vt-static.pc" \
            | sed "/^prefix=/a Libs: -L\${prefix} -lghostty-vt" \
            > "$RUNNER_TEMP/bundle/pkgconfig/libghostty-vt-static.pc"
          test "$(PKG_CONFIG_PATH="$RUNNER_TEMP/bundle/pkgconfig" pkg-config --libs libghostty-vt-static)" = \
            "-L$RUNNER_TEMP/bundle/pkgconfig/.. -lghostty-vt"
          cp libghostty-native.spdx.json THIRD_PARTY_NOTICES.libghostty.md "$RUNNER_TEMP/bundle/"
          jq -n --arg target "$TARGET" --arg arch "$GOARCH" --arg commit "$(jq -er '.ghostty.commit' libghostty-native.lock.json)" \
            '{schemaVersion:1,target:$target,architecture:$arch,ghosttyCommit:$commit}' > "$RUNNER_TEMP/bundle/manifest.json"
          python3 scripts/libghostty-linux-archive.py pack "$RUNNER_TEMP/bundle" \
            "$RUNNER_TEMP/libghostty-vt-linux-$GOARCH.tar.gz"
          python3 scripts/libghostty-linux-archive.py inspect \
            "$RUNNER_TEMP/libghostty-vt-linux-$GOARCH.tar.gz"
          sha256sum "$RUNNER_TEMP/libghostty-vt-linux-$GOARCH.tar.gz"
      - name: Publish only an absent immutable asset
        env:
          GH_TOKEN: ${{ github.token }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          set -euo pipefail
          tag="$(jq -er ".ghostty.linuxArtifacts.amd64.url | capture(\"/download/(?<tag>[^/]+)/\").tag" libghostty-native.lock.json)"
          asset="libghostty-vt-linux-$GOARCH.tar.gz"
          if ! gh release view "$tag" >/dev/null 2>&1; then
            # Both matrix jobs may observe an absent release concurrently.
            # Re-check after a failed create so only the asset upload remains
            # the race, and that upload is guarded below.
            gh release create "$tag" --title "$tag" --notes "Pinned libghostty native artifacts" ||
              gh release view "$tag" >/dev/null
          fi
          if gh release view "$tag" --json assets --jq '.assets[].name' | grep -Fxq "$asset"; then
            remote_asset_sha="$(gh release view "$tag" --json assets --jq ".assets[] | select(.name == \"$asset\") | .digest")"
            expected_asset_sha="$(jq -er ".ghostty.linuxArtifacts.${GOARCH}.sha256" libghostty-native.lock.json)"
            test "$remote_asset_sha" = "sha256:$expected_asset_sha"
            echo "verified immutable asset already published: $asset"
            exit 0
          fi
          gh release upload "$tag" "$RUNNER_TEMP/$asset" --clobber=false
