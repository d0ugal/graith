name: Dev Release

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

# Main runs replace one shared release and tap formula, so publication is
# serialized and the publisher refuses a revision that is no longer main's
# tip. Pull-request runs build the same release-shaped archives without
# publishing and may cancel an older run for the same PR.
concurrency:
  group: dev-release-${{ github.event_name == 'push' && 'publish' || github.event.pull_request.number }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect dev-release-relevant changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      release: ${{ steps.filter.outputs.release }}
    steps:
      - id: filter
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          if [ "$EVENT" != "pull_request" ]; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if ! files="$(gh api "repos/$REPO/pulls/$PR/files" --paginate --jq '.[].filename')"; then
            echo "release=true" >> "$GITHUB_OUTPUT"
            echo "Could not list PR files; running dev release to be safe."
            exit 0
          fi
          if grep -Eq '^\.goreleaser|^\.github/workflows/(dev-release|goreleaser|release-please)\.yml$|^release-please-(manifest|config)\.json$|^go\.(mod|sum)$|^internal/release/|^internal/pty/|^scripts/.*(release|publish)|^scripts/libghostty-native\.sh$|^macos/(service|notifier)/|^libghostty-native\.(lock|spdx)\.json$|^THIRD_PARTY_NOTICES\.libghostty\.md$|^package|^aur|^homebrew' <<<"$files"; then
            echo "release=true" >> "$GITHUB_OUTPUT"
          else
            echo "release=false" >> "$GITHUB_OUTPUT"
          fi

  release-context:
    name: Select dev release context
    needs: changes
    if: >-
      !cancelled() &&
      (needs.changes.result != 'success' || needs.changes.outputs.release == 'true')
    runs-on: ubuntu-24.04
    outputs:
      base_tag: ${{ steps.release.outputs.base_tag }}
      build_epoch: ${{ steps.release.outputs.build_epoch }}
      revision: ${{ steps.release.outputs.revision }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - id: release
        name: Bind one version and revision to every platform job
        run: |
          set -euo pipefail
          revision="$(git rev-parse HEAD)"
          test "$revision" = "$GITHUB_SHA"
          base_tag="$(scripts/dev-release-base-tag.sh)"
          build_epoch="$(date -u +%s)"
          version="$(scripts/dev-release-version.sh "$base_tag" "$build_epoch")"
          {
            echo "base_tag=$base_tag"
            echo "build_epoch=$build_epoch"
            echo "revision=$revision"
            echo "version=$version"
          } >> "$GITHUB_OUTPUT"
          printf 'revision=%s\nversion=%s\n' "$revision" "$version"

  build-darwin:
    name: Build and verify Darwin dev archives
    needs: release-context
    runs-on: macos-26
    timeout-minutes: 45
    env:
      GORELEASER_CURRENT_TAG: ${{ needs.release-context.outputs.base_tag }}
      GRAITH_DEV_VERSION: ${{ needs.release-context.outputs.version }}
      RELEASE_REVISION: ${{ needs.release-context.outputs.revision }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Prepare and validate the pinned macOS arm64 backend
        env:
          GRAITH_LIBGHOSTTY_KEEP_WORK: "1"
          GRAITH_LIBGHOSTTY_WORK: ${{ runner.temp }}/libghostty-native
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$RELEASE_REVISION"
          test "$(uname -s)-$(uname -m)" = Darwin-arm64
          scripts/libghostty-native.sh test
          scripts/libghostty-native.sh test-metadata-policy
          scripts/libghostty-native.sh test-darwin-linkage-policy
          scripts/libghostty-native.sh test-exclusive-publish
          java -version
          spdx_jar="$(scripts/libghostty-native.sh install-spdx-validator \
            "${RUNNER_TEMP}/spdx-validator")"
          scripts/libghostty-native.sh validate-spdx "$spdx_jar"
          {
            echo "GRAITH_LIBGHOSTTY_WORK=$GRAITH_LIBGHOSTTY_WORK"
            echo "PKG_CONFIG_PATH=$GRAITH_LIBGHOSTTY_WORK/pkgconfig"
            echo "GRAITH_SPDX_VALIDATOR_JAR=$spdx_jar"
          } >> "$GITHUB_ENV"

      # Once provisioned, graith and graith-dev share one per-user Service
      # Management registry and must use the same fixed Developer ID
      # requirement. Until then, an entirely absent credential set preserves
      # the legacy direct-spawn dev package. A partial set fails closed.
      - name: Configure optional macOS service signing
        if: github.event_name == 'push'
        env:
          MACOS_SIGNING_CERTIFICATE: ${{ secrets.MACOS_SIGNING_CERTIFICATE }}
          MACOS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_SIGNING_CERTIFICATE_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_SIGNING_TEAM_ID: ${{ secrets.MACOS_SIGNING_TEAM_ID }}
          MACOS_SIGNING_REQUIREMENT: ${{ secrets.MACOS_SIGNING_REQUIREMENT }}
          APPLE_NOTARY_PRIVATE_KEY: ${{ secrets.APPLE_NOTARY_PRIVATE_KEY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          signing_mode="$(macos/service/release-signing-mode.sh)"
          if [ "$signing_mode" = disabled ]; then
            echo "::notice::macOS release signing is not provisioned; publishing the legacy direct-spawn dev package"
            {
              echo "GRAITH_MANAGED_DEV_RELEASE=false"
              echo "GRAITH_SIGNED_SNAPSHOT=false"
            } >> "$GITHUB_ENV"
            exit 0
          fi

          keychain="$RUNNER_TEMP/graith-dev-release.keychain-db"
          certificate="$RUNNER_TEMP/graith-dev-release.p12"
          notary_key="$RUNNER_TEMP/AuthKey-dev.p8"
          keychain_password="$(openssl rand -hex 24)"
          printf '%s' "$MACOS_SIGNING_CERTIFICATE" | base64 --decode > "$certificate"
          printf '%s' "$APPLE_NOTARY_PRIVATE_KEY" > "$notary_key"
          chmod 600 "$certificate" "$notary_key"

          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$certificate" -k "$keychain" \
            -P "$MACOS_SIGNING_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$keychain_password" "$keychain"
          security list-keychains -d user -s "$keychain"
          security default-keychain -d user -s "$keychain"

          xcrun notarytool store-credentials graith-dev-release \
            --key "$notary_key" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID"

          requirement_b64="$(printf '%s' "$MACOS_SIGNING_REQUIREMENT" | base64 | tr -d '\n')"
          {
            echo "GRAITH_RELEASE_KEYCHAIN=$keychain"
            echo "GRAITH_MACOS_SIGNING_IDENTITY=$MACOS_SIGNING_IDENTITY"
            echo "GRAITH_SIGNING_TEAM_ID=$MACOS_SIGNING_TEAM_ID"
            echo "GRAITH_SIGNING_REQUIREMENT=$MACOS_SIGNING_REQUIREMENT"
            echo "GRAITH_SIGNING_REQUIREMENT_B64=$requirement_b64"
            echo "GRAITH_NOTARY_PROFILE=graith-dev-release"
            echo "GRAITH_MANAGED_DEV_RELEASE=true"
            echo "GRAITH_SIGNED_SNAPSHOT=true"
          } >> "$GITHUB_ENV"

      - name: Configure unsigned pull-request packaging
        if: github.event_name == 'pull_request'
        run: |
          {
            echo "GRAITH_MANAGED_DEV_RELEASE=false"
            echo "GRAITH_SIGNED_SNAPSHOT=false"
          } >> "$GITHUB_ENV"

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          version: "~> v2"
          args: release --snapshot --skip=publish --clean -f .goreleaser-dev.yaml

      - name: Verify Darwin dev archives
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          case "${GRAITH_MANAGED_DEV_RELEASE:-false}" in
            true|false) ;;
            *) echo "::error::Invalid managed dev release marker: $GRAITH_MANAGED_DEV_RELEASE"; exit 1 ;;
          esac

          darwin_arm64_archive=dist/graith-dev_darwin_arm64.tar.gz
          all_archives=(dist/graith-dev_*.tar.gz)
          if [ "${#all_archives[@]}" -ne 1 ] || [ ! -f "$darwin_arm64_archive" ]; then
            echo "::error::Expected exactly the native arm64 Darwin dev archive"
            exit 1
          fi
          if find dist -maxdepth 1 -name '*_charm*' -print -quit | grep -q .; then
            echo "::error::Dev release produced a separately named rollback archive"
            exit 1
          fi

          native_unpacked="$(mktemp -d)"
          tar -xzf "$darwin_arm64_archive" -C "$native_unpacked"
          notifier_app="$native_unpacked/GraithNotifier.app"
          notifier="$notifier_app/Contents/MacOS/graith-notifier"
          service_app="$native_unpacked/Graith.app"
          test -d "$notifier_app"
          test -x "$notifier"
          lipo "$notifier" -verify_arch arm64
          codesign --verify --deep --strict "$notifier_app"
          if [ "$GRAITH_MANAGED_DEV_RELEASE" = true ]; then
            test -d "$service_app"
            test -x "$service_app/Contents/MacOS/gr"
            cmp "$native_unpacked/gr-dev" "$service_app/Contents/MacOS/gr"
            macos/service/verify-release-archive.sh \
              "$darwin_arm64_archive" "$darwin_arm64_archive.service-verified.txt" true
          elif [ -e "$service_app" ]; then
            echo "::error::Unmanaged dev archive unexpectedly contains Graith.app"
            exit 1
          fi
          scripts/libghostty-native.sh verify-darwin-arm64-candidate \
            "$native_unpacked/gr-dev" "$RELEASE_REVISION"
          scripts/libghostty-native.sh verify-candidate-spdx \
            "$native_unpacked/gr-dev" "$RELEASE_REVISION" \
            "$native_unpacked/libghostty-native.spdx.json" gr-dev
          scripts/libghostty-native.sh validate-spdx \
            "$GRAITH_SPDX_VALIDATOR_JAR" \
            "$native_unpacked/libghostty-native.spdx.json"
          cmp "$native_unpacked/libghostty-native.spdx.json" \
            macos/build/libghostty-native-arm64/libghostty-native.spdx.json
          cmp "$native_unpacked/THIRD_PARTY_NOTICES.libghostty.md" \
            macos/build/libghostty-native-arm64/THIRD_PARTY_NOTICES.libghostty.md

      - name: Record Darwin artifact identity
        run: |
          set -euo pipefail
          metadata_version="$(jq -er '.version | select(type == "string" and length > 0)' dist/metadata.json)"
          test "$metadata_version" = "$GRAITH_DEV_VERSION"
          jq -n \
            --arg revision "$RELEASE_REVISION" \
            --arg version "$GRAITH_DEV_VERSION" \
            --arg arm64_sha "$(shasum -a 256 dist/graith-dev_darwin_arm64.tar.gz | awk '{print $1}')" \
            '{revision: $revision, version: $version, archives: {
              "graith-dev_darwin_arm64.tar.gz": $arm64_sha
            }}' > dist/dev-darwin-manifest.json

      - name: Upload verified Darwin archives
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          # run_id is stable across job retries, so successful platform jobs from
          # an earlier attempt remain available to a retried downstream job.
          name: dev-darwin-${{ needs.release-context.outputs.revision }}-${{ github.run_id }}
          path: |
            dist/graith-dev_darwin_arm64.tar.gz
            dist/dev-darwin-manifest.json
            dist/metadata.json
          if-no-files-found: error
          overwrite: true
          retention-days: 2

      - name: Remove temporary macOS signing keychain
        if: always()
        run: |
          if [ -n "${GRAITH_RELEASE_KEYCHAIN:-}" ]; then
            security delete-keychain "$GRAITH_RELEASE_KEYCHAIN" || true
          fi

  build-linux:
    name: Build and verify Linux dev archive (${{ matrix.goarch }})
    needs: release-context
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            target: x86_64-linux-gnu
          - goarch: arm64
            target: aarch64-linux-gnu
    env:
      GRAITH_DEV_VERSION: ${{ needs.release-context.outputs.version }}
      RELEASE_REVISION: ${{ needs.release-context.outputs.revision }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Install checksum-verified Zig from the native dependency lock
        run: |
          set -euo pipefail
          zig_version="$(jq -er '.zig.version' libghostty-native.lock.json)"
          zig_url="$(jq -er '.zig.linuxX8664URL' libghostty-native.lock.json)"
          zig_sha256="$(jq -er '.zig.linuxX8664SHA256' libghostty-native.lock.json)"
          mkdir -p "${RUNNER_TEMP}/zig"
          curl --proto '=https' --tlsv1.2 --fail --location --silent --show-error \
            "$zig_url" --output "${RUNNER_TEMP}/zig.tar.xz"
          printf '%s  %s\n' "$zig_sha256" "${RUNNER_TEMP}/zig.tar.xz" | \
            sha256sum --check --status
          tar -xf "${RUNNER_TEMP}/zig.tar.xz" -C "${RUNNER_TEMP}/zig" \
            --strip-components=1
          echo "${RUNNER_TEMP}/zig" >> "$GITHUB_PATH"
          test "$("${RUNNER_TEMP}/zig/zig" version)" = "$zig_version"

      - name: Build the exact pinned Linux dependency unit
        env:
          GRAITH_LIBGHOSTTY_KEEP_WORK: "1"
          GRAITH_LIBGHOSTTY_WORK: ${{ runner.temp }}/libghostty-${{ matrix.goarch }}
          LIBRARY: ${{ runner.temp }}/libghostty-${{ matrix.goarch }}.a
          PKG_CONFIG_PATH: ${{ runner.temp }}/libghostty-${{ matrix.goarch }}/pkgconfig
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          test "$(git rev-parse HEAD)" = "$RELEASE_REVISION"
          scripts/libghostty-native.sh source-build "$TARGET" "$LIBRARY"
          scripts/libghostty-native.sh verify-static-archive "$LIBRARY"
          GRAITH_LIBGHOSTTY_WORK="${RUNNER_TEMP}/archive-policy-${{ matrix.goarch }}" \
            scripts/libghostty-native.sh test-source-archive-policy
          scripts/libghostty-native.sh verify-dependency-unit
          scripts/libghostty-native.sh verify-generated-dependency-unit

      - name: Build and verify the final Linux release archive
        env:
          GRAITH_LIBGHOSTTY_KEEP_WORK: "1"
          GRAITH_LIBGHOSTTY_WORK: ${{ runner.temp }}/libghostty-${{ matrix.goarch }}
          GOARCH: ${{ matrix.goarch }}
          PKG_CONFIG_PATH: ${{ runner.temp }}/libghostty-${{ matrix.goarch }}/pkgconfig
          TARGET: ${{ matrix.target }}
        run: |
          set -euo pipefail
          binary="${RUNNER_TEMP}/gr-dev-${GOARCH}"
          package_dir="${RUNNER_TEMP}/package-${GOARCH}"
          release_dir="${RUNNER_TEMP}/release-${GOARCH}"
          archive_name="graith-dev_linux_${GOARCH}.tar.gz"
          archive="$release_dir/$archive_name"
          mkdir -p "$release_dir"

          CGO_ENABLED=1 GOOS=linux CC="zig cc -target $TARGET" \
            go build -buildvcs=false -trimpath -tags=libghostty \
              -ldflags="-extldflags=-Wl,--strip-debug -X github.com/d0ugal/graith/internal/version.Version=$GRAITH_DEV_VERSION -X github.com/d0ugal/graith/internal/version.CommitSHA=$RELEASE_REVISION" \
              -o "$binary" ./cmd/graith

          java -version
          spdx_jar="$(scripts/libghostty-native.sh install-spdx-validator \
            "${RUNNER_TEMP}/spdx-validator-${GOARCH}")"
          scripts/libghostty-native.sh package-linux \
            "$binary" "$package_dir" "$spdx_jar" "$GOARCH" gr-dev

          source_date_epoch="$(git show -s --format=%ct "$RELEASE_REVISION")"
          tar --sort=name --mtime="@$source_date_epoch" --owner=0 --group=0 \
            --numeric-owner -C "$package_dir" -cf - \
            CHANGELOG.md LICENSE README.md THIRD_PARTY_NOTICES.libghostty.md \
            gr-dev libghostty-native.spdx.json | gzip --no-name > "$archive"
          scripts/libghostty-native.sh verify-linux-dev-archive \
            "$archive" "$RELEASE_REVISION" "$GOARCH" "$GRAITH_DEV_VERSION" \
            "$spdx_jar" false

          archive_sha="$(sha256sum "$archive" | awk '{print $1}')"
          binary_sha="$(jq -er '.packages[] | select(.SPDXID == "SPDXRef-Package-GraithNativeCandidate") | .checksums[] | select(.algorithm == "SHA256") | .checksumValue' \
            "$package_dir/libghostty-native.spdx.json")"
          printf '%s  %s\n' "$archive_sha" "$archive_name" > \
            "$release_dir/$archive_name.sha256"
          jq -n \
            --arg revision "$RELEASE_REVISION" \
            --arg version "$GRAITH_DEV_VERSION" \
            --arg goarch "$GOARCH" \
            --arg archive_name "$archive_name" \
            --arg archive_sha "$archive_sha" \
            --arg binary_sha "$binary_sha" \
            '{revision: $revision, version: $version, goos: "linux", goarch: $goarch,
              archive: {name: $archive_name, sha256: $archive_sha},
              binary: {name: "gr-dev", sha256: $binary_sha}}' > \
            "$release_dir/dev-linux-${GOARCH}-manifest.json"

      - name: Upload verified Linux archive
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dev-linux-${{ matrix.goarch }}-${{ needs.release-context.outputs.revision }}-${{ github.run_id }}
          path: ${{ runner.temp }}/release-${{ matrix.goarch }}/
          if-no-files-found: error
          overwrite: true
          retention-days: 2

  attest-linux:
    name: Attest Linux dev archive (${{ matrix.goarch }})
    if: github.event_name == 'push'
    needs:
      - release-context
      - build-linux
      - execute-linux
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      attestations: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        goarch:
          - amd64
          - arm64
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dev-linux-${{ matrix.goarch }}-${{ needs.release-context.outputs.revision }}-${{ github.run_id }}
          path: ${{ runner.temp }}/release

      - name: Attest the final Linux release archive
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-path: ${{ runner.temp }}/release/graith-dev_linux_${{ matrix.goarch }}.tar.gz

  execute-linux:
    name: Execute Linux dev archive (${{ matrix.goarch }})
    needs:
      - release-context
      - build-linux
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - goarch: amd64
            runner: ubuntu-24.04
          - goarch: arm64
            runner: ubuntu-24.04-arm
    env:
      GRAITH_DEV_VERSION: ${{ needs.release-context.outputs.version }}
      RELEASE_REVISION: ${{ needs.release-context.outputs.revision }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dev-linux-${{ matrix.goarch }}-${{ needs.release-context.outputs.revision }}-${{ github.run_id }}
          path: ${{ runner.temp }}/release

      - name: Reverify and execute the published Linux bytes
        env:
          GOARCH: ${{ matrix.goarch }}
          GRAITH_LIBGHOSTTY_WORK: ${{ runner.temp }}/linux-execution-${{ matrix.goarch }}
        run: |
          set -euo pipefail
          archive_name="graith-dev_linux_${GOARCH}.tar.gz"
          archive="${RUNNER_TEMP}/release/$archive_name"
          manifest="${RUNNER_TEMP}/release/dev-linux-${GOARCH}-manifest.json"
          (
            cd "${RUNNER_TEMP}/release"
            sha256sum --check "$archive_name.sha256"
          )
          jq -e \
            --arg revision "$RELEASE_REVISION" \
            --arg version "$GRAITH_DEV_VERSION" \
            --arg goarch "$GOARCH" \
            --arg archive_name "$archive_name" \
            --arg archive_sha "$(sha256sum "$archive" | awk '{print $1}')" \
            '.revision == $revision and .version == $version and
             .goos == "linux" and .goarch == $goarch and
             .archive.name == $archive_name and .archive.sha256 == $archive_sha' \
            "$manifest" >/dev/null
          spdx_jar="$(scripts/libghostty-native.sh install-spdx-validator \
            "${RUNNER_TEMP}/spdx-validator-${GOARCH}")"
          scripts/libghostty-native.sh verify-linux-dev-archive \
            "$archive" "$RELEASE_REVISION" "$GOARCH" "$GRAITH_DEV_VERSION" \
            "$spdx_jar" true

  assemble-dev:
    name: Aggregate dev release
    needs:
      - release-context
      - build-darwin
      - build-linux
      - execute-linux
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    env:
      GRAITH_DEV_VERSION: ${{ needs.release-context.outputs.version }}
      RELEASE_REVISION: ${{ needs.release-context.outputs.revision }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: dev-*-${{ needs.release-context.outputs.revision }}-${{ github.run_id }}
          path: dist
          merge-multiple: true

      - name: Verify the complete same-commit release set
        run: |
          set -euo pipefail
          shopt -s nullglob
          test "$(git rev-parse HEAD)" = "$RELEASE_REVISION"
          archives=(
            graith-dev_darwin_arm64.tar.gz
            graith-dev_linux_amd64.tar.gz
            graith-dev_linux_arm64.tar.gz
          )
          actual_archives=(dist/graith-dev_*.tar.gz)
          if [ "${#actual_archives[@]}" -ne "${#archives[@]}" ] || \
             find dist -maxdepth 1 -name '*_charm*' -print -quit | grep -q .; then
            echo "::error::Release set is incomplete or contains a separately named rollback archive"
            exit 1
          fi
          for archive in "${archives[@]}"; do
            test -f "dist/$archive"
          done

          test "$(jq -er '.version' dist/metadata.json)" = "$GRAITH_DEV_VERSION"
          jq -e \
            --arg revision "$RELEASE_REVISION" \
            --arg version "$GRAITH_DEV_VERSION" \
            --arg arm64_sha "$(sha256sum dist/graith-dev_darwin_arm64.tar.gz | awk '{print $1}')" \
            '.revision == $revision and .version == $version and
             .archives["graith-dev_darwin_arm64.tar.gz"] == $arm64_sha' \
            dist/dev-darwin-manifest.json >/dev/null

          for goarch in amd64 arm64; do
            archive_name="graith-dev_linux_${goarch}.tar.gz"
            archive="dist/$archive_name"
            manifest="dist/dev-linux-${goarch}-manifest.json"
            (
              cd dist
              sha256sum --check "$archive_name.sha256"
            )
            archive_sha="$(sha256sum "$archive" | awk '{print $1}')"
            binary_sha="$(tar -xOzf "$archive" gr-dev | sha256sum | awk '{print $1}')"
            jq -e \
              --arg revision "$RELEASE_REVISION" \
              --arg version "$GRAITH_DEV_VERSION" \
              --arg goarch "$goarch" \
              --arg archive_name "$archive_name" \
              --arg archive_sha "$archive_sha" \
              --arg binary_sha "$binary_sha" \
              '.revision == $revision and .version == $version and
               .goos == "linux" and .goarch == $goarch and
               .archive.name == $archive_name and .archive.sha256 == $archive_sha and
               .binary.name == "gr-dev" and .binary.sha256 == $binary_sha' \
              "$manifest" >/dev/null
          done

          (
            cd dist
            sha256sum "${archives[@]}" > checksums.txt
            test "$(wc -l < checksums.txt)" -eq 3
            sha256sum --check checksums.txt
          )

      - name: Upload assembled dev release for verification
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: dev-release-${{ needs.release-context.outputs.revision }}-${{ github.run_id }}
          path: |
            dist/graith-dev_darwin_arm64.tar.gz
            dist/graith-dev_linux_amd64.tar.gz
            dist/graith-dev_linux_arm64.tar.gz
            dist/checksums.txt
          if-no-files-found: error
          overwrite: true
          retention-days: 2

  publish-dev:
    name: Publish dev release
    if: github.event_name == 'push'
    needs:
      - release-context
      - assemble-dev
      - attest-linux
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: write
      attestations: read
    env:
      GRAITH_DEV_VERSION: ${{ needs.release-context.outputs.version }}
      RELEASE_REVISION: ${{ needs.release-context.outputs.revision }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dev-release-${{ needs.release-context.outputs.revision }}-${{ github.run_id }}
          path: dist

      - name: Reverify assembled checksums
        run: |
          set -euo pipefail
          test "$(wc -l < dist/checksums.txt)" -eq 3
          (
            cd dist
            sha256sum --check checksums.txt
          )

      - name: Verify Linux build provenance
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          for archive in dist/graith-dev_linux_amd64.tar.gz dist/graith-dev_linux_arm64.tar.gz; do
            gh attestation verify "$archive" \
              --repo "$GITHUB_REPOSITORY" \
              --signer-workflow "$GITHUB_REPOSITORY/.github/workflows/dev-release.yml" \
              --source-digest "$RELEASE_REVISION" \
              --source-ref refs/heads/main
          done

      - name: Upload dev release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          current_main="$(gh api \
            "repos/$GITHUB_REPOSITORY/git/ref/heads/main" --jq '.object.sha')"
          if [[ "$current_main" != "$RELEASE_REVISION" ]]; then
            echo "::error::Refusing to publish stale revision $RELEASE_REVISION; main is $current_main"
            exit 1
          fi

          release_ids="$(gh api --paginate --slurp \
            "repos/$GITHUB_REPOSITORY/releases?per_page=100" | \
            jq -er '[.[][] | select(.tag_name == "dev") | .id] | @tsv')"
          if [[ "$release_ids" == *$'\t'* ]]; then
            echo "::error::Refusing to replace multiple dev releases"
            exit 1
          fi
          if [[ -n "$release_ids" ]]; then
            gh api --method DELETE \
              "repos/$GITHUB_REPOSITORY/releases/$release_ids" --silent
          fi

          tag_shas="$(gh api \
            "repos/$GITHUB_REPOSITORY/git/matching-refs/tags/dev" \
            --jq '[.[] | select(.ref == "refs/tags/dev") | .object.sha] | @tsv')"
          if [[ "$tag_shas" == *$'\t'* ]]; then
            echo "::error::Refusing to replace multiple exact dev tags"
            exit 1
          fi
          if [[ -n "$tag_shas" ]]; then
            gh api --method DELETE \
              "repos/$GITHUB_REPOSITORY/git/refs/tags/dev" --silent
          fi

          gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
            -f ref=refs/tags/dev -f sha="$RELEASE_REVISION" --silent
          gh release create dev --repo "$GITHUB_REPOSITORY" \
            dist/graith-dev_darwin_arm64.tar.gz \
            dist/graith-dev_linux_amd64.tar.gz \
            dist/graith-dev_linux_arm64.tar.gz \
            dist/checksums.txt \
            --verify-tag \
            --prerelease \
            --title "Dev Build ($(date -u +%Y-%m-%d))" \
            --notes "Built from main at ${RELEASE_REVISION:0:7}. Install: \`brew install d0ugal/tap/graith-dev\`"

          expected="$(printf '%s\n' checksums.txt \
            graith-dev_darwin_arm64.tar.gz \
            graith-dev_linux_amd64.tar.gz graith-dev_linux_arm64.tar.gz | sort)"
          actual="$(gh release view dev --repo "$GITHUB_REPOSITORY" \
            --json assets --jq '.assets[].name' | sort)"
          test "$actual" = "$expected"
          published_tag_sha="$(gh api \
            "repos/$GITHUB_REPOSITORY/git/ref/tags/dev" --jq '.object.sha')"
          test "$published_tag_sha" = "$RELEASE_REVISION"

      - name: Update Homebrew tap
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="$GRAITH_DEV_VERSION"
          DARWIN_ARM64_SHA="$(sha256sum dist/graith-dev_darwin_arm64.tar.gz | awk '{print $1}')"
          LINUX_AMD64_SHA="$(sha256sum dist/graith-dev_linux_amd64.tar.gz | awk '{print $1}')"
          LINUX_ARM64_SHA="$(sha256sum dist/graith-dev_linux_arm64.tar.gz | awk '{print $1}')"
          TAG="dev"
          REPO="d0ugal/graith"

          cat > /tmp/graith-dev.rb << FORMULA
          # typed: false
          # frozen_string_literal: true

          # This file is auto-generated by the dev-release workflow. DO NOT EDIT.
          class GraithDev < Formula
            desc "Terminal session manager for AI coding agents (dev build)"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "https://github.com/${REPO}/releases/download/${TAG}/graith-dev_darwin_arm64.tar.gz"
                sha256 "${DARWIN_ARM64_SHA}"
              else
                odie "graith-dev supports only Apple Silicon on macOS"
              end
            end

            on_linux do
              if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
                url "https://github.com/${REPO}/releases/download/${TAG}/graith-dev_linux_amd64.tar.gz"
                sha256 "${LINUX_AMD64_SHA}"
              elsif Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
                url "https://github.com/${REPO}/releases/download/${TAG}/graith-dev_linux_arm64.tar.gz"
                sha256 "${LINUX_ARM64_SHA}"
              else
                odie "graith-dev supports only Linux amd64/arm64"
              end
            end

            def install
              bin.install "gr-dev"
              if OS.mac?
                (libexec/"graith").install "GraithNotifier.app"
                if (buildpath/"Graith.app").directory?
                  (libexec/"graith").install "Graith.app"
                end
              end
            end

            def caveats
              return unless (libexec/"graith/Graith.app").directory?

              <<~EOS
                To restart the graith-dev daemon after upgrading:
                  gr-dev daemon restart

                Before uninstalling on macOS, remove its registered user service:
                  gr-dev daemon service remove
              EOS
            end
          end
          FORMULA

          tap_dir="$(mktemp -d)"
          cd "$tap_dir"
          git clone "https://x-access-token:${RELEASE_TOKEN}@github.com/d0ugal/homebrew-tap.git" .
          cp /tmp/graith-dev.rb graith-dev.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add graith-dev.rb
          git diff --cached --quiet || git commit -m "chore: update graith-dev to ${VERSION}"
          git push
