name: Dev Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  dev-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: goreleaser/goreleaser-action@5daf1e915a5f0af01ddbcd89a43b8061ff4f1a89 # v7
        with:
          version: "~> v2"
          args: build --snapshot --clean -f .goreleaser-dev.yaml

      - name: Upload dev release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing dev release if present
          gh release delete dev --yes 2>/dev/null || true
          git tag -d dev 2>/dev/null || true
          git push origin :refs/tags/dev 2>/dev/null || true

          # Create new dev release from snapshot artifacts
          gh release create dev dist/*.tar.gz dist/checksums.txt \
            --prerelease \
            --title "Dev Build ($(date -u +%Y-%m-%d))" \
            --notes "Built from main at $(git rev-parse --short HEAD). Install: \`brew install d0ugal/tap/graith-dev\`"

      - name: Update Homebrew tap
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          VERSION=$(cat dist/metadata.json | jq -r '.[0].tag' | sed 's/^v//')
          DARWIN_AMD64_SHA=$(sha256sum dist/graith-dev_darwin_amd64.tar.gz | cut -d' ' -f1)
          DARWIN_ARM64_SHA=$(sha256sum dist/graith-dev_darwin_arm64.tar.gz | cut -d' ' -f1)
          LINUX_AMD64_SHA=$(sha256sum dist/graith-dev_linux_amd64.tar.gz | cut -d' ' -f1)
          LINUX_ARM64_SHA=$(sha256sum dist/graith-dev_linux_arm64.tar.gz | cut -d' ' -f1)
          TAG="dev"
          REPO="d0ugal/graith"

          cat > /tmp/graith-dev.rb << FORMULA
          # typed: false
          # frozen_string_literal: true

          # This file is auto-generated by the dev-release workflow. DO NOT EDIT.
          class GraithDev < Formula
            desc "Terminal session manager for AI coding agents (dev build)"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/${REPO}/releases/download/${TAG}/graith-dev_darwin_amd64.tar.gz"
                sha256 "${DARWIN_AMD64_SHA}"
              end
              if Hardware::CPU.arm?
                url "https://github.com/${REPO}/releases/download/${TAG}/graith-dev_darwin_arm64.tar.gz"
                sha256 "${DARWIN_ARM64_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
                url "https://github.com/${REPO}/releases/download/${TAG}/graith-dev_linux_amd64.tar.gz"
                sha256 "${LINUX_AMD64_SHA}"
              end
              if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
                url "https://github.com/${REPO}/releases/download/${TAG}/graith-dev_linux_arm64.tar.gz"
                sha256 "${LINUX_ARM64_SHA}"
              end
            end

            def install
              bin.install "gr-dev"
            end
          end
          FORMULA

          # Remove leading whitespace from heredoc
          sed -i 's/^          //' /tmp/graith-dev.rb

          # Push to tap repo
          cd $(mktemp -d)
          git clone "https://x-access-token:${RELEASE_TOKEN}@github.com/d0ugal/homebrew-tap.git" .
          cp /tmp/graith-dev.rb graith-dev.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add graith-dev.rb
          git diff --cached --quiet || git commit -m "chore: update graith-dev to ${VERSION}"
          git push
