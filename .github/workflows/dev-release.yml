name: Dev Release

on:
  push:
    branches:
      - main

permissions:
  contents: read

# Serialise runs. This workflow destructively replaces a single shared `dev`
# release and rewrites one tap formula, so two overlapping runs (from two close
# pushes to main) could interleave — e.g. publish assets from one build while
# pushing a formula whose checksums describe another, leaving the tap referring
# to bytes that fail Homebrew's SHA-256 verification. We queue rather than
# cancel-in-progress: cancelling could interrupt the delete→recreate→push
# sequence after the old release is already gone. GitHub keeps only the newest
# pending run, so a burst of pushes still converges on the latest commit.
concurrency:
  group: dev-release
  cancel-in-progress: false

jobs:
  dev-release:
    # The native notification helper needs swiftc, lipo, and codesign. The Go
    # binaries remain pure-Go cross-compiles, so this macOS runner also produces
    # the Linux archives without making Linux consumers expect the app bundle.
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      # Once provisioned, graith and graith-dev share one per-user Service
      # Management registry and must use the same fixed Developer ID
      # requirement. Until then, an entirely absent credential set preserves
      # the legacy direct-spawn dev package. A partial set fails closed.
      - name: Configure optional macOS service signing
        env:
          MACOS_SIGNING_CERTIFICATE: ${{ secrets.MACOS_SIGNING_CERTIFICATE }}
          MACOS_SIGNING_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_SIGNING_CERTIFICATE_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          MACOS_SIGNING_TEAM_ID: ${{ secrets.MACOS_SIGNING_TEAM_ID }}
          MACOS_SIGNING_REQUIREMENT: ${{ secrets.MACOS_SIGNING_REQUIREMENT }}
          APPLE_NOTARY_PRIVATE_KEY: ${{ secrets.APPLE_NOTARY_PRIVATE_KEY }}
          APPLE_NOTARY_KEY_ID: ${{ secrets.APPLE_NOTARY_KEY_ID }}
          APPLE_NOTARY_ISSUER_ID: ${{ secrets.APPLE_NOTARY_ISSUER_ID }}
        run: |
          set -euo pipefail
          signing_mode="$(macos/service/release-signing-mode.sh)"
          if [ "$signing_mode" = disabled ]; then
            echo "::notice::macOS release signing is not provisioned; publishing the legacy direct-spawn dev package"
            {
              echo "GRAITH_MANAGED_DEV_RELEASE=false"
              echo "GRAITH_SIGNED_SNAPSHOT=false"
            } >> "$GITHUB_ENV"
            exit 0
          fi

          keychain="$RUNNER_TEMP/graith-dev-release.keychain-db"
          certificate="$RUNNER_TEMP/graith-dev-release.p12"
          notary_key="$RUNNER_TEMP/AuthKey-dev.p8"
          keychain_password="$(openssl rand -hex 24)"
          printf '%s' "$MACOS_SIGNING_CERTIFICATE" | base64 --decode > "$certificate"
          printf '%s' "$APPLE_NOTARY_PRIVATE_KEY" > "$notary_key"
          chmod 600 "$certificate" "$notary_key"

          security create-keychain -p "$keychain_password" "$keychain"
          security set-keychain-settings -lut 21600 "$keychain"
          security unlock-keychain -p "$keychain_password" "$keychain"
          security import "$certificate" -k "$keychain" \
            -P "$MACOS_SIGNING_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s \
            -k "$keychain_password" "$keychain"
          security list-keychains -d user -s "$keychain"
          security default-keychain -d user -s "$keychain"

          xcrun notarytool store-credentials graith-dev-release \
            --key "$notary_key" \
            --key-id "$APPLE_NOTARY_KEY_ID" \
            --issuer "$APPLE_NOTARY_ISSUER_ID"

          requirement_b64="$(printf '%s' "$MACOS_SIGNING_REQUIREMENT" | base64 | tr -d '\n')"
          {
            echo "GRAITH_RELEASE_KEYCHAIN=$keychain"
            echo "GRAITH_MACOS_SIGNING_IDENTITY=$MACOS_SIGNING_IDENTITY"
            echo "GRAITH_SIGNING_TEAM_ID=$MACOS_SIGNING_TEAM_ID"
            echo "GRAITH_SIGNING_REQUIREMENT=$MACOS_SIGNING_REQUIREMENT"
            echo "GRAITH_SIGNING_REQUIREMENT_B64=$requirement_b64"
            echo "GRAITH_NOTARY_PROFILE=graith-dev-release"
            echo "GRAITH_MANAGED_DEV_RELEASE=true"
            echo "GRAITH_SIGNED_SNAPSHOT=true"
          } >> "$GITHUB_ENV"

      - name: Remove dev tag so GoReleaser sees the last semver tag
        run: git tag -d dev 2>/dev/null || true

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          version: "~> v2"
          args: release --snapshot --skip=publish --clean -f .goreleaser-dev.yaml

      - name: Verify dev archives
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob

          case "${GRAITH_MANAGED_DEV_RELEASE:-false}" in
            true|false) ;;
            *) echo "::error::Invalid managed dev release marker: $GRAITH_MANAGED_DEV_RELEASE"; exit 1 ;;
          esac

          darwin_archives=(dist/graith-dev_darwin_*.tar.gz)
          linux_archives=(dist/graith-dev_linux_*.tar.gz)
          if [ "${#darwin_archives[@]}" -ne 2 ] || [ "${#linux_archives[@]}" -ne 2 ]; then
            echo "::error::Expected two Darwin and two Linux dev archives"
            exit 1
          fi

          for archive in "${darwin_archives[@]}"; do
            unpacked="$(mktemp -d)"
            tar -xzf "$archive" -C "$unpacked"
            notifier_app="$unpacked/GraithNotifier.app"
            notifier="$notifier_app/Contents/MacOS/graith-notifier"
            service_app="$unpacked/Graith.app"

            test -d "$notifier_app"
            test -x "$notifier"
            lipo "$notifier" -verify_arch arm64 x86_64
            codesign --verify --deep --strict "$notifier_app"
            if [ "$GRAITH_MANAGED_DEV_RELEASE" = true ]; then
              test -d "$service_app"
              test -x "$service_app/Contents/MacOS/gr"
              cmp "$unpacked/gr-dev" "$service_app/Contents/MacOS/gr"
              macos/service/verify-release-archive.sh \
                "$archive" "$archive.service-verified.txt" true
            elif [ -e "$service_app" ]; then
              echo "::error::Legacy dev archive unexpectedly contains Graith.app: $archive"
              exit 1
            fi
          done

          for archive in "${linux_archives[@]}"; do
            contents="$(tar -tzf "$archive")"
            if grep -Eq 'Graith(Notifier)?\.app' <<< "$contents"; then
              echo "::error::Linux dev archive unexpectedly contains a macOS app: $archive"
              exit 1
            fi
          done

      - name: Upload dev release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing dev release if present
          gh release delete dev --yes 2>/dev/null || true
          git tag -d dev 2>/dev/null || true
          git push origin :refs/tags/dev 2>/dev/null || true

          # Create new dev release from snapshot artifacts
          gh release create dev dist/*.tar.gz dist/checksums.txt \
            --prerelease \
            --title "Dev Build ($(date -u +%Y-%m-%d))" \
            --notes "Built from main at $(git rev-parse --short HEAD). Install: \`brew install d0ugal/tap/graith-dev\`"

      - name: Update Homebrew tap
        # Explicit bash so the step runs with `-o pipefail`; GitHub's implicit
        # shell is `bash -e {0}` (no pipefail), under which a failed
        # `sha256sum | cut` would still exit 0 and silently emit an empty sha.
        shell: bash
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          # metadata.json is a flat object, and its `.version` field carries the
          # snapshot version (e.g. 0.68.3-dev.<build-timestamp>) — unique and
          # monotonic per build. The old `.[0].tag` both failed to index the
          # object and pinned every dev build to the last released semver, so
          # `brew upgrade` never saw a newer graith-dev. `-e` with the string
          # filter fails the step closed on missing/empty/non-string version
          # rather than writing `version "null"` into the formula.
          VERSION=$(jq -er '.version | select(type == "string" and length > 0)' dist/metadata.json)
          DARWIN_AMD64_SHA=$(shasum -a 256 dist/graith-dev_darwin_amd64.tar.gz | awk '{print $1}')
          DARWIN_ARM64_SHA=$(shasum -a 256 dist/graith-dev_darwin_arm64.tar.gz | awk '{print $1}')
          LINUX_AMD64_SHA=$(shasum -a 256 dist/graith-dev_linux_amd64.tar.gz | awk '{print $1}')
          LINUX_ARM64_SHA=$(shasum -a 256 dist/graith-dev_linux_arm64.tar.gz | awk '{print $1}')
          TAG="dev"
          REPO="d0ugal/graith"

          cat > /tmp/graith-dev.rb << FORMULA
          # typed: false
          # frozen_string_literal: true

          # This file is auto-generated by the dev-release workflow. DO NOT EDIT.
          class GraithDev < Formula
            desc "Terminal session manager for AI coding agents (dev build)"
            homepage "https://github.com/${REPO}"
            version "${VERSION}"
            license "MIT"

            on_macos do
              if Hardware::CPU.intel?
                url "https://github.com/${REPO}/releases/download/${TAG}/graith-dev_darwin_amd64.tar.gz"
                sha256 "${DARWIN_AMD64_SHA}"
              end
              if Hardware::CPU.arm?
                url "https://github.com/${REPO}/releases/download/${TAG}/graith-dev_darwin_arm64.tar.gz"
                sha256 "${DARWIN_ARM64_SHA}"
              end
            end

            on_linux do
              if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
                url "https://github.com/${REPO}/releases/download/${TAG}/graith-dev_linux_amd64.tar.gz"
                sha256 "${LINUX_AMD64_SHA}"
              end
              if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
                url "https://github.com/${REPO}/releases/download/${TAG}/graith-dev_linux_arm64.tar.gz"
                sha256 "${LINUX_ARM64_SHA}"
              end
            end

            def install
              bin.install "gr-dev"
              if OS.mac?
                (libexec/"graith").install "GraithNotifier.app"
                if (buildpath/"Graith.app").directory?
                  (libexec/"graith").install "Graith.app"
                end
              end
            end

            def caveats
              return unless (libexec/"graith/Graith.app").directory?

              <<~EOS
                To restart the graith-dev daemon after upgrading:
                  gr-dev daemon restart

                Before uninstalling on macOS, remove its registered user service:
                  gr-dev daemon service remove
              EOS
            end
          end
          FORMULA

          # Push to tap repo
          cd "$(mktemp -d)"
          git clone "https://x-access-token:${RELEASE_TOKEN}@github.com/d0ugal/homebrew-tap.git" .
          cp /tmp/graith-dev.rb graith-dev.rb
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add graith-dev.rb
          git diff --cached --quiet || git commit -m "chore: update graith-dev to ${VERSION}"
          git push

      - name: Remove temporary macOS signing keychain
        if: always()
        run: |
          if [ -n "${GRAITH_RELEASE_KEYCHAIN:-}" ]; then
            security delete-keychain "$GRAITH_RELEASE_KEYCHAIN" || true
          fi
