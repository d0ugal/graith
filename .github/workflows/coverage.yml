name: Coverage

# Self-hosted test-coverage reporting: computes Go and Swift coverage and posts
# a single sticky comment on the PR. No third-party service and no historical
# tracking — the "delta vs base" is measured in-run by re-testing the base
# commit (cheap on Linux; Swift shows an absolute % only to avoid doubling
# expensive macOS runner minutes).
#
# The Go job also acts as a soft gate: it FAILS when statement coverage drops
# by more than 5 points vs the base branch (a small budget for the occasional
# refactor; coverage should otherwise never regress). The comment still posts
# regardless. Whether that red X blocks merge is a branch-protection decision;
# see the required-check note in ci.yml.
on:
  pull_request:

permissions:
  contents: read

# One run per PR: a newer push cancels the in-flight run, which avoids two
# comment jobs racing to create the sticky comment (duplicate posts) and stops
# wasting macOS minutes on superseded Swift runs.
concurrency:
  group: coverage-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # Cheap Linux pre-check so the expensive macOS Swift job only spins up when the
  # PR actually touches gui/. Avoids burning macOS minutes on Go-only PRs.
  #
  # Uses the PR files API rather than a local `git diff`: the checked-out
  # pull_request merge ref can be built against an older base than
  # `base.sha`, so diffing the two surfaces the base branch's own gui/ commits
  # and spuriously flips gui=true. The API returns exactly the PR's changed
  # files, immune to that drift — and needs no checkout.
  changes:
    name: Detect gui changes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      gui: ${{ steps.filter.outputs.gui }}
    steps:
      - id: filter
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          files="$(gh api "repos/$REPO/pulls/$PR/files" --paginate --jq '.[].filename')"
          # here-string (not a pipe) so grep matching early can't SIGPIPE-fail
          # an upstream command under pipefail.
          if grep -q '^gui/' <<<"$files"; then
            echo "gui=true" >> "$GITHUB_OUTPUT"
          else
            echo "gui=false" >> "$GITHUB_OUTPUT"
          fi

  go-coverage:
    name: Go coverage
    runs-on: ubuntu-latest
    outputs:
      pct: ${{ steps.cov.outputs.pct }}
      base: ${{ steps.cov.outputs.base }}
      delta: ${{ steps.cov.outputs.delta }}
      table: ${{ steps.cov.outputs.table }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
          fetch-depth: 0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod
      - id: cov
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          # Build the per-file report tool and read the module path from the PR
          # head *before* checking out the base commit: the base may predate
          # cmd/covreport, and go.mod's module path is what maps profile
          # import-paths back to repo-relative files. The binary lives outside
          # the worktree so it survives the base checkout.
          go build -o "$RUNNER_TEMP/covreport" ./cmd/covreport
          # `[[:space:]]` (not a literal space) so a tab- or multi-space-
          # separated module directive still matches.
          MODULE="$(awk '/^module[[:space:]]/ {print $2; exit}' go.mod)"
          # Run tests into a coverage profile, then extract the aggregate %.
          # Split into two helpers so the *test exit status* is observable: it's
          # lost inside a `$(...)` substitution, and the threshold gate must know
          # whether HEAD's tests actually passed before failing the build on a
          # drop. A flaky/failing package must not abort the report itself
          # (ci.yml is the authoritative test gate) — hence the empty-profile →
          # 0.0 fallback stays.
          run_cover() { go test -coverprofile="$1" ./... >/dev/null 2>&1; }
          pct_of() {
            if [ -s "$1" ]; then
              go tool cover -func="$1" | awk '/^total:/ {gsub(/%/,"",$3); print $3}'
            else
              echo "0.0"
            fi
          }
          HEAD_OK=1
          run_cover cover.head.out || HEAD_OK=0
          HEAD_PCT="$(pct_of cover.head.out)"
          # Measure the base commit the same way, then diff. Go's build cache
          # makes the second pass much cheaper than the first. A base test
          # failure is folded into the "unavailable" handling below, so its exit
          # status is intentionally ignored here.
          git checkout --quiet --force "$BASE_SHA"
          run_cover cover.base.out || true
          BASE_PCT="$(pct_of cover.base.out)"
          # If the base failed to build/test (empty profile → 0.0) while HEAD
          # measured fine, a raw diff would report a nonsense delta (e.g.
          # +87.3%). Report the delta — and the base % shown in the comment — as
          # unavailable in that case rather than a misleading "0.0%".
          if [ "$BASE_PCT" = "0.0" ] && [ "$HEAD_PCT" != "0.0" ]; then
            DELTA="n/a"
            BASE_OUT="n/a"
          else
            DELTA="$(awk -v a="$HEAD_PCT" -v b="$BASE_PCT" 'BEGIN{printf "%+.1f%%", a-b}')"
            BASE_OUT="$BASE_PCT"
          fi
          # Per-file breakdown sorted most-uncovered-statements-first, for the
          # collapsed section of the PR comment. Run from the prebuilt binary (works
          # regardless of the checked-out base tree); both profiles are untracked
          # so they survived the base checkout. covreport treats a base profile
          # with no coverage blocks (e.g. a failed base build's header-only
          # profile) as "base unavailable" on its own, so passing it is safe.
          TABLE="$("$RUNNER_TEMP/covreport" -head cover.head.out -base cover.base.out -module "$MODULE")"
          {
            echo "pct=$HEAD_PCT"
            echo "base=$BASE_OUT"
            echo "delta=$DELTA"
            echo "head_ok=$HEAD_OK"
            # Multiline output via a heredoc delimiter (the table spans many
            # lines). The delimiter is unlikely to collide with Markdown table
            # content.
            echo "table<<COVREPORT_EOF"
            echo "$TABLE"
            echo "COVREPORT_EOF"
          } >> "$GITHUB_OUTPUT"
      - name: Enforce coverage threshold
        # Hard gate: fail the job when statement coverage drops by more than
        # MAX_DROP points vs the base branch. Coverage should never regress, but
        # a small budget leaves room for error (e.g. a refactor that deletes
        # well-covered code). This runs *after* the outputs are written, so the
        # always() comment job can still post the numbers even when this fails.
        env:
          DELTA: ${{ steps.cov.outputs.delta }}
          PCT: ${{ steps.cov.outputs.pct }}
          HEAD_OK: ${{ steps.cov.outputs.head_ok }}
          MAX_DROP: "5.0"
        run: |
          set -euo pipefail
          # Not measurable → don't gate. "n/a" means the base failed to
          # build/test; PCT "0.0" means HEAD produced no profile; HEAD_OK != 1
          # means HEAD's tests failed (a partial profile could still yield a
          # non-zero % and a large negative delta — gating on that would fail the
          # build for a flaky/failing test, which ci.yml is the real gate for).
          # In all three cases there's no trustworthy delta to enforce.
          if [ "$DELTA" = "n/a" ] || [ "$PCT" = "0.0" ] || [ "$HEAD_OK" != "1" ]; then
            echo "Coverage delta not measurable (base or head build/test failed); skipping threshold check."
            exit 0
          fi
          # DELTA is formatted like "+0.3%" or "-6.2%"; strip the trailing %.
          num="${DELTA%\%}"
          # awk does the signed-float compare and exits 0 (→ then-branch) only
          # when the drop exceeds the budget. Exactly -MAX_DROP is allowed.
          if awk -v d="$num" -v max="$MAX_DROP" 'BEGIN{exit !(d < -max)}'; then
            echo "::error::Coverage dropped by ${DELTA} vs base — exceeds the allowed ${MAX_DROP}% regression budget. Add tests to cover the new/changed code."
            exit 1
          fi
          echo "Coverage delta ${DELTA} is within the allowed ${MAX_DROP}% regression budget."

  swift-coverage:
    name: Swift coverage
    needs: changes
    if: needs.changes.outputs.gui == 'true'
    runs-on: macos-latest
    # Cap scarce macOS runner minutes: a hung suite can't hold one for GitHub's
    # 6h default. Well above the normal coverage runtime.
    timeout-minutes: 15
    outputs:
      pct: ${{ steps.cov.outputs.pct }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false
      - name: Toolchain versions
        run: swift --version
      - id: cov
        # SwiftPM-native coverage (no simulator / xcodebuild), matching the
        # existing GUI CI. Covers the UIKit-free shared logic package
        # (gui/shared). `--show-codecov-path` prints the merged llvm-cov export
        # JSON produced by the coverage-enabled run above.
        run: |
          set -euo pipefail
          # Wrap the coverage run in `timeout` (or coreutils `gtimeout`) for a
          # fast step-level kill if a suite hangs; falls back to unwrapped if
          # neither is present (timeout-minutes is the hard backstop either way).
          # `--show-codecov-path` re-runs nothing (results are cached), so it
          # needs no wrapping.
          TIMEOUT="$(command -v timeout || command -v gtimeout || true)"
          ${TIMEOUT:+"$TIMEOUT" 300} swift test --package-path gui/shared --enable-code-coverage
          COV_JSON="$(swift test --package-path gui/shared --show-codecov-path | tail -n1)"
          # `-er` + `numbers`: fail closed if the field is missing or non-numeric
          # (SwiftPM format drift, malformed JSON) rather than silently emit 0.0.
          PCT="$(jq -er '.data[0].totals.lines.percent | numbers' "$COV_JSON" | awk '{printf "%.1f", $1}')"
          echo "pct=$PCT" >> "$GITHUB_OUTPUT"

  comment:
    name: Coverage comment
    needs: [changes, go-coverage, swift-coverage]
    # always(): still post when swift-coverage is skipped (Go-only PR) or fails.
    # Fork PRs get a read-only token and can't comment, so skip them (their
    # coverage still runs and shows in the job logs) rather than fail the run.
    if: always() && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Build and post sticky comment
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
          GO_PCT: ${{ needs.go-coverage.outputs.pct }}
          GO_BASE: ${{ needs.go-coverage.outputs.base }}
          GO_DELTA: ${{ needs.go-coverage.outputs.delta }}
          GO_TABLE: ${{ needs.go-coverage.outputs.table }}
          GO_RESULT: ${{ needs.go-coverage.result }}
          GUI_CHANGED: ${{ needs.changes.outputs.gui }}
          SWIFT_PCT: ${{ needs.swift-coverage.outputs.pct }}
          SWIFT_RESULT: ${{ needs.swift-coverage.result }}
        run: |
          set -euo pipefail
          marker='<!-- coverage-report -->'

          # Go row. Key off the presence of the measured % rather than the job
          # result: the threshold gate can FAIL the go-coverage job *after* its
          # outputs are written, and a coverage regression is exactly when the
          # numbers matter most — so still show them.
          if [ -n "${GO_PCT:-}" ]; then
            go_row="| Go (\`./...\`) | ${GO_PCT}% | ${GO_DELTA} |"
          else
            go_row="| Go (\`./...\`) | n/a | — |"
          fi

          # When the go-coverage job failed but produced numbers, the threshold
          # gate tripped (a >5% drop): call it out above the table.
          # Base % for the footnote. GO_BASE is "n/a" when the base was
          # unmeasurable; show that verbatim rather than "n/a%".
          if [ -z "${GO_BASE:-}" ] || [ "$GO_BASE" = "n/a" ]; then
            base_display="n/a"
          else
            base_display="${GO_BASE}%"
          fi

          warning=""
          if [ "$GO_RESULT" != "success" ] && [ -n "${GO_PCT:-}" ]; then
            # Trailing newline so a blank line separates the blockquote from the
            # table below (GFM needs it to parse the table). When empty, the
            # heredoc line is just the one blank line already between heading and
            # table.
            warning="> ⚠️ **Coverage regressed by ${GO_DELTA} vs base**, exceeding the allowed 5% budget. Please add tests."$'\n'
          fi

          # Swift row: only meaningful when the PR touches gui/.
          if [ "$GUI_CHANGED" = "true" ]; then
            if [ "$SWIFT_RESULT" = "success" ] && [ -n "${SWIFT_PCT:-}" ]; then
              swift_row="| Swift (\`gui/shared\`) | ${SWIFT_PCT}% | — |"
            else
              swift_row="| Swift (\`gui/shared\`) | failed | — |"
            fi
          else
            swift_row="| Swift (\`gui/shared\`) | not run (no \`gui/\` changes) | — |"
          fi

          # Collapsed per-file Go breakdown. Include it whenever a real table
          # was produced (not the empty-data placeholder), independent of the job
          # result — a threshold-gate failure still has a valid table, and that's
          # exactly when the per-file numbers help most. The inner heredoc keeps
          # the same base indent as the body heredoc below so the block scalar
          # de-indents both to column 0.
          details=""
          if [ -n "${GO_TABLE:-}" ] && [ "$GO_TABLE" != "_No Go coverage data._" ]; then
            details="$(cat <<DETAILS_EOF

          <details>
          <summary>Per-file Go coverage (most uncovered first) — click to expand</summary>

          $GO_TABLE

          </details>
          DETAILS_EOF
          )"
          fi

          # Heredoc note: every line below must keep the block's base indent so
          # YAML's block-scalar de-indent lands $marker and the EOF terminator at
          # column 0 — the marker must start the comment body for startswith() to
          # match, and EOF must be column-0 to close the heredoc.
          body="$(cat <<EOF
          $marker
          ### 📊 Test coverage
          $warning
          | Component | Coverage | Δ vs base |
          |-----------|:--------:|:---------:|
          $go_row
          $swift_row
          $details

          <sub>Base coverage: Go \`${base_display}\`. Per-file figures are statement coverage. Swift shows an absolute % (no delta) to keep macOS CI light. Updated on every push.</sub>
          EOF
          )"

          # Sticky comment: find our previous one by marker and edit it, else
          # create. Self-contained via gh api — no third-party action. The jq
          # streams matching ids (no array-wrap, so non-matching pages emit
          # nothing rather than `null`) and `--paginate` concatenates across all
          # pages, so the match works even when the marker comment isn't on the
          # first page. (`--slurp` can't combine with `--jq` on the runner's gh.)
          # Capture first, then take the first line separately — piping gh into
          # head would risk a SIGPIPE failure under `pipefail`.
          cids="$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
            --jq ".[] | select(.body | startswith(\"$marker\")) | .id")"
          cid="$(printf '%s\n' "$cids" | head -n1)"
          if [ -n "$cid" ] && [ "$cid" != "null" ]; then
            gh api -X PATCH "repos/$REPO/issues/comments/$cid" -f body="$body" >/dev/null
            echo "Updated coverage comment $cid"
          else
            gh api -X POST "repos/$REPO/issues/$PR/comments" -f body="$body" >/dev/null
            echo "Created coverage comment"
          fi
