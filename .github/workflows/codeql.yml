name: CodeQL

# Dataflow SAST for the Go code (part of the supply-chain hardening in #697).
# Complements the govulncheck job in ci.yml and the gosec pass; CodeQL adds
# taint-tracking analysis that finds injection/path-traversal-class bugs.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '41 6 * * 1'

permissions:
  contents: read

jobs:
  analyze:
    name: Analyze (Go)
    runs-on: ubuntu-latest
    permissions:
      # Required to upload the SARIF results to code scanning.
      security-events: write
      # Required by the CodeQL action to read the Actions run metadata.
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          languages: go
          build-mode: autobuild

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
        with:
          category: "/language:go"
