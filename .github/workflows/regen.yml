# Auto-regenerate committed generated artifacts on a PR.
#
# Three files in this repo are mechanical generated outputs:
#   - gui/shared/Tests/GraithProtocolTests/Fixtures/protocol_manifest.json
#     (from internal/protocol/messages.go)
#   - website/content/docs/capabilities.md                   (from capabilities.json)
#   - website/data/package_dependencies.json                 (from Go package imports)
# Native dependency PRs additionally project `libghostty-native.lock.json` into
# the Go module, headers, Apple artifact pin, SPDX inventory, and notices.
#
# `TestManifestUpToDate`, `TestDocMatchesManifest`, and `make package-graph-check`
# in the normal Test job already FAIL when their outputs are stale — those gates
# stay the source of truth. This workflow is a convenience layer on top: when a
# PR changes inputs but forgets an update command, it regenerates the outputs and
# commits them back to the PR branch.
#
# Notes:
#   - The hand-authored inputs are NOT touched here. A newly added wire struct that
#     isn't registered/classified fails `TestManifestRegistryComplete`, which this
#     job cannot and must not auto-fix — so auto-regen can't paper over a real
#     decision, only mechanical churn (e.g. an added optional field).
#   - Same-repo PRs only: the workflow-triggering RELEASE_TOKEN is never exposed to
#     fork-controlled code. Forks still get the failing gate in the Test job, just
#     no auto-fix.
#   - RELEASE_TOKEN is the repository's established credential for pushes that must
#     trigger CI. It is persisted only in the fresh-runner push job, which executes
#     no repository-controlled code and accepts only a verified generated commit
#     from the unprivileged preparation job. Its push emits the normal pull_request
#     synchronize event, so every PR workflow reports against the generated head.
#     That event may cancel this run after its successful push; the replacement
#     sees clean generated outputs and exits without another commit.
name: Regenerate

on:
  pull_request:

permissions:
  contents: read

concurrency:
  group: regen-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate regeneration credentials
    # Skip forks before any step can access RELEASE_TOKEN. The Test job still runs
    # the up-to-date gate for them. This runner performs no checkout, then is
    # discarded before repository-controlled generators run.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Require workflow-triggering token
        env:
          # GitHub masks values sourced from the secrets context. Never print it.
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          if [ -z "$RELEASE_TOKEN" ]; then
            echo "::error::RELEASE_TOKEN is required for same-repository regeneration pushes."
            exit 1
          fi

  prepare:
    name: Prepare regenerated files
    needs: validate
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - name: Check out PR head without persisted credentials
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          # Check out the PR's head branch (not the detached merge ref) so the
          # generated commit has the right parent. Repository-controlled
          # generators run without any persisted credential in this checkout.
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Verify checked-out PR head
        env:
          SOURCE_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          if [ "$(git rev-parse HEAD)" != "$SOURCE_SHA" ]; then
            echo "::error::PR head advanced before regeneration began."
            exit 1
          fi

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Regenerate generated files
        run: |
          go test ./internal/protocol -run TestManifestUpToDate -update
          go test ./internal/capabilities -run TestDocMatchesManifest -update
          make package-graph

      - name: Detect a native dependency lock update
        id: native-lock
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: |
          set -euo pipefail
          if git diff --quiet "$BASE_SHA...HEAD" -- libghostty-native.lock.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Rotate the complete native dependency unit
        if: steps.native-lock.outputs.changed == 'true'
        env:
          # The PR lock is already committed, so tell the generator which
          # revision to compare when deciding whether Ghostty owns transitive
          # version selection for this update.
          GRAITH_LIBGHOSTTY_BASE_REF: ${{ github.event.pull_request.base.sha }}
        run: scripts/libghostty-native.sh generate-dependency-unit

      - name: Verify regenerated content
        # Prove mechanical projections are consistent before commit. License
        # review bindings deliberately stay pending when evidence changed; the
        # native gate from the normal follow-up PR run remains red until a
        # reviewer accepts them.
        run: |
          go test ./internal/protocol -run TestManifestUpToDate
          go test ./internal/capabilities -run 'TestDocMatchesManifest|TestManifestLoads'
          make package-graph-check
          if [ "${{ steps.native-lock.outputs.changed }}" = "true" ]; then
            scripts/libghostty-native.sh verify-generated-dependency-unit
          else
            scripts/libghostty-native.sh verify-dependency-unit
          fi

      - name: Commit generated files if changed
        id: commit
        env:
          SOURCE_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          # Stage only known mechanical outputs. In particular, -A is needed
          # below the header directory so a Ghostty update can add or remove
          # public headers instead of silently omitting new files.
          git add -A -- \
            gui/shared/Tests/GraithProtocolTests/Fixtures/protocol_manifest.json \
            website/content/docs/capabilities.md \
            website/data/package_dependencies.json \
            go.mod go.sum gui/shared/Package.swift \
            gui/shared/Sources/CGhosttyVT/include \
            libghostty-native.lock.json libghostty-native.spdx.json \
            THIRD_PARTY_NOTICES.libghostty.md
          if git diff --cached --quiet; then
            echo "Generated files already up to date — nothing to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Generated files were stale; committing regenerated output."
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(generated): refresh generated dependency metadata"
          if [ "$(git rev-parse HEAD^)" != "$SOURCE_SHA" ]; then
            echo "::error::Generated commit does not directly descend from the event head."
            exit 1
          fi
          git bundle create "$RUNNER_TEMP/generated.bundle" HEAD "^$SOURCE_SHA"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Upload generated commit
        if: steps.commit.outputs.changed == 'true'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: regen-${{ github.run_id }}
          path: ${{ runner.temp }}/generated.bundle
          if-no-files-found: error
          retention-days: 1

  regen:
    name: Regenerate generated files
    needs: [validate, prepare]
    # Keep the secret-bearing job behind the same trusted-repository boundary.
    # `always()` lets this job preserve the existing required check context by
    # explicitly propagating a preparation failure.
    if: always() && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Propagate preparation failure
        if: needs.validate.result != 'success' || needs.prepare.result != 'success'
        run: |
          echo "::error::Generated-file preparation did not complete successfully."
          exit 1

      - name: Report clean generated files
        if: needs.prepare.result == 'success' && needs.prepare.outputs.changed != 'true'
        run: echo "Generated files already up to date — nothing to push."

      - name: Check out source head with workflow-triggering credentials
        if: needs.prepare.result == 'success' && needs.prepare.outputs.changed == 'true'
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          # This fresh runner executes no repository-controlled code. Persist
          # the established PAT only here so the final push emits the normal
          # pull_request synchronize event.
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}
          persist-credentials: true

      - name: Download generated commit
        if: needs.prepare.result == 'success' && needs.prepare.outputs.changed == 'true'
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: regen-${{ github.run_id }}
          path: ${{ runner.temp }}/regen-output

      - name: Push generated commit
        if: needs.prepare.result == 'success' && needs.prepare.outputs.changed == 'true'
        # HEAD_REF is passed via env, never interpolated into the script body:
        # a branch name is attacker-controllable, so `${{ github.head_ref }}`
        # inline in a run block is a template-injection sink (zizmor, medium+).
        env:
          HEAD_REF: ${{ github.head_ref }}
          SOURCE_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail
          remote_sha="$(git ls-remote origin "refs/heads/$HEAD_REF" | awk '{print $1}')"
          if [ "$remote_sha" != "$SOURCE_SHA" ]; then
            echo "::error::PR branch advanced before the generated commit could be pushed."
            exit 1
          fi

          git fetch "$RUNNER_TEMP/regen-output/generated.bundle" HEAD
          GENERATED_SHA="$(git rev-parse FETCH_HEAD)"
          if [ "$(git show -s --format=%P "$GENERATED_SHA")" != "$SOURCE_SHA" ]; then
            echo "::error::Generated commit has an unexpected parent."
            exit 1
          fi
          if [ "$(git show -s --format=%an "$GENERATED_SHA")" != "github-actions[bot]" ] || \
             [ "$(git show -s --format=%ae "$GENERATED_SHA")" != "41898282+github-actions[bot]@users.noreply.github.com" ] || \
             [ "$(git show -s --format=%s "$GENERATED_SHA")" != "chore(generated): refresh generated dependency metadata" ]; then
            echo "::error::Generated commit identity or message is unexpected."
            exit 1
          fi

          changed=false
          while IFS= read -r -d '' path; do
            changed=true
            case "$path" in
              gui/shared/Tests/GraithProtocolTests/Fixtures/protocol_manifest.json|\
              website/content/docs/capabilities.md|\
              website/data/package_dependencies.json|\
              go.mod|go.sum|gui/shared/Package.swift|\
              gui/shared/Sources/CGhosttyVT/include/*|\
              libghostty-native.lock.json|libghostty-native.spdx.json|\
              THIRD_PARTY_NOTICES.libghostty.md)
                ;;
              *)
                echo "::error::Generated commit contains a non-allowlisted path."
                exit 1
                ;;
            esac
          done < <(git diff --no-renames --name-only -z "$SOURCE_SHA" "$GENERATED_SHA")
          if [ "$changed" != "true" ]; then
            echo "::error::Generated commit contains no changes."
            exit 1
          fi

          git checkout --detach "$GENERATED_SHA"
          # A race after the remote-head check still fails closed because this
          # remains a normal, non-force push.
          git push origin "HEAD:$HEAD_REF"
