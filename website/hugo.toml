baseURL = "https://d0ugal.github.io/graith/"
languageCode = "en-GB"
contentDir = "content"
enableEmoji = true
enableGitInfo = false
title = "graith"

[module]
  [module.hugoVersion]
    extended = true
    min = "0.140.0"
  [[module.imports]]
    path = "github.com/colinwilson/lotusdocs"
    disable = false
  [[module.imports]]
    path = "github.com/gohugoio/hugo-mod-bootstrap-scss/v5"
    disable = false

[markup]
  defaultMarkdownHandler = "goldmark"
  [markup.tableOfContents]
    endLevel = 3
    startLevel = 2
  [markup.goldmark.renderer]
    unsafe = true

[params]
  google_fonts = [
    ["Inter", "300, 400, 500, 700"],
    ["JetBrains Mono", "400, 700"],
  ]
  sans_serif_font = "Inter"
  secondary_font = "Inter"
  mono_font = "JetBrains Mono"

  [params.footer]
    copyright = "© :YEAR: Dougal Matthews. Built with [**Lotus Docs**](https://github.com/colinwilson/lotusdocs)"

  [params.social]
    github = "d0ugal/graith"

  [params.docs]
    title = "graith"
    themeColor = "cardinal"
    darkMode = true
    prism = true
    prismTheme = "solarized-light"

    # gitinfo — edit links disabled: content lives under website/, but the
    # theme hardcodes a top-level content/ prefix, which would produce wrong URLs.
    repoURL = "https://github.com/d0ugal/graith"
    repoBranch = "main"
    editPage = false
    lastMod = false

    sidebarIcons = true
    breadcrumbs = true
    backToTop = true

    toc = true
    tocMobile = true
    scrollSpy = true

    descriptions = true
    titleIcon = false

    navDesc = true
    navDescTrunc = 30
    listDescTrunc = 100

    intLinkTooltip = true

  [params.flexsearch]
    enabled = true

[menu]
  [[menu.primary]]
    name = "Docs"
    url = "/docs/"
    identifier = "docs"
    weight = 10
  [[menu.primary]]
    name = "GitHub"
    url = "https://github.com/d0ugal/graith"
    identifier = "github"
    weight = 20
