# graith sample configuration
# Copy to ~/.config/graith/config.toml and customize.
# All fields are optional — defaults are shown below.

# default_agent = "claude"
# branch_prefix = "{username}/graith"
# fetch_on_create = true
# github_username = ""
# allowed_repo_paths = []

# [status_bar]
# enabled = true
# position = "bottom"

# [keybindings]
# prefix = "ctrl+b"
# new_session = "c"
# fork_session = "f"
# delete_session = "x"
# detach = "d"
# session_list = "w"
# next_session = "n"
# prev_session = "p"
# last_session = "l"
# resume_session = "R"
# rename_session = ","
# search = "/"
# scroll_mode = "["
# shell = "s"

# [notifications]
# enabled = true
# on_approval = true
# on_stopped = false
# Custom command receives GRAITH_SESSION_NAME, GRAITH_STATUS, and
# GRAITH_MESSAGE as environment variables.
# command = ""

# [approvals]
# backend  = ""        # who decides: "" (none — always prompt the human),
#                      # "command"/"external" (delegate to a command over graith's
#                      # JSON contract), "localmost" (the real localmost binary via
#                      # its native protocol), or "builtin" (graith's built-in
#                      # localmost-compatible engine). "mode" is the deprecated
#                      # predecessor: with no backend, legacy mode command/external/
#                      # localmost all resolve to backend "command" (NOT native
#                      # "localmost" — set backend = "localmost" for that).
# auto_pop = false     # auto-open the approval overlay when a request is queued
# timeout  = "10m"     # how long to wait for a human decision
# command  = ""        # required for backend "command"/"external"; optional path
#                      # override for backend "localmost". Receives one JSON object
#                      # on stdin ({tool_name,tool_input,session_id,session_name})
#                      # and prints one to stdout ({decision:allow|block|deny|defer,reason}).
# [approvals.builtin]
# config = ""          # localmost-format config.json (backend "builtin")

# [messages]
# max_age = ""
# max_per_stream = 0

# --- Sandbox ---
# OS-level sandbox for agent processes. Disabled by default. When enabled a
# `backend` MUST be chosen — there is no default; an unset backend fails closed.
# Agent-specific [agents.<name>.sandbox] sections are merged with this config.

# [sandbox]
# enabled = false
# backend = "nono"                        # REQUIRED when enabled: "safehouse" (macOS Seatbelt) | "nono" (Landlock+seccomp on Linux, Seatbelt on macOS)
# command = "nono"                        # path to the backend binary (default: the backend name)
# features = ["ssh"]                      # feature gates (mapping differs per backend; ssh -> $SSH_AUTH_SOCK, process-control -> signals)
# read_dirs  = []                         # additional read-only paths (directories)
# write_dirs = []                         # additional read-write paths (directories)
# read_files  = []                        # additional read-only single files
# write_files = []                        # additional read-write single files (e.g. ~/.claude.json login file)
# signal_mode = "isolated"                # nono only: "isolated" | "allow_same_sandbox" (nono default) | "allow_all"

# [sandbox.network]                       # nono only; needs Landlock ABI v4 (kernel 6.7+). safehouse fails closed if set.
# block = true                            # deny all outbound network
# allow_domains = ["github.com"]          # OR restrict to a proxy allowlist (host or URL glob)

# --- Agents ---
# Each agent needs its config directory in sandbox read/write dirs when
# sandboxing is enabled. These are NOT added automatically — configure them
# in the per-agent [agents.<name>.sandbox] section.

[agents.claude]
command = "claude"
args = ["--session-id", "{agent_session_id}"]
resume_args = ["--resume", "{agent_session_id}"]
fork_args = ["--session-id", "{agent_session_id}", "--fork-session", "{fork_source_agent_session_id}"]

[agents.claude.sandbox]
read_dirs = ["~/.claude"]
write_dirs = ["~/.claude"]
# Claude stores its login in ~/.claude.json; granting ~ would expose every
# dotfile secret, so grant just the login files (read+write — Claude rewrites
# them to refresh tokens). Without this a sandboxed Claude stays logged out.
write_files = ["~/.claude.json", "~/.claude.json.lock", "~/.claude.lock"]

[agents.codex]
command = "codex"
args = []
resume_args = ["resume", "--last"]
fork_args = ["fork", "{fork_source_agent_session_id}"]

[agents.codex.sandbox]
read_dirs = ["~/.codex"]
write_dirs = ["~/.codex"]

[agents.opencode]
command = "opencode"
args = []
resume_args = ["--session", "{agent_session_id}"]

[agents.agy]
command = "agy"
args = []
resume_args = ["--conversation", "{agent_session_id}"]

[agents.agy.sandbox]
read_dirs = ["~/.gemini"]
write_dirs = ["~/.gemini"]
