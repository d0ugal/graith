version: 2

# Stable Darwin releases are built on Apple Silicon. Linux uses the separate
# .goreleaser-linux.yaml platform builder and all outputs meet in one publisher.
before:
  hooks:
    - mkdir -p completions
    - sh -c 'go run ./cmd/graith completion bash > completions/gr.bash'
    - sh -c 'go run ./cmd/graith completion zsh > completions/gr.zsh'
    - sh -c 'go run ./cmd/graith completion fish > completions/gr.fish'
    - rm -rf man
    - mkdir -p man
    - sh -c 'SOURCE_DATE_EPOCH=$(git log -1 --format=%ct) && export SOURCE_DATE_EPOCH && go run ./cmd/graith man man'
    - sh -c 'gzip -9 -n -f man/*.1'
    - sh -c 'make notifier'
    - sh -c 'test "$(uname -s)" != Darwin || test -x macos/build/GraithNotifier.app/Contents/MacOS/graith-notifier'
    - sh -c 'test "$(uname -s)-$(uname -m)" != Darwin-arm64 || { test -n "${GRAITH_LIBGHOSTTY_WORK:-}" && test -f "$GRAITH_LIBGHOSTTY_WORK/pkgconfig/libghostty-vt-static.pc"; }'

builds:
  # Intel macOS remains the supported pure-Go Charm artifact. It is not a
  # rollback artifact and deliberately carries no native metadata.
  - id: gr-darwin-amd64
    main: ./cmd/graith
    binary: gr
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w
      - -X github.com/d0ugal/graith/internal/version.Version={{.Version}}
      - -X github.com/d0ugal/graith/internal/version.CommitSHA={{.Commit}}
      - -X github.com/d0ugal/graith/internal/daemonservice.ManagedBuild=true
      - -X github.com/d0ugal/graith/internal/daemonservice.DevelopmentBuild={{ .IsSnapshot }}
      - -X github.com/d0ugal/graith/internal/daemonservice.ExpectedTeamID={{ if not .IsSnapshot }}{{ .Env.GRAITH_SIGNING_TEAM_ID }}{{ end }}
      - -X github.com/d0ugal/graith/internal/daemonservice.ExpectedRequirementBase64={{ if not .IsSnapshot }}{{ .Env.GRAITH_SIGNING_REQUIREMENT_B64 }}{{ end }}
    hooks:
      post:
        - cmd: macos/service/release-hook.sh "{{ .Path }}" "{{ .Target }}" "{{ .Version }}" "{{ .Commit }}" "{{ .IsSnapshot }}"
          output: true
    goos:
      - darwin
    goarch:
      - amd64
  - id: gr-darwin-arm64
    main: ./cmd/graith
    binary: gr
    env:
      - CGO_ENABLED=1
    flags:
      - -trimpath
    tags:
      - libghostty
    mod_timestamp: "{{ .CommitTimestamp }}"
    ldflags:
      - -s -w
      - -X github.com/d0ugal/graith/internal/version.Version={{.Version}}
      - -X github.com/d0ugal/graith/internal/version.CommitSHA={{.Commit}}
      - -X github.com/d0ugal/graith/internal/daemonservice.ManagedBuild=true
      - -X github.com/d0ugal/graith/internal/daemonservice.DevelopmentBuild={{ .IsSnapshot }}
      - -X github.com/d0ugal/graith/internal/daemonservice.ExpectedTeamID={{ if not .IsSnapshot }}{{ .Env.GRAITH_SIGNING_TEAM_ID }}{{ end }}
      - -X github.com/d0ugal/graith/internal/daemonservice.ExpectedRequirementBase64={{ if not .IsSnapshot }}{{ .Env.GRAITH_SIGNING_REQUIREMENT_B64 }}{{ end }}
    hooks:
      post:
        # The service hook signs first. SPDX therefore binds the final standalone
        # bytes, which are identical to the executable inside Graith.app.
        - cmd: macos/service/release-hook.sh "{{ .Path }}" "{{ .Target }}" "{{ .Version }}" "{{ .Commit }}" "{{ .IsSnapshot }}"
          output: true
        - cmd: scripts/libghostty-native.sh package-darwin-arm64 "{{ .Path }}" "macos/build/libghostty-native-arm64" "{{ index .Env "GRAITH_SPDX_VALIDATOR_JAR" }}" gr
          output: true
    goos:
      - darwin
    goarch:
      - arm64

archives:
  - id: darwin-amd64
    ids:
      - gr-darwin-amd64
    formats:
      - tar.gz
    name_template: "graith_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - completions/gr.bash
      - completions/gr.zsh
      - completions/gr.fish
      - man/*.1.gz
      - src: macos/build/GraithNotifier.app/**/*
        dst: GraithNotifier.app/Contents
      - src: macos/build/service-release-{{ .Arch }}/Graith.app/**/*
        dst: Graith.app/Contents
  - id: darwin-arm64
    ids:
      - gr-darwin-arm64
    formats:
      - tar.gz
    name_template: "graith_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md
      - CHANGELOG.md
      - completions/gr.bash
      - completions/gr.zsh
      - completions/gr.fish
      - man/*.1.gz
      - src: macos/build/GraithNotifier.app/**/*
        dst: GraithNotifier.app/Contents
      - src: macos/build/service-release-{{ .Arch }}/Graith.app/**/*
        dst: Graith.app/Contents
      - src: macos/build/libghostty-native-arm64/libghostty-native.spdx.json
        dst: libghostty-native.spdx.json
      - src: macos/build/libghostty-native-arm64/THIRD_PARTY_NOTICES.libghostty.md
        dst: THIRD_PARTY_NOTICES.libghostty.md

checksum:
  name_template: checksums.txt

changelog:
  disable: true

snapshot:
  version_template: '{{ index .Env "GRAITH_RELEASE_VERSION" }}'
