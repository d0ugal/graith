# graith default configuration
#
# This file defines the built-in defaults. To create your own config:
#   gr config reset
#
# To see what you've changed from defaults:
#   gr config diff
#
# To see the effective merged config:
#   gr config show
#
# Template variables available in agent args:
#   {username}                      - GitHub username or "user"
#   {agent_session_id}              - UUID for the agent session
#   {session_name}                  - Human-readable session name
#   {session_id}                    - Internal graith session ID
#   {worktree_path}                 - Absolute path to the session worktree
#   {fork_source_agent_session_id}  - Source session's agent ID (fork only)

default_agent = "claude"
branch_prefix = "{username}/graith"
fetch_on_create = true
# data_dir = "~/.graith"  # Override data directory (default: XDG data home)

agent_prompt = """\
You are running inside a graith session — a terminal multiplexer for AI coding agents.

## Status updates

Run `gr status "message"` to set your status visible to the user and other agents in the session picker. Update at key milestones:

```
gr status "Exploring code"
gr status "Running tests"
gr status "Waiting for CI"
gr status "Done"
```

## Inter-agent messaging

```
gr msg send <session> "text"          # message another session directly
gr msg send --parent "text"           # message your parent session
gr msg send --children "text"         # message all child sessions
gr msg pub --topic <topic> "text"     # broadcast to a topic
gr msg sub --topic inbox --all --ack  # read and acknowledge inbox messages
```

Note: `gr msg sub --wait` blocks until a message arrives. Use `--all` to read without blocking.

## Document store

Store and retrieve artifacts that persist across sessions using `gr store`:

```
gr store put design/api.md --file ./api-design.md   # store a document
gr store put notes/summary.md "# Summary\\n\\n..."     # store inline content
gr store get design/api.md                           # retrieve a document
gr store list                                        # list all documents
gr store list design/                                # list by prefix
gr store rm design/api.md                            # remove a document
gr store append logs/data.jsonl '{"key":"value"}'    # append a line (JSONL)
```

Documents are plain files in a per-repo git directory — browsable, greppable, and version-tracked. Use the store for artifacts you want to keep but don't want to commit: design docs, research notes, build outputs, shared context between agents.

## Environment

- GRAITH_SESSION_ID — your session ID (set automatically)
- GRAITH_SESSION_NAME — your session name
- GRAITH_WORKTREE_PATH — absolute path to your session worktree
- GRAITH_REPO_PATH — absolute path to the source repository

Run `gr --help` for the full command list.\
"""

[status_bar]
enabled = true
position = "bottom"

[notifications]
enabled = true
on_approval = true

[approvals]
mode = "prompt"
timeout = "10m"

[keybindings]
prefix = "ctrl+b"
new_session = "c"
fork_session = "f"
delete_session = "x"
detach = "d"
session_list = "w"
next_session = "n"
prev_session = "p"
last_session = "l"
resume_session = "R"
rename_session = ","
search = "/"
scroll_mode = "["
shell = "s"

# Agent definitions
# Each agent needs at minimum: command, args
# Optional: resume_args, fork_args, env, idle_timeout, sandbox

[agents.claude]
command = "claude"
args = ["--session-id", "{agent_session_id}"]
resume_args = ["--resume", "{agent_session_id}"]
fork_args = ["--resume", "{fork_source_agent_session_id}", "--fork-session", "--session-id", "{agent_session_id}"]

[agents.claude.sandbox]
read_dirs = ["~/.claude"]
write_dirs = ["~/.claude"]

[agents.codex]
command = "codex"
args = []
resume_args = ["resume", "--last"]
fork_args = ["fork", "{fork_source_agent_session_id}"]

[agents.codex.sandbox]
read_dirs = ["~/.codex"]
write_dirs = ["~/.codex"]

[agents.opencode]
command = "opencode"
args = []
resume_args = ["--session", "{agent_session_id}"]

[agents.cursor]
command = "agent"
args = []
resume_args = ["resume"]
validate_model = "agent --list-models"

[agents.cursor.sandbox]
read_dirs = ["~/.cursor"]
write_dirs = ["~/.cursor"]

[agents.agy]
command = "agy"
args = []
resume_args = ["--conversation", "{agent_session_id}"]

[agents.agy.sandbox]
read_dirs = ["~/.gemini"]
write_dirs = ["~/.gemini"]
