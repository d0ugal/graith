# graith default configuration
#
# This file defines the built-in defaults. To create your own config:
#   gr config reset
#
# To see what you've changed from defaults:
#   gr config diff
#
# To see the effective merged config:
#   gr config show
#
# Template variables available in agent args:
#   {username}                      - GitHub username or "user"
#   {agent_session_id}              - UUID for the agent session
#   {session_name}                  - Human-readable session name
#   {session_id}                    - Internal graith session ID
#   {worktree_path}                 - Absolute path to the session worktree
#   {fork_source_agent_session_id}  - Source session's agent ID (fork only)

# Agent type used by `gr new` when --agent is not given (must match an [agents.*] key).
default_agent = "claude"
# Prefix for the git branch created per session; {username} expands to the GitHub username.
branch_prefix = "{username}/graith"
# Run `git fetch` on the source repo before creating a worktree, so new sessions branch off up-to-date refs.
fetch_on_create = true
# data_dir = "~/.graith"  # Override data directory (default: XDG data home)

agent_prompt = """\
You are running inside a graith session — a terminal multiplexer for AI coding agents.

## Status updates

Run `gr status "message"` to set your status visible to the user and other agents in the session picker. Update at key milestones:

```
gr status "Exploring code"
gr status "Running tests"
gr status "Waiting for CI"
gr status "Done"
```

## Inter-agent messaging

```
gr msg send <session> "text"          # message another session directly
gr msg send --parent "text"           # message your parent session
gr msg send --children "text"         # message all child sessions
gr msg pub --topic <topic> "text"     # broadcast to a topic
gr msg inbox --all --ack              # read and acknowledge inbox messages
```

Note: `gr msg sub --wait` blocks until a message arrives. Use `--all` to read without blocking.

## Document store

Store and retrieve artifacts that persist across sessions using `gr store`:

```
gr store put design/api.md --file ./api-design.md   # store a document
gr store put notes/summary.md "# Summary\\n\\n..."     # store inline content
gr store get design/api.md                           # retrieve a document
gr store list                                        # list all documents
gr store list design/                                # list by prefix
gr store rm design/api.md                            # remove a document
gr store append logs/data.jsonl '{"key":"value"}'    # append a line (JSONL)
```

Documents are plain files in a per-repo git directory — browsable, greppable, and version-tracked. Use the store for artifacts you want to keep but don't want to commit: design docs, research notes, build outputs, shared context between agents.

Use `--shared` to access a global store that is not scoped to any repo:

```
gr store put --shared prompts/review.md "Review this code..."
gr store get --shared prompts/review.md
gr store ls --shared
```

## Environment

- GRAITH_SESSION_ID — your session ID (set automatically)
- GRAITH_SESSION_NAME — your session name
- GRAITH_WORKTREE_PATH — absolute path to your session worktree
- GRAITH_REPO_PATH — absolute path to the source repository

Run `gr --help` for the full command list.\
"""

# Background auto-pull to keep tracked git-maintenance repos current (NOT session
# worktrees). Fast-forwards a repo only when it is on its default branch, clean,
# has an upstream, and can fast-forward; skips detached HEADs, in-progress git
# ops, and repos with an active in-place or default-branch session.
[git_pull]
enabled = false          # run the background pull loop
interval = "1h"          # how often to pull (must be at least 1 minute)

# Launch throttle & startup watchdog: bounds concurrent agent-session startup so
# a burst of `gr new` doesn't stampede, and recovers sessions that stall during
# launch (never produce output, sit at agent_status "unknown"). See issue #1092.
[launch]
max_concurrent = 3       # max agent spawns in their startup window at once (< 1 => default 3)
startup_timeout = "3m"   # kill+restart a session stuck with no output past this ("0" disables the watchdog)
settle_timeout = "10s"   # how long a launch holds its slot waiting for first output ("0" => release right after spawn)

# Soft delete: `gr delete` marks a session deleted and keeps its worktree and
# state for the retention window so it can be recovered with `gr restore`. The
# daemon purges soft-deleted sessions after the window elapses. `gr purge`
# hard-deletes immediately. Set retention to "0" to disable soft delete — then
# `gr delete` is rejected (use `gr purge` to remove sessions).
[delete]
retention = "24h"        # how long soft-deleted sessions are kept before purge

# PR & CI awareness loop: resolves eligible worktree sessions' GitHub PRs via the
# gh CLI, polls their checks/reviews, and notifies the owning session's inbox on
# transitions.
[pr_watch]
enabled = false                  # turn the PR/CI watch loop on
# notify_ci_failures: notify on CI failures (machine verdict, safe to act on).
# Fires early — as soon as any check goes red, even while others are still
# running, flagging the outstanding jobs — then sends a completion notice with
# the final outcome once every check finishes (the failing tally if still red,
# or a green confirmation if it recovered first).
notify_ci_failures = true
notify_merge_conflicts = true    # notify when the PR becomes CONFLICTING with its base
notify_review_comments = true    # notify on new inline code-review comments (anchored to a file:line)
# notify_pr_comments: regular conversation comments on the PR thread (issue-style,
# not tied to a line of code). Distinct from notify_review_comments above.
# Compat: notify_review_comments once gated both surfaces; an older config that
# enables it but omits notify_pr_comments keeps getting conversation comments.
notify_pr_comments = true        # notify on new PR conversation (issue-style) comments
notify_review_decisions = true   # notify on approved / changes-requested review decisions
notify_pr_lifecycle = true       # notify when the PR is merged or closed
notify_ci_recovery = true        # notify when CI goes green again after having failed
poll_pending = "30s"             # poll interval while checks are pending/in-progress
poll_terminal = "5m"             # poll interval once all checks are terminal but the PR is still open
poll_merged = "15m"              # sweep interval for merged/closed PRs
max_notifications_per_pr = 10    # cap on informational notices per PR head SHA (CI-failure/conflict directives bypass it)
debounce = "2m"                  # minimum cooldown between notifications to one session
# Author-trust gate for PR comments (prompt-injection defence). A comment is
# only delivered if its author is trusted: either its login is in
# comment_author_allowlist, or its GitHub author_association is in
# trusted_author_associations. Untrusted comments are dropped from notifications
# (the cursor still advances). Defaults trust org members/owners/collaborators
# and no bots — allowlist bots/Apps by login (their association is unreliable, so
# it never confers trust on a "<slug>[bot]" login; the allowlist is the only way
# to trust a bot).
# comment_author_allowlist = ["github-actions[bot]", "coderabbitai[bot]"]
# Omit trusted_author_associations to keep the default tier below. Set it to an
# explicit empty list ([]) to trust NO association — allowlist-only mode (fails
# closed); this is honoured, not silently widened back to the default.
trusted_author_associations = ["OWNER", "MEMBER", "COLLABORATOR"]  # CONTRIBUTOR is deliberately excluded
notify_untrusted_authors = true  # message the orchestrator once per new untrusted author (metadata only, never the comment body)

[status_bar]
enabled = true       # show the status bar in attached sessions
position = "bottom"  # where to render it: "top" or "bottom"

# Desktop notifications for agent status changes (approval, stopped) and for
# proactive `gr notify` push notifications sent by the orchestrator or triggers.
[notifications]
enabled = true      # master switch for status-change and push notifications
on_approval = true  # notify when a session enters the "approval" (waiting-for-human) state
# backend selects how `gr notify` push notifications are delivered:
#   "macos"   osascript desktop notification (default; high priority plays a sound)
#   "command" run the [notifications] command with GRAITH_NOTIFY_{TITLE,MESSAGE,PRIORITY}
# (ntfy/pushover/slack backends are planned follow-ups.)
# backend = "macos"
# max_per_hour rate-limits low/normal push notifications over a rolling hour
# (high priority bypasses it). Defaults to 12.
# max_per_hour = 12
# quiet_hours_start / quiet_hours_end suppress low/normal push notifications in a
# daily window (24-hour "HH:MM"; may wrap past midnight). High priority bypasses.
# quiet_hours_start = "22:00"
# quiet_hours_end = "07:00"

[approvals]
# enabled controls whether the PreToolUse approve-request gating hook is
# installed. Defaults to false: the status/lifecycle hooks still run but the
# approval gate does not, because unattended agents otherwise see their own
# tool calls as human-rejected and the OS sandbox is the intended guardrail.
# Set to true to opt back into human approval gating.
# enabled = true
# backend selects who makes the automated decision: "" (none — always prompt the
# human), "command"/"external" (delegate to a command over graith's JSON contract),
# "localmost" (the real localmost binary over its native protocol), "builtin"
# (graith's built-in localmost-compatible engine), or "auto".
backend = ""
timeout = "10m"  # how long to wait for an approval decision before it times out

[overlay]
# Keys that jump straight to the Nth session in the picker (1st key → session 1, …).
shortcut_keys = "1234567890"

# Prefix key plus a command key trigger these actions while attached.
# NOTE: all keys below are read from config (passthrough keys via
# cli/attach.go passthroughKeysFromConfig, picker keys via overlayKeysFromConfig).
# The messages/approvals/restart passthrough keys (m/a/r) have no config field
# yet and stay literal.
# Each command key is a single literal character (only prefix accepts "ctrl+…").
[keybindings]
prefix = "ctrl+b"             # the prefix key; press it, then one of the keys below
new_session = "c"             # open the create-session form
fork_session = "f"           # fork the current session
delete_session = "x"         # delete a session in the picker
detach = "d"                 # detach without stopping the agent
session_list = "w"           # open the session picker overlay
next_session = "n"           # switch to the next session
prev_session = "p"           # switch to the previous session
last_session = "l"           # switch to the most recently used session
resume_session = "R"         # open the restart menu for a session in the picker
rename_session = ","         # prompt for a new name and rename the current session
search = "/"                 # filter sessions in the picker
scroll_mode = "["            # open a scrollable pager over the session's history
shell = "s"                  # open a shell in the session's worktree
orchestrator_session = "o"   # jump to the orchestrator session

# Terminal input gestures for the attach passthrough loop.
[input]
# Touch/hold-and-drag arrow keys: press-and-hold the left mouse
# button then drag up/down/left/right to emit discrete arrow-key presses to the
# focused pane. Off by default because it repurposes left-drag, which terminals
# otherwise use for text selection; mouse-wheel scrolling always passes through.
# Only takes effect when the focused app has SGR mouse reporting enabled (e.g. a
# TUI that tracks the mouse, or a touch/mobile terminal that reports drags);
# graith translates those reports, it does not enable mouse tracking itself.
drag_arrow_keys = false
# Cells of drag movement per emitted arrow-key press (values < 1 use the default).
drag_arrow_threshold = 2

# A special worktree-less session for coordinating other sessions (ctrl+b o).
[orchestrator]
enabled = false        # make an orchestrator session available
agent = "claude"       # agent type to run as the orchestrator (defaults to claude)
model = ""             # model override; empty uses the agent's default
idle_timeout = "30m"   # stop the orchestrator after this long idle (no client, agent ready)
prompt = """\
You are the orchestrator session in a graith terminal multiplexer. You manage \
and coordinate other agent sessions working across repositories.

## Your capabilities

You have NO repository or worktree — you operate from a scratch directory. \
Your power comes from the graith control plane:

- `gr new <name> --repo <path>` — create new agent sessions (ALWAYS pass --repo)
- `gr scenario start <file-or-name>` — start a scenario from a TOML file or name
- `gr scenario resume <name>` — resume all stopped sessions in a scenario
- `gr scenario add <name> --name <session> --repo <path>` — add session to running scenario
- `gr scenario task-done <name>` — mark this session's task as complete
- `gr scenario status <name>` — check scenario status
- `gr scenario stop <name>` — stop all sessions in a scenario
- `gr scenario delete <name>` — delete a scenario and its sessions
- `gr scenario list` — list running scenarios and available scenario files
- `gr stop <session>` — stop sessions
- `gr delete <session>` — delete sessions and clean up worktrees
- `gr list` — list all sessions with status
- `gr msg send <session> "text"` — message a specific session
- `gr msg send --children "text"` — message all child sessions
- `gr msg send --parent "text"` — message your parent session
- `gr msg pub --topic <topic> "text"` — broadcast to a topic
- `gr msg sub --topic inbox --all --ack` — read and acknowledge your messages
- `gr store --shared put/get/list` — persist documents (use --shared since you have no repo)
- `gr status "message"` — set your status visible in the session picker
- `gr type <session> "text"` — type into another session

## Important notes

- You have no repo — always use `--repo <path>` when creating sessions
- Use `gr store --shared` for persistence (not repo-scoped store)
- You are the parent of sessions you create — use `--children` flags to manage them
- Wait for user input or messages rather than acting unprompted\
"""
# Path to a file whose contents are appended to the prompt above (empty = none).
prompt_file = ""

[remote]
# Optional tailnet-facing control listener. Disabled by default and fail-closed:
# when enabled, an invalid block is a hard config-load error.
enabled = false           # expose the remote control listener over the tailnet
mode = "tsnet"            # transport: "tsnet" (embedded Tailscale) or "interface" (bind an existing tailnet IP)
port = 4823               # TCP port the listener binds
require_pairing = true    # require per-device pairing for human-level rights; false is read-only and UNSAFE

# [orchestrator.sandbox]
# Extra filesystem access for the orchestrator only.
# These dirs are added on top of the global + agent sandbox config.
# Note: granting write access to ~/.config/graith lets the orchestrator
# modify graith configuration, which on reload can affect other sessions.
# read_dirs = []
# write_dirs = ["~/.config/graith"]

# [sandbox]
# OS-level sandbox for agent processes. Disabled by default. When enabled a
# `backend` MUST be chosen — there is no default; an unset backend fails closed.
#   backend = "safehouse"  # macOS Seatbelt (sandbox-exec)
#   backend = "nono"       # Landlock+seccomp on Linux, Seatbelt on macOS
# enabled = true
# backend = "nono"
# read_dirs  = ["~/Code/shared"]
# write_dirs = ["~/.cache/agent"]
# features   = ["ssh"]      # ssh -> $SSH_AUTH_SOCK; process-control -> signals
#
# signal_mode (nono only): whether the sandboxed process may signal others.
# One of "isolated", "allow_same_sandbox" (nono default), "allow_all". Set to
# "isolated" to make the `process-control` feature actually gate signalling
# under nono (safehouse ignores this field).
# signal_mode = "isolated"
#
# profile (nono only): the base profile graith's generated profile extends.
# Defaults to nono's built-in "default" (its audited deny groups + base system
# paths). Set it — these profiles are agent-specific, so set it per-agent, not
# globally — to a maintained registry profile to inherit that agent's upstream
# file grants instead of hand-listing them via write_files. nono MERGES the base
# with graith's profile: collection fields (read_dirs/write_dirs and the env
# allowlist) are unioned, so graith's grants are always present but a custom
# profile can only WIDEN the env allowlist and may add its own network/hook/env
# policy — pick a trusted, least-privilege profile. nono's required deny groups
# (deny_credentials, …) survive regardless. e.g. under [agents.claude.sandbox]:
# profile = "always-further/claude". safehouse has no profile concept, ignores it.
# profile = "always-further/claude"
#
# [sandbox.network]  (nono only)
# Optional egress policy. Requires Landlock ABI v4 (kernel 6.7+) on Linux; a
# requested policy on an older kernel fails closed. safehouse has no network
# primitive and fails closed if a network policy is set.
#   block = true                          # deny all outbound
#   allow_domains = ["github.com", "https://api.anthropic.com/**"]  # proxy allowlist
# block = false
# allow_domains = []

# Agent definitions. The map key (e.g. "claude") is the agent type name.
# Each agent needs at minimum: command, args
# Optional: resume_args, fork_args, env, idle_timeout, sandbox, mcp_servers,
#   validate_model, interrupt_count, interrupt_delay_ms, inject_prompt,
#   pre_trust_workspace

[agents.claude]
command = "claude"                                    # binary to launch
args = ["--session-id", "{agent_session_id}"]        # args for a fresh session (templates expanded)
resume_args = ["--resume", "{agent_session_id}"]     # args to resume an existing session
# args to fork from a source session (used by ctrl+b f)
fork_args = ["--resume", "{fork_source_agent_session_id}", "--fork-session", "--session-id", "{agent_session_id}"]
# Claude's TUI ignores a single Ctrl-C; it needs two rapid presses (~200ms
# apart) to actually interrupt. Other agents default to a single Ctrl-C.
interrupt_count = 2
interrupt_delay_ms = 200

# Extra sandbox grants for this agent, merged on top of the global [sandbox]
# config. Only take effect when the sandbox is enabled. "write" means read+write.
[agents.claude.sandbox]
read_dirs = ["~/.claude"]
write_dirs = ["~/.claude"]

[agents.codex]
command = "codex"
args = []
# Codex mints its own session id; graith captures it from the rollout on disk
# after start (captureNativeSessionID). Resume pins to that id when known; when
# it wasn't captured, the daemon's empty-id guard falls back to `resume --last`
# (cwd-scoped, best-effort).
resume_args = ["resume", "{agent_session_id}"]
fork_args = ["fork", "{fork_source_agent_session_id}"]

[agents.codex.sandbox]
read_dirs = ["~/.codex"]
write_dirs = ["~/.codex"]

[agents.opencode]
command = "opencode"
args = []
resume_args = ["--session", "{agent_session_id}"]

[agents.cursor]
command = "agent"           # the Cursor CLI binary is named `agent`
args = []
resume_args = ["resume"]
# Command listing valid model IDs ("id - description" per line); a requested
# {model} not in the list is rejected before the session starts.
validate_model = "agent --list-models"

[agents.cursor.sandbox]
read_dirs = ["~/.cursor"]
write_dirs = ["~/.cursor"]

[agents.agy]
command = "agy"
args = []
resume_args = ["--conversation", "{agent_session_id}"]

[agents.agy.sandbox]
read_dirs = ["~/.gemini"]
write_dirs = ["~/.gemini"]

# ── Triggers ────────────────────────────────────────────────────────────────
# Daemon-fired automation: a trigger is (source) → (action). Exactly one source
# ([trigger.schedule] or [trigger.watch]) per [[trigger]]. Commented out by
# default. See docs/design/2026-07-11-triggers-design.md.
#
# Daemon-wide cap on concurrently-running trigger actions:
# [triggers]
# max_concurrent = 4
#
# Schedule → session: a daily PR report.
# [[trigger]]
# name = "daily-pr-report"
# [trigger.schedule]
# cron     = "0 9 * * *"        # or: every = "15m"
# timezone = "Europe/London"
# [trigger.action]
# type   = "session"
# prompt = "Summarise open PRs and post to the orchestrator inbox."
# repo   = "~/Code/graith"
# agent  = "claude"
# [trigger.action.deliver]
# inbox = "orchestrator"
# store = "reports/pr/{date}.md"
#
# Watch → command: run tests when Go source changes (binds to any session on the
# repo; a watch source selects by repo or role, never a live session name).
# [[trigger]]
# name = "test-on-change"
# [trigger.watch]
# repo     = "~/Code/graith"
# paths    = ["**/*.go"]
# debounce = "30s"             # lower for fast commands
# [trigger.action]
# type    = "command"
# command = "go test ./..."
# [trigger.action.deliver]
# inbox = "{session_name}"
#
# Watch → ensure-reviewer: keep a reviewer reacting to an implementer's changes.
# [[trigger]]
# name = "review-go"
# [trigger.watch]
# role  = "implementer"
# paths = ["**/*.go"]
# [trigger.action]
# type   = "session"
# ensure = true
# agent  = "claude"
# prompt = "Review the changes since your last look; send feedback via gr msg."
