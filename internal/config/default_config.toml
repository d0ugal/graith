# graith default configuration
#
# This file defines the built-in defaults. To create your own config:
#   gr config reset
#
# To see what you've changed from defaults:
#   gr config diff
#
# To see the effective merged config:
#   gr config show
#
# Template variables available in agent args:
#   {username}                      - GitHub username or "user"
#   {agent_session_id}              - UUID for the agent session
#   {session_name}                  - Human-readable session name
#   {session_id}                    - Internal graith session ID
#   {worktree_path}                 - Absolute path to the session worktree
#   {fork_source_agent_session_id}  - Source session's agent ID (fork only)

# Agent type used by `gr new` when --agent is not given (must match an [agents.*] key).
default_agent = "claude"
# Prefix for the git branch created per session; {username} expands to the GitHub username.
branch_prefix = "{username}/graith"
# Run `git fetch` on the source repo before creating a worktree, so new sessions branch off up-to-date refs.
fetch_on_create = true
# data_dir = "~/.graith"  # Override data directory (default: XDG data home)

agent_prompt = """\
You are running inside a graith session — a terminal multiplexer for AI coding agents.

## Status updates

Run `gr status "message"` to set your status visible to the user and other agents in the session picker. Update at key milestones:

```
gr status "Exploring code"
gr status "Running tests"
gr status "Waiting for CI"
gr status "Done"
```

## Inter-agent messaging

```
gr msg send <session> "text"          # message another session directly
gr msg send --parent "text"           # message your parent session
gr msg send --children "text"         # message all child sessions
gr msg pub --topic <topic> "text"     # broadcast to a topic
gr msg inbox --all --ack              # read and acknowledge inbox messages
```

Note: `gr msg sub --wait` blocks until a message arrives. Use `--all` to read without blocking.

## Document store

Store and retrieve artifacts that persist across sessions using `gr store`:

```
gr store put design/api.md --file ./api-design.md   # store a document
gr store put notes/summary.md "# Summary\\n\\n..."     # store inline content
gr store get design/api.md                           # retrieve a document
gr store list                                        # list all documents
gr store list design/                                # list by prefix
gr store rm design/api.md                            # remove a document
gr store append logs/data.jsonl '{"key":"value"}'    # append a line (JSONL)
```

Documents are plain files in a per-repo git directory — browsable, greppable, and version-tracked. Use the store for artifacts you want to keep but don't want to commit: design docs, research notes, build outputs, shared context between agents.

Use `--shared` to access a global store that is not scoped to any repo:

```
gr store put --shared prompts/review.md "Review this code..."
gr store get --shared prompts/review.md
gr store ls --shared
```

## Environment

- GRAITH_SESSION_ID — your session ID (set automatically)
- GRAITH_SESSION_NAME — your session name
- GRAITH_WORKTREE_PATH — absolute path to your session worktree
- GRAITH_REPO_PATH — absolute path to the source repository

Run `gr --help` for the full command list.\
"""

# Hot reload of this file. graith watches config.toml and reloads it in place
# (also on `gr daemon reload`). reload_debounce is the quiet period the watcher
# waits after the last write before reloading, so an editor's
# write-truncate-write burst collapses into a single reload.
[config]
reload_debounce = "200ms"  # quiet period after the last write before reloading ("" or non-positive => 200ms)

# Background auto-pull to keep tracked git-maintenance repos current (NOT session
# worktrees). Fast-forwards a repo only when it is on its default branch, clean,
# has an upstream, and can fast-forward; skips detached HEADs, in-progress git
# ops, and repos with an active in-place or default-branch session.
[git_pull]
enabled = false          # run the background pull loop
interval = "1h"          # how often to pull (must be at least 1 minute)

# Launch throttle & startup watchdog: bounds concurrent agent-session startup so
# a burst of `gr new` doesn't stampede, and recovers sessions that stall during
# launch (never produce output, sit at agent_status "unknown"). See issue #1092.
[launch]
max_concurrent = 3       # max agent spawns in their startup window at once (< 1 => default 3)
startup_timeout = "3m"   # kill+restart a session stuck with no output past this ("0" disables the watchdog)
settle_timeout = "10s"   # how long a launch holds its slot waiting for first output ("0" => release right after spawn)

# Detection & status-classification policy: the timing that governs how the
# daemon scans PTY scrollback, refreshes remote refs, and decides agent status
# (active/ready/approval). Empty or non-positive values fall back to the
# defaults shown. Hook reports stay authoritative over PTY scraping for the
# matching hook_* window. See issue #1241.
[detection]
scan_interval = "500ms"        # how often PTY scrollback is scanned for agent status
fetch_interval = "5m"          # how often `git fetch` refreshes remote tracking refs
fetch_timeout = "30s"          # per-repo `git fetch` timeout (a slow remote can't stall the pass)
silent_threshold = "20s"       # zero PTY output past this warns the session is silent (#1087)
adopted_grace = "60s"          # after daemon-upgrade adoption, keep prior status for this window ("0" disables)
recent_output_window = "3s"    # recent PTY output alone implies "active" when scraping is inconclusive ("0" disables)
hook_start_window = "5s"       # SessionStart hook stays authoritative for this long
hook_activity_window = "30s"   # tool-use hooks (prompt/pre/post) stay authoritative for this long
hook_terminal_window = "30m"   # ready/approval hooks (Stop, idle, permission) stay authoritative for this long

# Token accounting: the daemon periodically re-derives per-session token usage
# from each supported agent's on-disk transcript (surfaced by `gr tokens`). A
# fingerprint cache means an idle fleet does almost no work between ticks. Empty
# or non-positive durations fall back to the defaults shown; batch_size < 1 uses
# the default. See issue #1244.
[token_accounting]
poll_interval = "30s"   # how often per-session token usage is re-derived from transcripts
startup_delay = "5s"    # first-tick delay after a daemon (re)start so `gr tokens` isn't blank ("0" polls immediately)
batch_size = 8          # max sessions (re)parsed per tick (bounds work on a large fleet with big transcripts)

# Resource monitor: the daemon periodically snapshots each live session's
# process-group memory/CPU/open-FD usage so sustained growth is visible in an
# abnormal-exit report. Sampling is deliberately coarse; failures never affect
# session operation. Empty or non-positive sample_interval falls back to the
# default; sample_history < 1 uses the default. See issue #1244.
[resource_monitor]
sample_interval = "30s"  # how often each session's process group is snapshotted
sample_history = 5       # how many recent samples are retained per session

# Update check: `gr list` and `gr doctor` query GitHub for a newer graith release
# and cache the result. Disable for downstream forks, packaged/offline installs,
# or to avoid the network call entirely. Never runs for a "dev" build.
[updates]
enabled = true              # check GitHub for newer graith releases
repository = "d0ugal/graith" # GitHub "owner/repo" whose latest release is checked
interval = "1h"             # how long a cached result stays fresh
timeout = "5s"              # HTTP request timeout for the release check

# External tool executables. graith shells out to a handful of binaries; by
# default they are looked up on PATH by their conventional name (or, for ps and
# lsof, their conventional absolute path). Override any of them to support
# Nix/custom-PATH installs, wrapper binaries, or alternate shells. A value may
# be a bare command name resolved on PATH ("git", "hub") or an absolute/relative
# path to a specific binary. Only values you set here are validated at startup
# (an explicit path must exist and be executable; a bare name must be on PATH);
# unset entries keep the defaults shown below and are looked up when first used.
# [tools]
# git       = "git"            # git executable
# gh        = "gh"             # GitHub CLI executable
# shell     = "sh"             # shell for notification/trigger commands (`<shell> -c ...`)
# osascript = "osascript"      # macOS desktop-notification helper
# ps        = "/bin/ps"        # process-listing binary
# lsof      = "/usr/sbin/lsof" # open-files listing binary (macOS FD sampling)

# Git operation timeouts. These bound individual git operations run during
# session lifecycle. Slower repositories, large fetches, or high-latency remotes
# can legitimately exceed the defaults. Distinct from [git_pull], which tunes the
# background maintenance-pull loop. A value that is set but unparseable, zero, or
# negative is rejected at config load.
[git]
fetch_timeout = "2m"      # bounds a single `git fetch` on create/fork/pull
merge_timeout = "2m"      # bounds a fast-forward merge in the git-pull loop
username_timeout = "15s"  # bounds GitHub-username discovery (may invoke `gh`)

# Connection deadlines and retry cadence for the stateless `gr` client talking to
# a daemon. Slow machines, high-latency links, or a remote daemon on a
# constrained network can legitimately exceed the defaults. These are read once
# per `gr` invocation, so a change takes effect on the next command. A value that
# is set but unparseable, zero, or negative is rejected at config load.
[connection]
dial_timeout = "500ms"            # bounds a single Unix-socket dial to the local daemon
handshake_timeout = "5s"          # bounds the local-daemon handshake exchange
start_timeout = "5s"              # how long to wait for a freshly spawned daemon to answer
start_poll_interval = "50ms"      # how often to re-probe the socket while the daemon starts
reconnect_timeout = "10s"         # bounds attach disconnect-recovery before giving up
reconnect_interval = "250ms"      # how often the attach recovery loop re-probes the daemon
remote_dial_timeout = "10s"       # bounds the TCP dial to a paired remote daemon
remote_handshake_timeout = "15s"  # bounds the remote handshake + proof-of-possession
remote_pairing_timeout = "11m"    # how long to wait for the remote human to approve pairing

# Soft delete: `gr delete` marks a session deleted and keeps its worktree and
# state for the retention window so it can be recovered with `gr restore`. The
# daemon purges soft-deleted sessions after the window elapses. `gr purge`
# hard-deletes immediately. Set retention to "0" to disable soft delete — then
# `gr delete` is rejected (use `gr purge` to remove sessions).
[delete]
retention = "24h"            # how long soft-deleted sessions are kept before purge
purge_startup_delay = "30s"  # delay before the first purge sweep after the daemon starts
purge_interval = "10m"       # how often the purge sweep runs thereafter (coarse; retention is in hours)

# Orphan garbage collection: `gr gc` reclaims worktree and scratch directories
# left behind by sessions no longer in state. orphan_min_age is the minimum age
# a directory must reach before GC will remove it, so a just-created directory
# belonging to an in-flight session is never destroyed. "0" disables the floor.
[gc]
orphan_min_age = "5m"        # minimum age before an orphaned worktree/scratch dir is GC-eligible

# Message log (`gr msg`) storage and operational limits. max_age/max_per_stream
# bound retention of the on-disk log (both default off — kept forever). The rest
# were fixed literals before issue #1249: the conversation paging bounds, the
# jail listing cap, the pub/sub subscriber buffer, and the SQLite busy/operation
# timeout. conversation_page_size must not exceed conversation_max_limit.
# subscriber_buffer and busy_timeout are fixed at daemon start (restart-only);
# the paging bounds and jail cap are read per-request (reloadable).
[messages]
# max_age = "30d"          # delete messages older than this ("" or "0" keeps them forever)
# max_per_stream = 5000    # keep at most this many messages per stream (0 keeps all)
conversation_page_size = 500   # page size when a conversation request omits a limit (< 1 => 500; <= max limit)
conversation_max_limit = 2000  # hard cap on messages a single conversation sorts (< 1 => 2000; ceiling 100000)
jail_list_limit = 2000         # max quarantined comments a jail listing returns (< 1 => 2000; ceiling 100000)
subscriber_buffer = 64         # per-subscriber pub/sub channel capacity (< 1 => 64; ceiling 65536)
busy_timeout = "5s"            # SQLite busy_timeout for the messages DB ("" or non-positive => 5s; max 5m)

# First-class shared todo list (`gr todo`). emit_events controls task-event
# emission, claim_lease reopens an in-progress item whose owner has gone quiet,
# and retention sweeps done items once they age past the window. The operational
# limits (max_title/max_note/list_limit/sweep_interval/busy_timeout) were fixed
# literals before issue #1249. max_title/max_note may only be tightened below the
# 500/2000 hard ceiling baked into the database CHECK constraints. sweep_interval,
# list_limit, and busy_timeout are fixed at daemon start (restart-only); the lease
# and retention windows they sweep stay reloadable.
[todo]
emit_events = "scenario"  # emit task events for: "scenario" (default) | "all" | "off"
claim_lease = "30m"       # reopen an in-progress item after this long with no progress ("0" disables)
retention   = "0"         # sweep done items older than this ("0" keeps them forever)
max_title     = 500       # max todo title length in bytes (<= 500 hard DB ceiling; < 1 => default 500)
max_note      = 2000      # max todo note length in bytes (<= 2000 hard DB ceiling; < 1 => default 2000)
list_limit    = 2000      # max items a single list returns (< 1 => default 2000; hard ceiling 100000)
sweep_interval = "1m"     # how often the lease/retention sweep runs ("" or non-positive => 1m)
busy_timeout  = "5s"      # SQLite busy_timeout for the todos DB ("" or non-positive => 5s; max 5m)

# PR & CI awareness loop: resolves eligible worktree sessions' GitHub PRs via the
# gh CLI, polls their checks/reviews, and notifies the owning session's inbox on
# transitions.
[pr_watch]
enabled = false                  # turn the PR/CI watch loop on
# notify_ci_failures: notify on CI failures (machine verdict, safe to act on).
# Fires early — as soon as any check goes red, even while others are still
# running, flagging the outstanding jobs — then sends a completion notice with
# the final outcome once every check finishes (the failing tally if still red,
# or a green confirmation if it recovered first).
notify_ci_failures = true
notify_merge_conflicts = true    # notify when the PR becomes CONFLICTING with its base
notify_review_comments = true    # notify on new inline code-review comments (anchored to a file:line)
# notify_pr_comments: regular conversation comments on the PR thread (issue-style,
# not tied to a line of code). Distinct from notify_review_comments above.
# Compat: notify_review_comments once gated both surfaces; an older config that
# enables it but omits notify_pr_comments keeps getting conversation comments.
notify_pr_comments = true        # notify on new PR conversation (issue-style) comments
notify_review_decisions = true   # notify on approved / changes-requested review decisions
notify_pr_lifecycle = true       # notify when the PR is merged or closed
notify_ci_recovery = true        # notify when CI goes green again after having failed
poll_pending = "30s"             # poll interval while checks are pending/in-progress
poll_terminal = "5m"             # poll interval once all checks are terminal but the PR is still open
poll_merged = "15m"              # sweep interval for merged/closed PRs
max_notifications_per_pr = 10    # cap on informational notices per PR head SHA (CI-failure/conflict directives bypass it)
debounce = "2m"                  # minimum cooldown between notifications to one session
# Author-trust gate for PR comments (prompt-injection defence). A comment is
# only delivered if its author is trusted: either its login is in
# comment_author_allowlist, or its GitHub author_association is in
# trusted_author_associations. Untrusted comments are dropped from notifications
# (the cursor still advances). Defaults trust org members/owners/collaborators
# and no bots — allowlist bots/Apps by login (their association is unreliable, so
# it never confers trust on a "<slug>[bot]" login; the allowlist is the only way
# to trust a bot).
# comment_author_allowlist = ["github-actions[bot]", "coderabbitai[bot]"]
# Omit trusted_author_associations to keep the default tier below. Set it to an
# explicit empty list ([]) to trust NO association — allowlist-only mode (fails
# closed); this is honoured, not silently widened back to the default.
trusted_author_associations = ["OWNER", "MEMBER", "COLLABORATOR"]  # CONTRIBUTOR is deliberately excluded
notify_untrusted_authors = true  # message the orchestrator once per new untrusted author (metadata only, never the comment body)

# Advanced watcher tuning. These are the low-level policy defaults the daemon
# applies; they are stated here (not only in code) so `gr config show/diff/reset`
# describe the full effective behaviour. Tune them to trade off gh load, detection
# latency, notification retention, and the untrusted-author prompt surface. The
# loop-lifetime knobs (base_tick, kick_channel_size, ref_reconcile_interval) take
# effect on the next daemon (re)start.
[pr_watch.advanced]
base_tick                      = "15s"    # base poll-loop cadence (per-session gating paces gh below it)
batch_size                     = 3        # max sessions polled per tick (bounds gh load on a large fleet)
no_pr_negative_cache           = "5m"     # re-resolve a branch with no PR at most this often
comment_body_max_bytes         = 1024     # truncate each delivered comment body to this many bytes
notification_rate_limit        = 5        # per-session rolling notification cap (anti-thrash backstop)
notification_rate_window       = "30m"    # rolling window for notification_rate_limit
untrusted_author_prompt_rate   = 5        # max untrusted-author trust prompts to the orchestrator per window
untrusted_author_prompt_window = "30m"    # rolling window for untrusted_author_prompt_rate
max_prompted_authors           = 5000     # cap on the persisted set of already-surfaced untrusted authors
kick_cooldown                  = "3s"     # min interval between git-ref-triggered polls of one session
kick_channel_size              = 64       # buffered kick-channel capacity (a full channel drops the kick)
kicked_no_pr_backoff           = "20s"    # short re-poll delay after a kicked poll finds no PR yet
ref_reconcile_interval         = "2s"     # how often the git-ref watcher set is reconciled against sessions
ref_debounce                   = "750ms"  # coalesce a burst of ref writes from one push/commit into one kick
gh_timeout                     = "5s"     # per-command timeout for the daemon's gh invocations

[status_bar]
enabled = true       # show the status bar in attached sessions
position = "bottom"  # where to render it: "top" or "bottom"

# Ephemeral agent status set via `gr status`. ttl is how long a status stays
# current before it auto-expires once the agent produces new output without
# updating it; override per-update with `gr status --ttl <duration>`.
[status]
ttl = "5m"  # how long a `gr status` value stays current before it expires

# Desktop notifications for agent status changes (approval, stopped) and for
# proactive `gr notify` push notifications sent by the orchestrator or triggers.
[notifications]
enabled = true      # master switch for status-change and push notifications
on_approval = true  # notify when a session enters the "approval" (waiting-for-human) state
# backend selects how `gr notify` push notifications are delivered:
#   "macos"   osascript desktop notification (default; high priority plays a sound)
#   "command" run the [notifications] command with GRAITH_NOTIFY_{TITLE,MESSAGE,PRIORITY}
# (ntfy/pushover/slack backends are planned follow-ups.)
backend = "macos"
# max_per_hour rate-limits low/normal push notifications over a rolling hour
# (high priority bypasses it).
max_per_hour = 12
# quiet_hours_start / quiet_hours_end suppress low/normal push notifications in a
# daily window (24-hour "HH:MM"; may wrap past midnight). High priority bypasses.
# quiet_hours_start = "22:00"
# quiet_hours_end = "07:00"

# Low-level notification timing. These were formerly fixed constants (issue #1245);
# override to tune coalescing, dispatch, and inbox-notification pacing.
[notifications.timing]
coalesce_window = "30s"       # drop an identical push within this window ("0" disables coalescing)
dispatch_timeout = "15s"      # per-backend dispatch timeout (osascript/notifier/command)
inbox_idle_timeout = "10s"    # wait for an attached session's PTY to be idle this long before injecting
inbox_max_wait = "2m"         # cap on the user-idle wait before injecting anyway
inbox_cooldown = "30s"        # minimum interval between unread-inbox nudges to one session ("0" disables)
inbox_detached_delay = "5s"   # settle delay before notifying a session with no attached client ("0" is immediate)

[approvals]
# enabled controls whether the PreToolUse approve-request gating hook is
# installed. Defaults to false: the status/lifecycle hooks still run but the
# approval gate does not, because unattended agents otherwise see their own
# tool calls as human-rejected and the OS sandbox is the intended guardrail.
# Set to true to opt back into human approval gating.
# enabled = true
# backend selects who makes the automated decision: "" (none — always prompt the
# human), "command"/"external" (delegate to a command over graith's JSON contract),
# "localmost" (the real localmost binary over its native protocol), "builtin"
# (graith's built-in localmost-compatible engine), or "auto".
backend = ""
timeout = "10m"  # how long to wait for an approval decision before it times out
# Per-backend subprocess execution timeouts. These bound a single automated
# backend invocation and must be positive, at most 60s, and strictly shorter
# than timeout above (a backend decision runs inside the approval deadline).
# Both default to 5s when unset — leave them commented to keep that default.
# command_timeout   = "5s"  # bounds the "command"/"external" backend
# localmost_timeout = "5s"  # bounds the "localmost" binary check

[overlay]
# Keys that jump straight to the Nth session in the picker (1st key → session 1, …).
shortcut_keys = "1234567890"

# Prefix key plus a command key trigger these actions while attached.
# NOTE: all keys below are read from config (passthrough keys via
# cli/attach.go passthroughKeysFromConfig, picker keys via overlayKeysFromConfig).
# The messages/approvals/restart passthrough keys (m/a/r) have no config field
# yet and stay literal.
# Each command key is a single literal character (only prefix accepts "ctrl+…").
[keybindings]
prefix = "ctrl+b"             # the prefix key; press it, then one of the keys below
new_session = "c"             # open the create-session form
fork_session = "f"           # fork the current session
delete_session = "x"         # delete a session in the picker
detach = "d"                 # detach without stopping the agent
session_list = "w"           # open the session picker overlay
next_session = "n"           # switch to the next session
prev_session = "p"           # switch to the previous session
last_session = "l"           # switch to the most recently used session
resume_session = "R"         # open the restart menu for a session in the picker
rename_session = ","         # prompt for a new name and rename the current session
search = "/"                 # filter sessions in the picker
scroll_mode = "["            # open a scrollable pager over the session's history
shell = "s"                  # open a shell in the session's worktree
orchestrator_session = "o"   # jump to the orchestrator session

# Terminal input gestures for the attach passthrough loop.
[input]
# Touch/hold-and-drag arrow keys: press-and-hold the left mouse
# button then drag up/down/left/right to emit discrete arrow-key presses to the
# focused pane. Off by default because it repurposes left-drag, which terminals
# otherwise use for text selection; mouse-wheel scrolling always passes through.
# Only takes effect when the focused app has SGR mouse reporting enabled (e.g. a
# TUI that tracks the mouse, or a touch/mobile terminal that reports drags);
# graith translates those reports, it does not enable mouse tracking itself.
drag_arrow_keys = false
# Cells of drag movement per emitted arrow-key press (values < 1 use the default).
drag_arrow_threshold = 2

# A special worktree-less session for coordinating other sessions (ctrl+b o).
[orchestrator]
enabled = false        # make an orchestrator session available
agent = ""             # agent type to run as the orchestrator (empty inherits default_agent)
model = ""             # model override; empty uses the agent's default
idle_timeout = "30m"   # stop the orchestrator after this long idle (no client, agent ready)
prompt = """\
You are the orchestrator session in a graith terminal multiplexer. You manage \
and coordinate other agent sessions working across repositories.

## Your capabilities

You have NO repository or worktree — you operate from a scratch directory. \
Your power comes from the graith control plane:

- `gr new <name> --repo <path>` — create new agent sessions (ALWAYS pass --repo)
- `gr scenario start <file-or-name>` — start a scenario from a TOML file or name
- `gr scenario resume <name>` — resume all stopped sessions in a scenario
- `gr scenario add <name> --name <session> --repo <path>` — add session to running scenario
- `gr todo add "<title>"` / `gr todo list` / `gr todo claim <id>` / `gr todo next` / `gr todo done <id>` — shared todo list (scenario progress is tracked here now)
- `gr scenario status <name>` — check scenario status
- `gr scenario stop <name>` — stop all sessions in a scenario
- `gr scenario delete <name>` — delete a scenario and its sessions
- `gr scenario list` — list running scenarios and available scenario files
- `gr stop <session>` — stop sessions
- `gr delete <session>` — delete sessions and clean up worktrees
- `gr list` — list all sessions with status
- `gr msg send <session> "text"` — message a specific session
- `gr msg send --children "text"` — message all child sessions
- `gr msg send --parent "text"` — message your parent session
- `gr msg pub --topic <topic> "text"` — broadcast to a topic
- `gr msg sub --topic inbox --all --ack` — read and acknowledge your messages
- `gr store --shared put/get/list` — persist documents (use --shared since you have no repo)
- `gr status "message"` — set your status visible in the session picker
- `gr type <session> "text"` — type into another session

## Important notes

- You have no repo — always use `--repo <path>` when creating sessions
- Use `gr store --shared` for persistence (not repo-scoped store)
- You are the parent of sessions you create — use `--children` flags to manage them
- Wait for user input or messages rather than acting unprompted\
"""
# Path to a file whose contents are appended to the prompt above (empty = none).
prompt_file = ""

# How the daemon auto-restarts the orchestrator after it exits unexpectedly
# (crash/watchdog — never after a user, idle, or shutdown stop). By default an
# explicit schedule preserves graith's historical backoff curve. To use
# geometric backoff instead, set schedule = [] and tune the knobs below.
[orchestrator.restart]
schedule = ["2s", "4s", "8s", "16s", "32s", "60s", "300s"]  # per-attempt delays; the last value repeats. Set to [] to use the geometric knobs.
initial_backoff = "2s"    # geometric mode: first restart delay (used only when schedule = [])
max_backoff = "300s"      # geometric mode: cap on the restart delay
multiplier = 2.0          # geometric mode: each delay = previous × this (<= 1 => default 2.0)
stable_reset = "60s"      # a run lasting at least this long resets the backoff level to 0
fresh_start_threshold = 3 # after this many consecutive restarts, relaunch the agent fresh (new session id)

[remote]
# Optional tailnet-facing control listener. Disabled by default and fail-closed:
# when enabled, an invalid block is a hard config-load error.
enabled = false           # expose the remote control listener over the tailnet
mode = "tsnet"            # transport: "tsnet" (embedded Tailscale) or "interface" (bind an existing tailnet IP)
port = 4823               # TCP port the listener binds
require_pairing = true    # require per-device pairing for human-level rights; false is read-only and UNSAFE
# pair_request_rate = "5/min"     # anti-flood rate on pending pair requests ("<n>/<sec|min|hour>")
# max_pending_pairings = 16       # cap on unapproved pair requests outstanding at once (1-1024)
# pending_pairing_ttl  = "10m"    # how long an unapproved pair request lives (1m-24h)
# pair_fallback_count  = 5        # rate count used when pair_request_rate is unset (1-1000)
# pair_fallback_window = "1m"     # rate window used when pair_request_rate is unset (1s-24h)

# [orchestrator.sandbox]
# Extra filesystem access for the orchestrator only.
# These dirs are added on top of the global + agent sandbox config.
# Note: granting write access to ~/.config/graith lets the orchestrator
# modify graith configuration, which on reload can affect other sessions.
# read_dirs = []
# write_dirs = ["~/.config/graith"]

# [sandbox]
# OS-level sandbox for agent processes. Disabled by default. When enabled a
# `backend` MUST be chosen — there is no default; an unset backend fails closed.
#   backend = "safehouse"  # macOS Seatbelt (sandbox-exec)
#   backend = "nono"       # Landlock+seccomp on Linux, Seatbelt on macOS
# enabled = true
# backend = "nono"
# read_dirs  = ["~/Code/shared"]
# write_dirs = ["~/.cache/agent"]
# features   = ["ssh"]      # ssh -> $SSH_AUTH_SOCK; process-control -> signals
#
# signal_mode (nono only): whether the sandboxed process may signal others.
# One of "isolated", "allow_same_sandbox" (nono default), "allow_all". Set to
# "isolated" to make the `process-control` feature actually gate signalling
# under nono (safehouse ignores this field).
# signal_mode = "isolated"
#
# profile (nono only): the base profile graith's generated profile extends.
# Defaults to nono's built-in "default" (its audited deny groups + base system
# paths). Set it — these profiles are agent-specific, so set it per-agent, not
# globally — to a maintained registry profile to inherit that agent's upstream
# file grants instead of hand-listing them via write_files. nono MERGES the base
# with graith's profile: collection fields (read_dirs/write_dirs and the env
# allowlist) are unioned, so graith's grants are always present but a custom
# profile can only WIDEN the env allowlist and may add its own network/hook/env
# policy — pick a trusted, least-privilege profile. nono's required deny groups
# (deny_credentials, …) survive regardless. e.g. under [agents.claude.sandbox]:
# profile = "always-further/claude". safehouse has no profile concept, ignores it.
# profile = "always-further/claude"
#
# [sandbox.network]  (nono only)
# Optional egress policy. Requires Landlock ABI v4 (kernel 6.7+) on Linux; a
# requested policy on an older kernel fails closed. safehouse has no network
# primitive and fails closed if a network policy is set.
#   block = true                          # deny all outbound
#   allow_domains = ["github.com", "https://api.anthropic.com/**"]  # proxy allowlist
# block = false
# allow_domains = []

# Headless stream-json sessions (issue #1075, EXPERIMENTAL). When enabled,
# fire-and-forget sessions (tribunal judges, trigger briefings) can run a
# headless Claude process (`claude -p --output-format stream-json`) instead of an
# interactive PTY; graith parses the typed event stream for status and captures
# the run's cost/token usage. v1 is one-shot, requires a prompt, and is
# incompatible with the sandbox. Inert unless experimental = true. Per-agent
# support is `headless_capable`.
# [headless]
# experimental = false   # master gate; headless does nothing unless true
# default      = false   # once enabled, whether new sessions go headless by default

# Agent definitions. The map key (e.g. "claude") is the agent type name.
# Each agent needs at minimum: command, args
# Optional: resume_args, fork_args, env, idle_timeout, sandbox, mcp_servers,
#   validate_model, interrupt_count, interrupt_delay_ms, inject_prompt,
#   pre_trust_workspace, headless_capable

[agents.claude]
command = "claude"                                    # binary to launch
args = ["--session-id", "{agent_session_id}"]        # args for a fresh session (templates expanded)
resume_args = ["--resume", "{agent_session_id}"]     # args to resume an existing session
# args to fork from a source session (used by ctrl+b f)
fork_args = ["--resume", "{fork_source_agent_session_id}", "--fork-session", "--session-id", "{agent_session_id}"]
# Session lifecycle & prompt-delivery defaults, stated explicitly so `gr config
# show` reflects the effective behaviour rather than leaving it to Go fallbacks.
idle_timeout        = "1h"                    # auto-stop after this long idle (0 disables)
inject_prompt       = true                    # inject agent_prompt into the session
prompt_injection    = "append_system_prompt"  # delivery mechanism: Claude's --append-system-prompt
pre_trust_workspace = true                    # pre-trust the worktree so the agent skips its trust prompt
# Claude's TUI ignores a single Ctrl-C; it needs two rapid presses (~200ms
# apart) to actually interrupt. Other agents default to a single Ctrl-C.
interrupt_count = 2
interrupt_delay_ms = 200
# Claude Code supports headless stream-json mode (issue #1075), so it may run as
# a fire-and-forget headless session when [headless] experimental is enabled.
headless_capable = true

# Extra sandbox grants for this agent, merged on top of the global [sandbox]
# config. Only take effect when the sandbox is enabled. "write" means read+write.
[agents.claude.sandbox]
read_dirs = ["~/.claude"]
write_dirs = ["~/.claude"]

[agents.codex]
command = "codex"
args = []
# Codex mints its own session id; graith captures it from the rollout on disk
# after start (captureNativeSessionID). Resume pins to that id when known; when
# it wasn't captured, the daemon's empty-id guard falls back to `resume --last`
# (cwd-scoped, best-effort).
resume_args = ["resume", "{agent_session_id}"]
fork_args = ["fork", "{fork_source_agent_session_id}"]
idle_timeout        = "1h"                       # auto-stop after this long idle (0 disables)
inject_prompt       = true                       # inject agent_prompt into the session
prompt_injection    = "developer_instructions"   # delivery mechanism: Codex's -c developer_instructions=...
pre_trust_workspace = true                       # pre-trust the worktree so the agent skips its trust prompt

[agents.codex.sandbox]
read_dirs = ["~/.codex"]
write_dirs = ["~/.codex"]

[agents.opencode]
command = "opencode"
args = []
resume_args = ["--session", "{agent_session_id}"]
idle_timeout        = "1h"     # auto-stop after this long idle (0 disables)
inject_prompt       = true     # inject agent_prompt into the session
prompt_injection    = "none"   # OpenCode has no supported injection mechanism; set to opt in
pre_trust_workspace = true     # pre-trust the worktree so the agent skips its trust prompt

[agents.cursor]
command = "agent"           # the Cursor CLI binary is named `agent`
args = []
resume_args = ["resume"]
# Command listing valid model IDs ("id - description" per line); a requested
# {model} not in the list is rejected before the session starts.
validate_model = "agent --list-models"
idle_timeout        = "1h"            # auto-stop after this long idle (0 disables)
inject_prompt       = true            # inject agent_prompt into the session
prompt_injection    = "cursor_rules"  # delivery mechanism: writes .cursor/rules/graith.mdc
pre_trust_workspace = true            # pre-trust the worktree so the agent skips its trust prompt

[agents.cursor.sandbox]
read_dirs = ["~/.cursor"]
write_dirs = ["~/.cursor"]

[agents.agy]
command = "agy"
args = []
resume_args = ["--conversation", "{agent_session_id}"]
idle_timeout        = "1h"     # auto-stop after this long idle (0 disables)
inject_prompt       = true     # inject agent_prompt into the session
prompt_injection    = "none"   # Agy has no supported injection mechanism; set to opt in
pre_trust_workspace = true     # pre-trust the worktree so the agent skips its trust prompt

[agents.agy.sandbox]
read_dirs = ["~/.gemini"]
write_dirs = ["~/.gemini"]

# ── Triggers ────────────────────────────────────────────────────────────────
# Daemon-fired automation: a trigger is (source) → (action). Exactly one source
# ([trigger.schedule] or [trigger.watch]) per [[trigger]]. The [[trigger]]
# definitions below are commented out by default; the [triggers.advanced] tuning
# table is active so `gr config show/diff/reset` describe the full effective
# behaviour. See docs/design/2026-07-11-triggers-design.md.
#
# Daemon-wide cap on concurrently-running trigger actions:
# [triggers]
# max_concurrent = 4

# Advanced scheduler + file-watch tuning. These are the low-level policy defaults
# the daemon applies; they are stated here (not only in code) so config inspection
# describes the full behaviour. Tune them to trade off dispatch latency, file-watch
# reconcile load, degraded-binding recovery, and notification size. The loop-lifetime
# knobs (scheduler_tick, watch_reconcile_interval) take effect on the next daemon
# (re)start; the rest apply on the next fire.
[triggers.advanced]
scheduler_tick           = "1s"     # trigger scheduler loop cadence (cron granularity is 1 minute)
run_history_max          = 20       # per-trigger runs retained in persisted history
watch_reconcile_interval = "2s"     # how often file-watch bindings are reconciled against live sessions
watch_retry_base_backoff = "5s"     # first-retry delay for a degraded file-watch binding (then exponential)
watch_retry_max_backoff  = "5m"     # cap on the degraded-binding retry backoff
command_output_cap       = 4096     # bytes of a command action's captured output kept (rest truncated)
# watch_builtin_ignores: daemon-wide dirs/patterns never watched (".git" is always
# ignored regardless). Unset uses the default below.
watch_builtin_ignores    = [".git/", ".git", ".hg/", ".svn/", "*.swp", "*.swx", "4913", ".DS_Store"]
#
# Schedule → session: a daily PR report.
# [[trigger]]
# name = "daily-pr-report"
# [trigger.schedule]
# cron     = "0 9 * * *"        # or: every = "15m"
# timezone = "Europe/London"
# [trigger.action]
# type   = "session"
# prompt = "Summarise open PRs and post to the orchestrator inbox."
# repo   = "~/Code/graith"
# agent  = "claude"
# [trigger.action.deliver]
# inbox = "orchestrator"
# store = "reports/pr/{date}.md"
#
# Watch → command: run tests when Go source changes (binds to any session on the
# repo; a watch source selects by repo or role, never a live session name).
# [[trigger]]
# name = "test-on-change"
# [trigger.watch]
# repo     = "~/Code/graith"
# paths    = ["**/*.go"]
# debounce = "30s"             # lower for fast commands
# [trigger.action]
# type    = "command"
# command = "go test ./..."
# [trigger.action.deliver]
# inbox = "{session_name}"
#
# Watch → ensure-reviewer: keep a reviewer reacting to an implementer's changes.
# [[trigger]]
# name = "review-go"
# [trigger.watch]
# role  = "implementer"
# paths = ["**/*.go"]
# [trigger.action]
# type   = "session"
# ensure = true
# agent  = "claude"
# prompt = "Review the changes since your last look; send feedback via gr msg."
#
# Schedule → tracker: keep sessions in sync with a GitHub issue tracker. Each
# poll spawns a session per active issue (seeded from the issue body) and reaps
# it when the issue leaves the active state. See
# docs/design/2026-07-16-tracker-poll-action.md.
# [[trigger]]
# name = "issue-sessions"
# [trigger.schedule]
# every = "5m"
# [trigger.action]
# type   = "tracker"
# agent  = "claude"
# prompt = "Work on GitHub issue #{issue_number}: {issue_title}\n\n{issue_body}\n\n{issue_url}"
# [trigger.action.tracker]
# provider       = "github"          # v1: github (default)
# repo           = "~/Code/graith"   # resolves the gh slug + is the spawn repo
# active_state   = "open"            # open | closed | all (default open)
# active_labels  = ["in-progress"]   # active iff the issue has one of these (empty = any)
# assignee       = "@me"             # optional gh assignee filter
# grace          = "10m"             # inactive this long before reaping (default 5m)
# max_concurrent = 3                 # cap on live tracker sessions (0 = unlimited)
# reap           = "stop"            # stop | delete | none (default stop)
# limit          = 50                # max issues fetched per poll (default 50)
# [trigger.action.deliver]
# inbox = "orchestrator"             # optional: the reconcile summary
