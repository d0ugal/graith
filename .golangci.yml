version: "2"
run:
  timeout: 5m
linters:
  default: fast
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - gocritic
    - misspell
  disable:
    - cyclop
    - depguard
    - dupl
    - err113
    - exhaustruct
    - forcetypeassert
    - funcorder
    - funlen
    - gocognit
    - goconst
    - godot
    - intrange
    - lll
    - mnd
    - nestif
    - nlreturn
    - noinlineerr
    - paralleltest
    - perfsprint
    - revive
    - tagliatelle
    - testpackage
    - usetesting
    - varnamelen
    - wsl
  settings:
    errcheck:
      exclude-functions:
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Sscanf
        - (io.Closer).Close
        - (*os.File).Close
        - (net.Conn).Close
        - (net.Listener).Close
        - (io.Writer).Write
        - os.Remove
        - os.RemoveAll
        - (*encoding/json.Encoder).Encode
        - (*os.Process).Kill
issues:
  exclude-rules:
    - path: _test\.go
      linters:
        - errcheck
formatters:
  enable:
    - gci
    - gofmt
